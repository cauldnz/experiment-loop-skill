ack_id":"line-regex","track_index":1,"track_label":"Line-oriented / regular-expression architecture"},{"artifacts":[{"diagnostics":[],"id":"track-state-machine-loop-01-parser","kind":"code","label":"loop-01 parser.py","path":"track-state-machine/loop-01/parser.py","presentation":{"caption":"Baseline hand-rolled character-state-machine CSV parser (ParseError + parse()).","comparison_key":"parser-snapshot","featured":false,"mode":"code","primary":true},"preview":{"kind":"text","language":"py","value":"\"\"\"Hand-rolled parser for a messy vendor CSV dialect.\r\n\r\nArchitecture\r\n------------\r\nThis module implements a single-pass, whole-input **character state\r\nmachine**. The entire input string is scanned once, character by character\r\n(with multi-character newline sequences such as ``\\\\r\\\\n`` collapsed into a\r\nsingle logical transition). A small ``_State`` enum names every state the\r\nmachine can be in; each state's handler documents its invariants and the\r\nexact transitions it may take. Precise 1-based ``(line, column)`` source\r\npositions are tracked throughout so that malformed input can be reported\r\nwith an actionable location.\r\n\r\nNo use of the standard-library ``csv`` module, ``pandas``, or any\r\nthird-party parsing library.\r\n\r\nPublic API\r\n----------\r\n``ParseError`` -- raised for any malformed input, message includes a\r\n1-based line and column.\r\n\r\n``parse(text: str) -\u003e list[list[str]]`` -- parse the given text into rows\r\nof string fields.\r\n\"\"\"\r\n\r\nfrom __future__ import annotations\r\n\r\nfrom enum import Enum, auto\r\n\r\n\r\nclass ParseError(Exception):\r\n    \"\"\"Raised when the input cannot be parsed as valid vendor CSV.\r\n\r\n    Attributes:\r\n        line: 1-based line number where the problem was detected.\r\n        col: 1-based column number where the problem was detected.\r\n    \"\"\"\r\n\r\n    def __init__(self, reason: str, line: int, col: int):\r\n        self.line = line\r\n        self.col = col\r\n        super().__init__(f\"{reason} (line {line}, column {col})\")\r\n\r\n\r\nclass _State(Enum):\r\n    \"\"\"Named states of the whole-input character state machine.\r\n\r\n    FIELD_START\r\n        Positioned at the start of a field (either the first field of a\r\n        row, right after a row boundary, or any later field right after a\r\n        comma). Leading spaces/tabs are consumed here without being kept.\r\n        When this is the *first* field attempt of a fresh row\r\n        (``row_start_untouched`` is True) a ``#`` means \"comment line\" and\r\n        an immediate newline/EOF means \"blank line\" -- neither produces a\r\n        row.\r\n    IN_UNQUOTED\r\n        Accumulating characters of an unquoted field. Terminates on\r\n        comma, newline, or EOF. A literal quote character here is\r\n        malformed.\r\n    IN_QUOTED\r\n        Accumulating characters of a quoted field verbatim (interior\r\n        whitespace preserved). Newlines are normalized to ``\\\\n``. A quote\r\n        character transitions to QUOTE_PENDING to disambiguate an escaped\r\n        quote from field closure.\r\n    QUOTE_PENDING\r\n        Just saw a ``\"`` while inside a quoted field. If the next\r\n        character is also ``\"`` this is a doubled-quote escape and we\r\n        return to IN_QUOTED. Otherwise the field is closed and we move to\r\n        AFTER_QUOTE without consuming the next character.\r\n    AFTER_QUOTE\r\n        The quoted field's closing quote has been seen. Only spaces/tabs\r\n        are permitted until the field/row terminator (comma, newline, or\r\n        EOF); anything else is malformed.\r\n    IN_COMMENT\r\n        Consuming (and discarding) the remainder of a comment line, up to\r\n        but not including its terminating newline.\r\n    \"\"\"\r\n\r\n    FIELD_START = auto()\r\n    IN_UNQUOTED = auto()\r\n    IN_QUOTED = auto()\r\n    QUOTE_PENDING = auto()\r\n    AFTER_QUOTE = auto()\r\n    IN_COMMENT = auto()\r\n\r\n\r\n_BOM = \"\\ufeff\"\r\n_WS = (\" \", \"\\t\")\r\n\r\n\r\ndef _is_newline_start(ch: str) -\u003e bool:\r\n    return ch == \"\\r\" or ch == \"\\n\"\r\n\r\n\r\ndef _consume_newline(text: str, pos: int, line: int, col: int, n: int):\r\n    \"\"\"Consume one logical newline (\\\\r\\\\n, \\\\r, or \\\\n) at ``pos``.\r\n\r\n    Returns the advanced (pos, line, col). Caller must have already\r\n    verified that a newline starts at ``pos``.\r\n    \"\"\"\r\n    if text[pos] == \"\\r\":\r\n        if pos + 1 \u003c n and text[pos + 1] == \"\\n\":\r\n            return pos + 2, line + 1, 1\r\n        return pos + 1, line + 1, 1\r\n    # text[pos] == \"\\n\"\r\n    return pos + 1, line + 1, 1\r\n\r\n\r\ndef parse(text: str) -\u003e list[list[str]]:\r\n    \"\"\"Parse ``text`` (already-decoded str) into a list of rows of fields.\r\n\r\n    See module docstring for the dialect rules enforced.\r\n    \"\"\"\r\n    n = len(text)\r\n    pos = 0\r\n    line = 1\r\n    col = 1\r\n\r\n    # A UTF-8 BOM is only legal at absolute offset zero. It is consumed\r\n    # silently and does not occupy a column of its own.\r\n    if n \u003e 0 and text[0] == _BOM:\r\n        pos = 1\r\n\r\n    rows: list[list[str]] = []\r\n    row: list[str] = []\r\n    field_chars: list[str] = []\r\n    state = _State.FIELD_START\r\n    row_start_untouched = True\r\n    quote_start_line = 0\r\n    quote_start_col = 0\r\n\r\n    def commit_field(value: str) -\u003e None:\r\n        row.append(value)\r\n\r\n    def commit_row() -\u003e None:\r\n        rows.append(row.copy())\r\n        row.clear()\r\n\r\n    while pos \u003c n:\r\n        ch = text[pos]\r\n\r\n        if ch == _BOM:\r\n            raise ParseError(\r\n                \"Byte-order mark is only permitted at the start of input\", line, col\r\n            )\r\n\r\n        if state == _State.FIELD_START:\r\n            if ch in _WS:\r\n                pos += 1\r\n                col += 1\r\n                continue\r\n            if row_start_untouched and ch == \"#\":\r\n                state = _State.IN_COMMENT\r\n                pos += 1\r\n                col += 1\r\n                continue\r\n            if row_start_untouched and _is_newline_start(ch):\r\n                # Blank line: consume it and stay ready for a new row.\r\n                pos, line, col = _consume_newline(text, pos, line, col, n)\r\n                continue\r\n            row_start_untouched = False\r\n            if ch == '\"':\r\n                quote_start_line, quote_start_col = line, col\r\n                field_chars = []\r\n                state = _State.IN_QUOTED\r\n                pos += 1\r\n                col += 1\r\n                continue\r\n            if ch == \",\":\r\n                commit_field(\"\")\r\n                pos += 1\r\n                col += 1\r\n                continue\r\n            if _is_newline_start(ch):\r\n                commit_field(\"\")\r\n                commit_row()\r\n                pos, line, col = _consume_newline(text, pos, line, col, n)\r\n                row_start_untouched = True\r\n                continue\r\n            # First real character of an unquoted field.\r\n            field_chars = [ch]\r\n            state = _State.IN_UNQUOTED\r\n            pos += 1\r\n            col += 1\r\n            continue\r\n\r\n        if state == _State.IN_UNQUOTED:\r\n            if ch == \",\":\r\n                commit_field(\"\".join(field_chars).rstrip(\" \\t\"))\r\n                field_chars = []\r\n                state = _State.FIELD_START\r\n                pos += 1\r\n                col += 1\r\n                continue\r\n            if _is_newline_start(ch):\r\n                commit_field(\"\".join(field_chars).rstrip(\" \\t\"))\r\n                field_chars = []\r\n                commit_row()\r\n                pos, line, col = _consume_newline(text, pos, line, col, n)\r\n                state = _State.FIELD_START\r\n                row_start_untouched = True\r\n                continue\r\n            if ch == '\"':\r\n                raise ParseError(\r\n                    \"Unexpected quote character inside an unquoted field\",\r\n                    line,\r\n                    col,\r\n                )\r\n            field_chars.append(ch)\r\n            pos += 1\r\n            col += 1\r\n            continue\r\n\r\n        if state == _State.IN_QUOTED:\r\n            if ch == '\"':\r\n                state = _State.QUOTE_PENDING\r\n                pos += 1\r\n                col += 1\r\n                continue\r\n            if _is_newline_start(ch):\r\n                pos, line, col = _consume_newline(text, pos, line, col, n)\r\n                field_chars.append(\"\\n\")\r\n                continue\r\n            field_chars.append(ch)\r\n            pos += 1\r\n            col += 1\r\n            continue\r\n\r\n        if state == _State.QUOTE_PENDING:\r\n            if ch == '\"':\r\n                # Doubled quote: escaped literal quote.\r\n                field_chars.append('\"')\r\n                state = _State.IN_QUOTED\r\n                pos += 1\r\n                col += 1\r\n                continue\r\n            # Field is closed; re-process this character in AFTER_QUOTE\r\n            # without consuming it.\r\n            state = _State.AFTER_QUOTE\r\n            continue\r\n\r\n        if state == _State.AFTER_QUOTE:\r\n            if ch in _WS:\r\n                pos += 1\r\n                col += 1\r\n                continue\r\n            if ch == \",\":\r\n                commit_field(\"\".join(field_chars))\r\n                field_chars = []\r\n                state = _State.FIELD_START\r\n                pos += 1\r\n                col += 1\r\n                continue\r\n            if _is_newline_start(ch):\r\n                commit_field(\"\".join(field_chars))\r\n                field_chars = []\r\n                commit_row()\r\n                pos, line, col = _consume_newline(text, pos, line, col, n)\r\n                state = _State.FIELD_START\r\n                row_start_untouched = True\r\n                continue\r\n            raise ParseError(\r\n                f\"Unexpected character {ch!r} after closing quote; \"\r\n                \"expected a comma or a newline\",\r\n                line,\r\n                col,\r\n            )\r\n\r\n        if state == _State.IN_COMMENT:\r\n            if _is_newline_start(ch):\r\n                pos, line, col = _consume_newline(text, pos, line, col, n)\r\n                state = _State.FIELD_START\r\n                row_start_untouched = True\r\n                continue\r\n            pos += 1\r\n            col += 1\r\n            continue\r\n\r\n    # End of input reached. Finalize any pending field/row.\r\n    if state == _State.FIELD_START:\r\n        if not (row_start_untouched and not row):\r\n            commit_field(\"\")\r\n            commit_row()\r\n    elif state == _State.IN_UNQUOTED:\r\n        commit_field(\"\".join(field_chars).rstrip(\" \\t\"))\r\n        commit_row()\r\n    elif state == _State.AFTER_QUOTE or state == _State.QUOTE_PENDING:\r\n        commit_field(\"\".join(field_chars))\r\n        commit_row()\r\n    elif state == _State.IN_QUOTED:\r\n        raise ParseError(\r\n            \"Unterminated quoted field (opening quote never closed)\",\r\n            quote_start_line,\r\n            quote_start_col,\r\n        )\r\n    # IN_COMMENT at EOF: nothing to commit, comment simply ends.\r\n\r\n    return rows\r\n"},"role":"primary-output","safe_href":"track-state-machine/loop-01/parser.py","sha256":"c34dccb244878b48ddb577d53c8458a6426a1cdd8d2de11f966dcd890b4bc2ac"},{"diagnostics":[],"id":"track-state-machine-loop-01-tests","kind":"code","label":"loop-01 test_parser.py","path":"track-state-machine/loop-01/test_parser.py","presentation":{"caption":"30 unittest cases covering BOM/comments/blanks, quoting, trimming, ragged rows, and 4 malformed-input/error-location checks.","featured":false,"mode":"code","primary":false},"preview":{"kind":"text","language":"py","value":"\"\"\"Objective tests for the loop-01 baseline character-state-machine parser.\r\n\r\nRun with: python test_parser.py\r\n\"\"\"\r\n\r\nimport unittest\r\n\r\nfrom parser import ParseError, parse\r\n\r\n\r\nclass TestBasicShapeAndAPI(unittest.TestCase):\r\n    def test_empty_input_returns_no_rows(self):\r\n        self.assertEqual(parse(\"\"), [])\r\n\r\n    def test_simple_two_row(self):\r\n        self.assertEqual(parse(\"a,b,c\\n1,2,3\\n\"), [[\"a\", \"b\", \"c\"], [\"1\", \"2\", \"3\"]])\r\n\r\n    def test_no_trailing_newline(self):\r\n        self.assertEqual(parse(\"a,b,c\"), [[\"a\", \"b\", \"c\"]])\r\n\r\n\r\nclass TestBomCommentsBlanks(unittest.TestCase):\r\n    def test_bom_at_start_is_stripped(self):\r\n        text = \"\\ufeffa,b\\n1,2\\n\"\r\n        self.assertEqual(parse(text), [[\"a\", \"b\"], [\"1\", \"2\"]])\r\n\r\n    def test_comment_lines_ignored(self):\r\n        text = \"# a comment\\na,b\\n   # indented comment\\n1,2\\n\"\r\n        self.assertEqual(parse(text), [[\"a\", \"b\"], [\"1\", \"2\"]])\r\n\r\n    def test_blank_lines_ignored(self):\r\n        text = \"a,b\\n\\n   \\n\\t\\n1,2\\n\"\r\n        self.assertEqual(parse(text), [[\"a\", \"b\"], [\"1\", \"2\"]])\r\n\r\n    def test_bom_comments_and_blanks_combined(self):\r\n        text = \"\\ufeff# header comment\\n\\na,b,c\\n\\n# mid comment\\n1,2,3\\n\"\r\n        self.assertEqual(parse(text), [[\"a\", \"b\", \"c\"], [\"1\", \"2\", \"3\"]])\r\n\r\n\r\nclass TestQuotedFields(unittest.TestCase):\r\n    def test_quoted_comma(self):\r\n        self.assertEqual(parse('a,\"b,c\",d\\n'), [[\"a\", \"b,c\", \"d\"]])\r\n\r\n    def test_embedded_lf(self):\r\n        self.assertEqual(parse('a,\"line1\\nline2\",b\\n'), [[\"a\", \"line1\\nline2\", \"b\"]])\r\n\r\n    def test_embedded_crlf_normalized(self):\r\n        self.assertEqual(\r\n            parse('a,\"line1\\r\\nline2\",b\\n'), [[\"a\", \"line1\\nline2\", \"b\"]]\r\n        )\r\n\r\n    def test_doubled_quote_escape(self):\r\n        self.assertEqual(parse('a,\"He said \"\"hi\"\"\",b\\n'), [[\"a\", 'He said \"hi\"', \"b\"]])\r\n\r\n    def test_comment_and_blank_look_alikes_retained_inside_quotes(self):\r\n        text = 'a,\"# not a comment\\n\\nstill quoted\",b\\n'\r\n        self.assertEqual(\r\n            parse(text), [[\"a\", \"# not a comment\\n\\nstill quoted\", \"b\"]]\r\n        )\r\n\r\n    def test_quoted_field_padding_spaces_trimmed_outside_quotes(self):\r\n        text = 'a,  \"value\"  ,b\\n'\r\n        self.assertEqual(parse(text), [[\"a\", \"value\", \"b\"]])\r\n\r\n    def test_quoted_field_preserves_interior_whitespace(self):\r\n        text = 'a,\"  spaced out  \",b\\n'\r\n        self.assertEqual(parse(text), [[\"a\", \"  spaced out  \", \"b\"]])\r\n\r\n\r\nclass TestRaggedRowsAndEmptyFields(unittest.TestCase):\r\n    def test_ragged_rows_preserved(self):\r\n        text = \"a,b,c\\n1,2\\nx,y,z,w\\n\"\r\n        self.assertEqual(\r\n            parse(text), [[\"a\", \"b\", \"c\"], [\"1\", \"2\"], [\"x\", \"y\", \"z\", \"w\"]]\r\n        )\r\n\r\n    def test_empty_fields_and_trailing_comma(self):\r\n        text = \"a,,b,\\n\"\r\n        self.assertEqual(parse(text), [[\"a\", \"\", \"b\", \"\"]])\r\n\r\n    def test_leading_comma_produces_empty_first_field(self):\r\n        text = \",a\\n\"\r\n        self.assertEqual(parse(text), [[\"\", \"a\"]])\r\n\r\n    def test_lone_comma_row(self):\r\n        text = \",\\n\"\r\n        self.assertEqual(parse(text), [[\"\", \"\"]])\r\n\r\n\r\nclass TestTrimming(unittest.TestCase):\r\n    def test_unquoted_surrounding_whitespace_trimmed(self):\r\n        text = \"  a  ,  b b  ,c\\n\"\r\n        self.assertEqual(parse(text), [[\"a\", \"b b\", \"c\"]])\r\n\r\n    def test_unquoted_all_whitespace_field_becomes_empty(self):\r\n        text = \"a,   ,b\\n\"\r\n        self.assertEqual(parse(text), [[\"a\", \"\", \"b\"]])\r\n\r\n\r\nclass TestCrOnlyLines(unittest.TestCase):\r\n    def test_cr_only_physical_lines(self):\r\n        text = \"a,b\\r1,2\\r\"\r\n        self.assertEqual(parse(text), [[\"a\", \"b\"], [\"1\", \"2\"]])\r\n\r\n\r\nclass TestCoreBlockingSamples(unittest.TestCase):\r\n    \"\"\"Blocking core samples: a Loop failing any of these must be rejected.\"\"\"\r\n\r\n    def test_core_embedded_comma(self):\r\n        self.assertEqual(parse('name,\"Doe, John\",age\\n'), [[\"name\", \"Doe, John\", \"age\"]])\r\n\r\n    def test_core_embedded_newline(self):\r\n        self.assertEqual(\r\n            parse('a,\"multi\\nline\",c\\n'), [[\"a\", \"multi\\nline\", \"c\"]]\r\n        )\r\n\r\n    def test_core_doubled_quote_escaping(self):\r\n        self.assertEqual(parse('\"a\"\"b\",c\\n'), [['a\"b', \"c\"]])\r\n\r\n\r\nclass TestMalformedInputs(unittest.TestCase):\r\n    def test_quote_in_unquoted_field_raises_with_position(self):\r\n        with self.assertRaises(ParseError) as ctx:\r\n            parse('a,b\"c,d\\n')\r\n        err = ctx.exception\r\n        self.assertEqual(err.line, 1)\r\n        self.assertEqual(err.col, 4)\r\n        self.assertIn(\"line 1\", str(err))\r\n        self.assertIn(\"column 4\", str(err))\r\n\r\n    def test_non_whitespace_after_closing_quote_raises_with_position(self):\r\n        with self.assertRaises(ParseError) as ctx:\r\n            parse('a,\"b\"c,d\\n')\r\n        err = ctx.exception\r\n        self.assertEqual(err.line, 1)\r\n        self.assertEqual(err.col, 6)\r\n\r\n    def test_unterminated_quote_raises_with_open_position(self):\r\n        with self.assertRaises(ParseError) as ctx:\r\n            parse('a,\"b,c\\n')\r\n        err = ctx.exception\r\n        self.assertEqual(err.line, 1)\r\n        self.assertEqual(err.col, 3)\r\n\r\n    def test_bom_away_from_start_raises_with_position(self):\r\n        with self.assertRaises(ParseError) as ctx:\r\n            parse('a,b\\n\\ufeffc,d\\n')\r\n        err = ctx.exception\r\n        self.assertEqual(err.line, 2)\r\n        self.assertEqual(err.col, 1)\r\n\r\n    def test_error_message_mentions_line_and_column_words(self):\r\n        with self.assertRaises(ParseError) as ctx:\r\n            parse('a,\"b,c\\n')\r\n        msg = str(ctx.exception)\r\n        self.assertIn(\"line\", msg)\r\n        self.assertIn(\"column\", msg)\r\n\r\n\r\nclass TestNoStdlibCsvImport(unittest.TestCase):\r\n    def test_source_does_not_import_csv(self):\r\n        with open(\"parser.py\", \"r\", encoding=\"utf-8\") as f:\r\n            source = f.read()\r\n        self.assertNotIn(\"import csv\", source)\r\n        self.assertNotIn(\"from csv\", source)\r\n\r\n\r\nif __name__ == \"__main__\":\r\n    unittest.main(verbosity=2)\r\n"},"role":"test-suite","safe_href":"track-state-machine/loop-01/test_parser.py","sha256":"a08d9e56f03d07d31f9324e58628d37c62c3bd6e052689f80681a48c3a3b65d1"},{"diagnostics":[],"id":"track-state-machine-loop-01-result","kind":"result","label":"loop-01 test-result.txt","path":"track-state-machine/loop-01/test-result.txt","presentation":{"caption":"Full `python test_parser.py` transcript, counts (30/30 passed), and notes on 15 additional ad-hoc adversarial probes.","featured":false,"mode":"log","primary":false},"preview":{"kind":"text","language":"txt","value":"Track: track-state-machine (character-state-machine architecture)\r\nLoop: loop-01 (baseline)\r\nModel: claude-sonnet-5\r\n\r\nCommand:\r\n    python test_parser.py\r\n\r\nFull output:\r\n----------------------------------------------------------------------\r\ntest_empty_input_returns_no_rows (__main__.TestBasicShapeAndAPI.test_empty_input_returns_no_rows) ... ok\r\ntest_no_trailing_newline (__main__.TestBasicShapeAndAPI.test_no_trailing_newline) ... ok\r\ntest_simple_two_row (__main__.TestBasicShapeAndAPI.test_simple_two_row) ... ok\r\ntest_blank_lines_ignored (__main__.TestBomCommentsBlanks.test_blank_lines_ignored) ... ok\r\ntest_bom_at_start_is_stripped (__main__.TestBomCommentsBlanks.test_bom_at_start_is_stripped) ... ok\r\ntest_bom_comments_and_blanks_combined (__main__.TestBomCommentsBlanks.test_bom_comments_and_blanks_combined) ... ok\r\ntest_comment_lines_ignored (__main__.TestBomCommentsBlanks.test_comment_lines_ignored) ... ok\r\ntest_core_doubled_quote_escaping (__main__.TestCoreBlockingSamples.test_core_doubled_quote_escaping) ... ok\r\ntest_core_embedded_comma (__main__.TestCoreBlockingSamples.test_core_embedded_comma) ... ok\r\ntest_core_embedded_newline (__main__.TestCoreBlockingSamples.test_core_embedded_newline) ... ok\r\ntest_cr_only_physical_lines (__main__.TestCrOnlyLines.test_cr_only_physical_lines) ... ok\r\ntest_bom_away_from_start_raises_with_position (__main__.TestMalformedInputs.test_bom_away_from_start_raises_with_position) ... ok\r\ntest_error_message_mentions_line_and_column_words (__main__.TestMalformedInputs.test_error_message_mentions_line_and_column_words) ... ok\r\ntest_non_whitespace_after_closing_quote_raises_with_position (__main__.TestMalformedInputs.test_non_whitespace_after_closing_quote_raises_with_position) ... ok\r\ntest_quote_in_unquoted_field_raises_with_position (__main__.TestMalformedInputs.test_quote_in_unquoted_field_raises_with_position) ... ok\r\ntest_unterminated_quote_raises_with_open_position (__main__.TestMalformedInputs.test_unterminated_quote_raises_with_open_position) ... ok\r\ntest_source_does_not_import_csv (__main__.TestNoStdlibCsvImport.test_source_does_not_import_csv) ... ok\r\ntest_comment_and_blank_look_alikes_retained_inside_quotes (__main__.TestQuotedFields.test_comment_and_blank_look_alikes_retained_inside_quotes) ... ok\r\ntest_doubled_quote_escape (__main__.TestQuotedFields.test_doubled_quote_escape) ... ok\r\ntest_embedded_crlf_normalized (__main__.TestQuotedFields.test_embedded_crlf_normalized) ... ok\r\ntest_embedded_lf (__main__.TestQuotedFields.test_embedded_lf) ... ok\r\ntest_quoted_comma (__main__.TestQuotedFields.test_quoted_comma) ... ok\r\ntest_quoted_field_padding_spaces_trimmed_outside_quotes (__main__.TestQuotedFields.test_quoted_field_padding_spaces_trimmed_outside_quotes) ... ok\r\ntest_quoted_field_preserves_interior_whitespace (__main__.TestQuotedFields.test_quoted_field_preserves_interior_whitespace) ... ok\r\ntest_empty_fields_and_trailing_comma (__main__.TestRaggedRowsAndEmptyFields.test_empty_fields_and_trailing_comma) ... ok\r\ntest_leading_comma_produces_empty_first_field (__main__.TestRaggedRowsAndEmptyFields.test_leading_comma_produces_empty_first_field) ... ok\r\ntest_lone_comma_row (__main__.TestRaggedRowsAndEmptyFields.test_lone_comma_row) ... ok\r\ntest_ragged_rows_preserved (__main__.TestRaggedRowsAndEmptyFields.test_ragged_rows_preserved) ... ok\r\ntest_unquoted_all_whitespace_field_becomes_empty (__main__.TestTrimming.test_unquoted_all_whitespace_field_becomes_empty) ... ok\r\ntest_unquoted_surrounding_whitespace_trimmed (__main__.TestTrimming.test_unquoted_surrounding_whitespace_trimmed) ... ok\r\n\r\n----------------------------------------------------------------------\r\nRan 30 tests in 0.003s\r\n\r\nOK\r\n----------------------------------------------------------------------\r\n\r\nCounts: 30 tests run, 30 passed, 0 failed, 0 errors.\r\n\r\nBlocking core samples (all must pass, and did):\r\n  - test_core_embedded_comma ... ok\r\n  - test_core_embedded_newline ... ok\r\n  - test_core_doubled_quote_escaping ... ok\r\n\r\nAdditional manual adversarial probes (outside the committed suite, used to hunt\r\nfor real weaknesses before writing loop-02; run via `python -` one-liners, not\r\nsaved as a script per the \"no writes outside track\" constraint):\r\n  - empty_quoted_pair '\"\",\"\"' -\u003e OK [['', '']]\r\n  - quoted_flush_no_trailing 'a,\"b\"' (no trailing comma/newline) -\u003e OK [['a','b']]\r\n  - odd_trailing_quotes_unterminated 'a,\"b\"\"' -\u003e ParseError line=1 col=3 (correctly unterminated)\r\n  - multiline_error_pos (error 2 embedded newlines into a quoted field) -\u003e ParseError line=3 col=7 (position tracked correctly across embedded newlines)\r\n  - cr_embedded_in_quotes -\u003e OK, bare CR inside quotes normalized to \\n\r\n  - comment_no_trailing_newline -\u003e OK, comment consumed cleanly to EOF\r\n  - bom_mid_comment / bom_mid_unquoted_field / bom_last_char -\u003e all correctly raise ParseError with the BOM's real position\r\n  - hash_not_at_start_of_line 'a#b,c' -\u003e OK [['a#b','c']] (# only special as first char of a line)\r\n  - tabs_only_field -\u003e OK, whitespace-only unquoted field trims to ''\r\n  - crlf_row_separator_mixed_with_lf -\u003e OK, CRLF and LF rows in the same file both parse\r\n  - unicode_content (accented + emoji) -\u003e OK, verified programmatically (console print itself hit a\r\n    Windows charmap encoding limitation, not a parser defect)\r\n  - nested_quotes_then_comma_still_open 'a,\"b\"\",c\\n' -\u003e ParseError, correctly still-open (odd quote count)\r\n\r\nResult: no functional defects found by probing. Genuine weakness identified instead:\r\nparser.py's `parse()` is one ~250-line procedural function with duplicated\r\n`pos += 1; col += 1` advance logic repeated ~15 times and mutable closures over\r\nlist-based row/field buffers. This is a real maintainability liability even\r\nthough correctness held up under adversarial probing. Carried into loop-02 as\r\nthe primary hypothesis (see prompt-history.md).\r\n"},"role":"test-output","safe_href":"track-state-machine/loop-01/test-result.txt","sha256":"2927e8fb7574c9160d2b60726df3b32bc778483ae4d064c9f22d937779efc9c2"},{"diagnostics":[],"id":"track-state-machine-loop-01-judge","kind":"judge-note","label":"Loop 01 provisional judge","path":"track-state-machine/loop-01/judge.md","presentation":{"caption":"Provisional scorecard assessment identifying the monolithic-function maintainability weakness.","featured":false,"mode":"markdown","primary":false},"preview":{"kind":"text","language":"md","value":"# Judge: track-state-machine loop 01\r\n\r\n## What changed\r\n- Established the baseline hand-rolled parser (`parser.py`) implementing the\r\n  required whole-input character state machine: `_State` enum with\r\n  `FIELD_START`, `IN_UNQUOTED`, `IN_QUOTED`, `QUOTE_PENDING`, `AFTER_QUOTE`,\r\n  `IN_COMMENT`, driven by a single `while pos \u003c n` loop over the input string,\r\n  plus explicit `(line, col)` tracking and an end-of-input finalization step.\r\n- Implemented `ParseError` (carries `.line`/`.col`, message embeds both) and\r\n  `parse(text: str) -\u003e list[list[str]]`.\r\n- Wrote `test_parser.py` (unittest, 30 tests) covering every requirement in\r\n  the prompt: BOM, comments, blanks, quoted commas, embedded LF/CRLF,\r\n  doubled-quote escaping, ragged rows, trimming vs. preservation, comment/\r\n  blank look-alikes retained inside quotes, empty fields/trailing commas,\r\n  CR-only physical lines, and 4 malformed-input cases asserting exact\r\n  line/column. Also asserts the source never imports `csv`.\r\n\r\n## Evidence inspected\r\n- `python test_parser.py` -\u003e 30/30 passed (see `test-result.txt` for full\r\n  transcript and counts).\r\n- 15 additional ad-hoc adversarial probes run directly against `parse()`\r\n  (not part of the committed suite) targeting exactly the kind of edge cases\r\n  a hostile reviewer would try: empty quoted fields, quoted field flush at\r\n  EOF without a trailing delimiter, odd-count trailing quotes (must stay\r\n  unterminated), multi-line quoted fields with an error several lines deep\r\n  (verifies line/col tracking survives multiple embedded newlines), bare CR\r\n  inside quotes, comment lines with no trailing newline, BOM appearing mid\r\n  comment / mid unquoted field / as the very last byte, `#` that is not the\r\n  first character of a line, whitespace-only fields made of tabs, mixed\r\n  CRLF/LF row separators in the same file, unicode content (accented letters\r\n  + an emoji), and a still-open field after an odd number of trailing quotes.\r\n  All 15 behaved correctly; details logged in `test-result.txt`.\r\n\r\n## Scores\r\n- correctness: 5 — every objective test passes, including all three blocking\r\n  core samples (embedded comma, embedded newline, doubled-quote escaping),\r\n  and adversarial probing found no behavioral defects.\r\n- robustness: 4 — handled every adversarial case thrown at it (BOM\r\n  placement, mixed line endings, odd quote counts, unicode) but this is\r\n  still a single author's first pass; independent judging / more fuzzing in\r\n  loop-02 is warranted before calling it fully proven.\r\n- error_clarity: 4 — every `ParseError` embeds an accurate 1-based line and\r\n  column and a human-readable reason, but messages don't yet say which field\r\n  or row index was affected, which would help on large files.\r\n- maintainability: 2 — this is the real weakness. `parse()` is one ~250-line\r\n  procedural function with the `pos += 1; col += 1` advance pattern\r\n  duplicated roughly 15 times, and mutable list buffers (`row`,\r\n  `field_chars`) captured by inner closures instead of an encapsulated\r\n  cursor/scanner object. It works and is documented, but it is harder to\r\n  unit-test individual states in isolation and harder to extend safely.\r\n- constraint_adherence: 5 — no `csv`, `pandas`, or any third-party parser\r\n  import; architecture is a genuine named-state character state machine\r\n  driven by a single linear scan, not a regex or line-splitting approach.\r\n\r\n## Judge mode\r\n- single (self-assessment only; provisional per the track's rules — an\r\n  independent judge decides later and objective tests dominate regardless).\r\n\r\n## What improved\r\n- N/A (this is the baseline loop).\r\n\r\n## What failed / regressed\r\n- Nothing failed functionally. The identified weakness is architectural\r\n  (maintainability), not a correctness/robustness defect.\r\n\r\n## Next hypothesis\r\n- Refactor `parse()` into a small `_Scanner` class that owns `pos`/`line`/\r\n  `col` and exposes `advance()`/`advance_newline()`/`peek()` helpers, and\r\n  split the state dispatch into one method per `_State` so each transition\r\n  is independently readable (and, in principle, independently testable).\r\n  This should raise maintainability without changing any observable\r\n  behavior. Simultaneously expand `test_parser.py` with the 15 adversarial\r\n  probes above (promoted from ad-hoc scripts to committed, repeatable\r\n  tests) plus a few new ones (BOM at absolute EOF, deeply nested doubled\r\n  quotes, comment-only file, tab/space mixed blank lines) to raise\r\n  robustness and error_clarity confidence with real regression coverage.\r\n"},"role":"assessment","safe_href":"track-state-machine/loop-01/judge.md","sha256":"42beaaf409bfb659cbfdf8228a7111ac294791f4c358bce38014650c8659bfee"},{"diagnostics":[],"id":"track-state-machine-loop-01-prompt-history","kind":"prompt-history","label":"Loop 01 prompt history","path":"track-state-machine/loop-01/prompt-history.md","presentation":{"caption":"Complete baseline prompt and feedback chain.","featured":false,"mode":"markdown","primary":false},"preview":{"kind":"text","language":"md","value":"# Prompt history: track-state-machine / loop-01\r\n\r\n## Track prompt (as issued to this Track)\r\nHand-roll a robust Python parser for a messy vendor CSV dialect without\r\nimporting the standard-library csv module. Public API should expose\r\nParseError and parse(text: str) -\u003e list[list[str]]. Requirements: UTF-8 BOM\r\naccepted only at start; comment lines whose first non-whitespace character\r\nis # are ignored when not inside a quoted field; blank/whitespace-only\r\nphysical lines ignored when not inside quoted field; quoted commas; embedded\r\nCRLF/LF newlines normalized to \\n within quoted fields; doubled quotes decode\r\nto one quote; ragged rows preserved; unquoted fields trim surrounding\r\nspaces/tabs; quoted fields preserve interior whitespace while allowing\r\nspaces/tabs around the quoted token; any malformed input raises actionable\r\nParseError containing 1-based line and column. Reject quote in an unquoted\r\nfield, non-whitespace after a closing quote before comma/newline,\r\nunterminated quote, and BOM away from offset zero. Do not import csv,\r\npandas, or third-party parser libraries.\r\n\r\nArchitecture constraint: implement an explicit whole-input character state\r\nmachine with named states/invariants and precise source positions. Keep it\r\nsimple and testable.\r\n\r\nThis is Loop 1 of 2 for this Track: baseline architecture and objective\r\ntests.\r\n\r\n## Input feedback\r\nNone yet — this is the first loop of the Track. No prior artifact to react\r\nto.\r\n\r\n## Judge feedback\r\nSelf-assessment only (see judge.md). Summary: correctness 5/5, robustness\r\n4/5, error_clarity 4/5, maintainability 2/5, constraint_adherence 5/5. All\r\n30 objective tests pass, all 3 blocking core samples pass. Adversarial\r\nprobing beyond the committed suite found no functional defects. The\r\nmaterial weakness is architectural: `parse()` is a single ~250-line\r\nprocedural function with the `pos += 1; col += 1` advance pattern\r\nduplicated roughly 15 times across branches, and mutable list buffers\r\ncaptured by inline logic rather than an encapsulated cursor/scanner\r\nabstraction. This is a genuine maintainability liability even though it\r\ndoes not currently cause incorrect output.\r\n\r\n## Next prompt (handed to loop-02)\r\nRefactor the loop-01 parser to fix the identified maintainability weakness\r\nwithout changing observable behavior: introduce a small internal scanner\r\nabstraction that owns position/line/column and exposes reusable\r\nadvance/advance-newline helpers, and give each state its own clearly named\r\nhandler so the dispatch is no longer one long duplicated if/elif chain.\r\nThen expand test_parser.py with the adversarial cases that were only\r\nprobed ad-hoc in loop-01 (empty quoted pair, quoted field flush at EOF with\r\nno trailing delimiter, odd-count trailing quotes remaining unterminated,\r\na multi-line quoted field whose error is several embedded newlines deep —\r\nverifying line/col tracking survives that, bare CR inside quotes, comment\r\nline with no trailing newline, BOM appearing mid-comment / mid-unquoted-\r\nfield / as the last character of the file, a `#` that is not the first\r\ncharacter of a line, whitespace-only fields made of tabs, mixed CRLF/LF\r\nrow separators in one file, unicode content, and a still-open quoted field\r\nafter an odd number of trailing quote characters), plus any further\r\nmalformed/error-location cases that seem worthwhile. All existing behavior\r\nand all 30 loop-01 tests must continue to pass unchanged.\r\n"},"role":"provenance","safe_href":"track-state-machine/loop-01/prompt-history.md","sha256":"dd70f72c0c5c204023a158673fc0fdb0c65994a1ee937b45fcb753669104ab6a"}],"changed_files":["track-state-machine/loop-01/parser.py","track-state-machine/loop-01/test_parser.py","track-state-machine/loop-01/test-result.txt","track-state-machine/loop-01/judge.md","track-state-machine/loop-01/metadata.json","track-state-machine/loop-01/prompt-history.md"],"commands":{"build":"No build step; pure-Python module, no compilation required.","judge":"Self-assessment against the 5-criterion scorecard (correctness/robustness/error_clarity/maintainability/constraint_adherence, 0-5), recorded in judge.md; objective test pass/fail dominates per the parent experiment's rules.","run":"python test_parser.py"},"decision":"keep_for_synthesis","hypothesis":"A single-pass character state machine (FIELD_START, IN_UNQUOTED, IN_QUOTED, QUOTE_PENDING, AFTER_QUOTE, IN_COMMENT states) driven by one while-loop with explicit line/column tracking can satisfy every dialect rule in the prompt on the first attempt.","id":"track-state-machine-loop-01","index":2,"is_champion":false,"label":"track-state-machine-loop-01","lesson":{"action":"Extract position/line/column tracking into a dedicated Scanner class and split the state dispatch into one handler method per named state before adding more features or tests.","confidence":"high","evidence":"loop-01/judge.md maintainability score 2/5 with the specific duplication called out; confirmed no behavior depended on the duplication (loop-02's refactor kept all 30 original tests passing unchanged).","trigger":"Self-review plus 15 ad-hoc adversarial probes found zero functional defects but revealed a single ~250-line procedural parse() with the pos+=1/col+=1 advance pattern duplicated roughly 15 times."},"model_id":"claude-sonnet-5","outcome":"All 30 objective tests passed, including all 3 blocking core samples (embedded comma, embedded newline, doubled-quote escaping). 15 additional ad-hoc adversarial probes (empty quoted pairs, quoted-field flush at EOF, odd-trailing-quote unterminated detection, multi-line error position tracking, bare-CR-in-quotes, BOM in multiple positions, mixed line endings, unicode content, etc.) also behaved correctly. No functional defects were found. Self-review flagged a genuine maintainability weakness instead: parse() was one ~250-line procedural function with the position-advance pattern (pos += 1; col += 1) duplicated roughly 15 times and mutable buffers manipulated inline rather than through an encapsulated cursor abstraction.","parent_ids":[],"primary_artifact":{"diagnostics":[],"id":"track-state-machine-loop-01-parser","kind":"code","label":"loop-01 parser.py","path":"track-state-machine/loop-01/parser.py","presentation":{"caption":"Baseline hand-rolled character-state-machine CSV parser (ParseError + parse()).","comparison_key":"parser-snapshot","featured":false,"mode":"code","primary":true},"preview":{"kind":"text","language":"py","value":"\"\"\"Hand-rolled parser for a messy vendor CSV dialect.\r\n\r\nArchitecture\r\n------------\r\nThis module implements a single-pass, whole-input **character state\r\nmachine**. The entire input string is scanned once, character by character\r\n(with multi-character newline sequences such as ``\\\\r\\\\n`` collapsed into a\r\nsingle logical transition). A small ``_State`` enum names every state the\r\nmachine can be in; each state's handler documents its invariants and the\r\nexact transitions it may take. Precise 1-based ``(line, column)`` source\r\npositions are tracked throughout so that malformed input can be reported\r\nwith an actionable location.\r\n\r\nNo use of the standard-library ``csv`` module, ``pandas``, or any\r\nthird-party parsing library.\r\n\r\nPublic API\r\n----------\r\n``ParseError`` -- raised for any malformed input, message includes a\r\n1-based line and column.\r\n\r\n``parse(text: str) -\u003e list[list[str]]`` -- parse the given text into rows\r\nof string fields.\r\n\"\"\"\r\n\r\nfrom __future__ import annotations\r\n\r\nfrom enum import Enum, auto\r\n\r\n\r\nclass ParseError(Exception):\r\n    \"\"\"Raised when the input cannot be parsed as valid vendor CSV.\r\n\r\n    Attributes:\r\n        line: 1-based line number where the problem was detected.\r\n        col: 1-based column number where the problem was detected.\r\n    \"\"\"\r\n\r\n    def __init__(self, reason: str, line: int, col: int):\r\n        self.line = line\r\n        self.col = col\r\n        super().__init__(f\"{reason} (line {line}, column {col})\")\r\n\r\n\r\nclass _State(Enum):\r\n    \"\"\"Named states of the whole-input character state machine.\r\n\r\n    FIELD_START\r\n        Positioned at the start of a field (either the first field of a\r\n        row, right after a row boundary, or any later field right after a\r\n        comma). Leading spaces/tabs are consumed here without being kept.\r\n        When this is the *first* field attempt of a fresh row\r\n        (``row_start_untouched`` is True) a ``#`` means \"comment line\" and\r\n        an immediate newline/EOF means \"blank line\" -- neither produces a\r\n        row.\r\n    IN_UNQUOTED\r\n        Accumulating characters of an unquoted field. Terminates on\r\n        comma, newline, or EOF. A literal quote character here is\r\n        malformed.\r\n    IN_QUOTED\r\n        Accumulating characters of a quoted field verbatim (interior\r\n        whitespace preserved). Newlines are normalized to ``\\\\n``. A quote\r\n        character transitions to QUOTE_PENDING to disambiguate an escaped\r\n        quote from field closure.\r\n    QUOTE_PENDING\r\n        Just saw a ``\"`` while inside a quoted field. If the next\r\n        character is also ``\"`` this is a doubled-quote escape and we\r\n        return to IN_QUOTED. Otherwise the field is closed and we move to\r\n        AFTER_QUOTE without consuming the next character.\r\n    AFTER_QUOTE\r\n        The quoted field's closing quote has been seen. Only spaces/tabs\r\n        are permitted until the field/row terminator (comma, newline, or\r\n        EOF); anything else is malformed.\r\n    IN_COMMENT\r\n        Consuming (and discarding) the remainder of a comment line, up to\r\n        but not including its terminating newline.\r\n    \"\"\"\r\n\r\n    FIELD_START = auto()\r\n    IN_UNQUOTED = auto()\r\n    IN_QUOTED = auto()\r\n    QUOTE_PENDING = auto()\r\n    AFTER_QUOTE = auto()\r\n    IN_COMMENT = auto()\r\n\r\n\r\n_BOM = \"\\ufeff\"\r\n_WS = (\" \", \"\\t\")\r\n\r\n\r\ndef _is_newline_start(ch: str) -\u003e bool:\r\n    return ch == \"\\r\" or ch == \"\\n\"\r\n\r\n\r\ndef _consume_newline(text: str, pos: int, line: int, col: int, n: int):\r\n    \"\"\"Consume one logical newline (\\\\r\\\\n, \\\\r, or \\\\n) at ``pos``.\r\n\r\n    Returns the advanced (pos, line, col). Caller must have already\r\n    verified that a newline starts at ``pos``.\r\n    \"\"\"\r\n    if text[pos] == \"\\r\":\r\n        if pos + 1 \u003c n and text[pos + 1] == \"\\n\":\r\n            return pos + 2, line + 1, 1\r\n        return pos + 1, line + 1, 1\r\n    # text[pos] == \"\\n\"\r\n    return pos + 1, line + 1, 1\r\n\r\n\r\ndef parse(text: str) -\u003e list[list[str]]:\r\n    \"\"\"Parse ``text`` (already-decoded str) into a list of rows of fields.\r\n\r\n    See module docstring for the dialect rules enforced.\r\n    \"\"\"\r\n    n = len(text)\r\n    pos = 0\r\n    line = 1\r\n    col = 1\r\n\r\n    # A UTF-8 BOM is only legal at absolute offset zero. It is consumed\r\n    # silently and does not occupy a column of its own.\r\n    if n \u003e 0 and text[0] == _BOM:\r\n        pos = 1\r\n\r\n    rows: list[list[str]] = []\r\n    row: list[str] = []\r\n    field_chars: list[str] = []\r\n    state = _State.FIELD_START\r\n    row_start_untouched = True\r\n    quote_start_line = 0\r\n    quote_start_col = 0\r\n\r\n    def commit_field(value: str) -\u003e None:\r\n        row.append(value)\r\n\r\n    def commit_row() -\u003e None:\r\n        rows.append(row.copy())\r\n        row.clear()\r\n\r\n    while pos \u003c n:\r\n        ch = text[pos]\r\n\r\n        if ch == _BOM:\r\n            raise ParseError(\r\n                \"Byte-order mark is only permitted at the start of input\", line, col\r\n            )\r\n\r\n        if state == _State.FIELD_START:\r\n            if ch in _WS:\r\n                pos += 1\r\n                col += 1\r\n                continue\r\n            if row_start_untouched and ch == \"#\":\r\n                state = _State.IN_COMMENT\r\n                pos += 1\r\n                col += 1\r\n                continue\r\n            if row_start_untouched and _is_newline_start(ch):\r\n                # Blank line: consume it and stay ready for a new row.\r\n                pos, line, col = _consume_newline(text, pos, line, col, n)\r\n                continue\r\n            row_start_untouched = False\r\n            if ch == '\"':\r\n                quote_start_line, quote_start_col = line, col\r\n                field_chars = []\r\n                state = _State.IN_QUOTED\r\n                pos += 1\r\n                col += 1\r\n                continue\r\n            if ch == \",\":\r\n                commit_field(\"\")\r\n                pos += 1\r\n                col += 1\r\n                continue\r\n            if _is_newline_start(ch):\r\n                commit_field(\"\")\r\n                commit_row()\r\n                pos, line, col = _consume_newline(text, pos, line, col, n)\r\n                row_start_untouched = True\r\n                continue\r\n            # First real character of an unquoted field.\r\n            field_chars = [ch]\r\n            state = _State.IN_UNQUOTED\r\n            pos += 1\r\n            col += 1\r\n            continue\r\n\r\n        if state == _State.IN_UNQUOTED:\r\n            if ch == \",\":\r\n                commit_field(\"\".join(field_chars).rstrip(\" \\t\"))\r\n                field_chars = []\r\n                state = _State.FIELD_START\r\n                pos += 1\r\n                col += 1\r\n                continue\r\n            if _is_newline_start(ch):\r\n                commit_field(\"\".join(field_chars).rstrip(\" \\t\"))\r\n                field_chars = []\r\n                commit_row()\r\n                pos, line, col = _consume_newline(text, pos, line, col, n)\r\n                state = _State.FIELD_START\r\n                row_start_untouched = True\r\n                continue\r\n            if ch == '\"':\r\n                raise ParseError(\r\n                    \"Unexpected quote character inside an unquoted field\",\r\n                    line,\r\n                    col,\r\n                )\r\n            field_chars.append(ch)\r\n            pos += 1\r\n            col += 1\r\n            continue\r\n\r\n        if state == _State.IN_QUOTED:\r\n            if ch == '\"':\r\n                state = _State.QUOTE_PENDING\r\n                pos += 1\r\n                col += 1\r\n                continue\r\n            if _is_newline_start(ch):\r\n                pos, line, col = _consume_newline(text, pos, line, col, n)\r\n                field_chars.append(\"\\n\")\r\n                continue\r\n            field_chars.append(ch)\r\n            pos += 1\r\n            col += 1\r\n            continue\r\n\r\n        if state == _State.QUOTE_PENDING:\r\n            if ch == '\"':\r\n                # Doubled quote: escaped literal quote.\r\n                field_chars.append('\"')\r\n                state = _State.IN_QUOTED\r\n                pos += 1\r\n                col += 1\r\n                continue\r\n            # Field is closed; re-process this character in AFTER_QUOTE\r\n            # without consuming it.\r\n            state = _State.AFTER_QUOTE\r\n            continue\r\n\r\n        if state == _State.AFTER_QUOTE:\r\n            if ch in _WS:\r\n                pos += 1\r\n                col += 1\r\n                continue\r\n            if ch == \",\":\r\n                commit_field(\"\".join(field_chars))\r\n                field_chars = []\r\n                state = _State.FIELD_START\r\n                pos += 1\r\n                col += 1\r\n                continue\r\n            if _is_newline_start(ch):\r\n                commit_field(\"\".join(field_chars))\r\n                field_chars = []\r\n                commit_row()\r\n                pos, line, col = _consume_newline(text, pos, line, col, n)\r\n                state = _State.FIELD_START\r\n                row_start_untouched = True\r\n                continue\r\n            raise ParseError(\r\n                f\"Unexpected character {ch!r} after closing quote; \"\r\n                \"expected a comma or a newline\",\r\n                line,\r\n                col,\r\n            )\r\n\r\n        if state == _State.IN_COMMENT:\r\n            if _is_newline_start(ch):\r\n                pos, line, col = _consume_newline(text, pos, line, col, n)\r\n                state = _State.FIELD_START\r\n                row_start_untouched = True\r\n                continue\r\n            pos += 1\r\n            col += 1\r\n            continue\r\n\r\n    # End of input reached. Finalize any pending field/row.\r\n    if state == _State.FIELD_START:\r\n        if not (row_start_untouched and not row):\r\n            commit_field(\"\")\r\n            commit_row()\r\n    elif state == _State.IN_UNQUOTED:\r\n        commit_field(\"\".join(field_chars).rstrip(\" \\t\"))\r\n        commit_row()\r\n    elif state == _State.AFTER_QUOTE or state == _State.QUOTE_PENDING:\r\n        commit_field(\"\".join(field_chars))\r\n        commit_row()\r\n    elif state == _State.IN_QUOTED:\r\n        raise ParseError(\r\n            \"Unterminated quoted field (opening quote never closed)\",\r\n            quote_start_line,\r\n            quote_start_col,\r\n        )\r\n    # IN_COMMENT at EOF: nothing to commit, comment simply ends.\r\n\r\n    return rows\r\n"},"role":"primary-output","safe_href":"track-state-machine/loop-01/parser.py","sha256":"c34dccb244878b48ddb577d53c8458a6426a1cdd8d2de11f966dcd890b4bc2ac"},"primary_value":5,"prompt":{"input_feedback":"None -- first loop of the Track.","judge_feedback":"correctness 5/5, robustness 4/5, error_clarity 4/5, maintainability 2/5, constraint_adherence 5/5. All objective tests and blocking core samples pass; the material weakness is architectural (monolithic function, duplicated advance logic), not a correctness/robustness defect.","next_prompt":"Refactor to fix the maintainability weakness (extract a Scanner class owning pos/line/col with advance/advance_newline helpers; give each state its own handler method) without changing observable behavior. Promote the 15 ad-hoc adversarial probes into committed tests and add more, focusing on error-location precision.","track_prompt":"Hand-roll a robust Python parser for a messy vendor CSV dialect without importing the standard-library csv module... Architecture constraint: implement an explicit whole-input character state machine with named states/invariants and precise source positions. Keep it simple and testable. This is Loop 1 of 2: baseline architecture and objective tests."},"quality_gates":{"core_samples":"pass","objective_tests":"pass"},"score_values":{"constraint_adherence":5,"correctness":5,"error_clarity":4,"maintainability":2,"robustness":4},"scores":[{"criterion_id":"correctness","notes":"30/30 objective tests pass, including all 3 blocking core samples.","scorer_id":"self-judge-track-state-machine","value":5},{"criterion_id":"robustness","notes":"15 ad-hoc adversarial probes all behaved correctly, but only informally verified (not yet committed as repeatable tests).","scorer_id":"self-judge-track-state-machine","value":4},{"criterion_id":"error_clarity","notes":"Every ParseError carries accurate 1-based line/column and a clear reason, but lacks row/field context.","scorer_id":"self-judge-track-state-machine","value":4},{"criterion_id":"maintainability","notes":"One ~250-line procedural function with ~15x duplicated position-advance logic; real weakness.","scorer_id":"self-judge-track-state-machine","value":2},{"criterion_id":"constraint_adherence","notes":"No csv/pandas/third-party import; genuine named-state character state machine over a single linear scan.","scorer_id":"self-judge-track-state-machine","value":5}],"stop_reason":null,"topology_depth":0,"track_id":"track-state-machine","track_index":0,"track_label":"Character-state-machine architecture"},{"artifacts":[{"diagnostics":[],"id":"track-state-machine-loop-02-parser","kind":"code","label":"loop-02 parser.py (Track champion)","path":"track-state-machine/loop-02/parser.py","presentation":{"alt_text":"Python source implementing a character-state-machine CSV parser with a Scanner class and per-state handler methods.","caption":"Refactored character-state-machine CSV parser: _Scanner + per-state _Machine handlers, row/field-aware ParseError.","comparison_key":"parser-snapshot","featured":true,"mode":"code","primary":true},"preview":{"kind":"text","language":"py","value":"\"\"\"Hand-rolled parser for a messy vendor CSV dialect.\r\n\r\nArchitecture\r\n------------\r\nThis module implements a single-pass, whole-input **character state\r\nmachine**. The entire input string is scanned once (with multi-character\r\nnewline sequences such as ``\\\\r\\\\n`` collapsed into a single logical\r\ntransition). A small ``_State`` enum names every state the machine can be\r\nin; a dedicated handler method exists per state, and each handler's\r\ndocstring records its invariants and the transitions it may take. A\r\n``_Scanner`` helper owns the raw cursor (character offset, 1-based line,\r\n1-based column) and centralizes the two primitive moves every state needs\r\n(``advance`` over an ordinary character, ``advance_newline`` over a\r\nlogical newline), so precise source positions are computed in exactly one\r\nplace instead of being duplicated across every branch.\r\n\r\nThis is loop-02 of the ``track-state-machine`` Track. It keeps loop-01's\r\nproven state/transition design (all 30 loop-01 tests still pass unchanged)\r\nbut refactors the single ~250-line procedural function into:\r\n\r\n  * ``_Scanner``       -- owns pos/line/col, the only place that advances them.\r\n  * ``_Machine``        -- owns the field/row buffers and one small handler\r\n                           method per ``_State`` member.\r\n  * ``ParseError``      -- now also reports which row/field was being\r\n                           parsed when the problem was found, in addition\r\n                           to the 1-based line/column.\r\n\r\nNo use of the standard-library ``csv`` module, ``pandas``, or any\r\nthird-party parsing library.\r\n\r\nPublic API\r\n----------\r\n``ParseError`` -- raised for any malformed input; message includes a\r\n1-based line and column plus the row/field index being parsed.\r\n\r\n``parse(text: str) -\u003e list[list[str]]`` -- parse the given text into rows\r\nof string fields.\r\n\"\"\"\r\n\r\nfrom __future__ import annotations\r\n\r\nfrom enum import Enum, auto\r\n\r\n\r\nclass ParseError(Exception):\r\n    \"\"\"Raised when the input cannot be parsed as valid vendor CSV.\r\n\r\n    Attributes:\r\n        line: 1-based line number where the problem was detected.\r\n        col: 1-based column number where the problem was detected.\r\n        row_number: 1-based index of the logical row being parsed.\r\n        field_number: 1-based index of the field within that row.\r\n    \"\"\"\r\n\r\n    def __init__(self, reason: str, line: int, col: int, row_number: int, field_number: int):\r\n        self.line = line\r\n        self.col = col\r\n        self.row_number = row_number\r\n        self.field_number = field_number\r\n        super().__init__(\r\n            f\"{reason} (line {line}, column {col}, row {row_number}, field {field_number})\"\r\n        )\r\n\r\n\r\nclass _State(Enum):\r\n    \"\"\"Named states of the whole-input character state machine.\r\n\r\n    FIELD_START\r\n        Positioned at the start of a field (either the first field of a\r\n        row, right after a row boundary, or any later field right after a\r\n        comma). Leading spaces/tabs are consumed here without being kept.\r\n        When this is the *first* field attempt of a fresh row\r\n        (``row_start_untouched`` is True) a ``#`` means \"comment line\" and\r\n        an immediate newline/EOF means \"blank line\" -- neither produces a\r\n        row.\r\n    IN_UNQUOTED\r\n        Accumulating characters of an unquoted field. Terminates on\r\n        comma, newline, or EOF. A literal quote character here is\r\n        malformed.\r\n    IN_QUOTED\r\n        Accumulating characters of a quoted field verbatim (interior\r\n        whitespace preserved). Newlines are normalized to ``\\\\n``. A quote\r\n        character transitions to QUOTE_PENDING to disambiguate an escaped\r\n        quote from field closure.\r\n    QUOTE_PENDING\r\n        Just saw a ``\"`` while inside a quoted field. If the next\r\n        character is also ``\"`` this is a doubled-quote escape and we\r\n        return to IN_QUOTED. Otherwise the field is closed and we move to\r\n        AFTER_QUOTE without consuming the next character.\r\n    AFTER_QUOTE\r\n        The quoted field's closing quote has been seen. Only spaces/tabs\r\n        are permitted until the field/row terminator (comma, newline, or\r\n        EOF); anything else is malformed.\r\n    IN_COMMENT\r\n        Consuming (and discarding) the remainder of a comment line, up to\r\n        but not including its terminating newline.\r\n    \"\"\"\r\n\r\n    FIELD_START = auto()\r\n    IN_UNQUOTED = auto()\r\n    IN_QUOTED = auto()\r\n    QUOTE_PENDING = auto()\r\n    AFTER_QUOTE = auto()\r\n    IN_COMMENT = auto()\r\n\r\n\r\n_BOM = \"\\ufeff\"\r\n_WS = (\" \", \"\\t\")\r\n\r\n\r\ndef _is_newline_start(ch: str) -\u003e bool:\r\n    return ch == \"\\r\" or ch == \"\\n\"\r\n\r\n\r\nclass _Scanner:\r\n    \"\"\"Owns the raw cursor over the input text.\r\n\r\n    Invariant: ``line``/``col`` always describe the position of the\r\n    character at ``text[pos]`` (or, at end of input, the position one past\r\n    the last character). This is the *only* class allowed to mutate\r\n    ``pos``/``line``/``col`` -- every state handler goes through\r\n    ``advance`` or ``advance_newline`` instead of touching them directly.\r\n    \"\"\"\r\n\r\n    __slots__ = (\"text\", \"n\", \"pos\", \"line\", \"col\")\r\n\r\n    def __init__(self, text: str, start_pos: int = 0):\r\n        self.text = text\r\n        self.n = len(text)\r\n        self.pos = start_pos\r\n        self.line = 1\r\n        self.col = 1\r\n\r\n    def at_eof(self) -\u003e bool:\r\n        return self.pos \u003e= self.n\r\n\r\n    def peek(self) -\u003e str:\r\n        \"\"\"Return the character at the cursor. Caller must check at_eof().\"\"\"\r\n        return self.text[self.pos]\r\n\r\n    def advance(self) -\u003e None:\r\n        \"\"\"Move past one ordinary (non-newline) character.\"\"\"\r\n        self.pos += 1\r\n        self.col += 1\r\n\r\n    def advance_newline(self) -\u003e None:\r\n        \"\"\"Move past one logical newline: \\\\r\\\\n, bare \\\\r, or bare \\\\n.\"\"\"\r\n        if self.text[self.pos] == \"\\r\" and self.pos + 1 \u003c self.n and self.text[self.pos + 1] == \"\\n\":\r\n            self.pos += 2\r\n        else:\r\n            self.pos += 1\r\n        self.line += 1\r\n        self.col = 1\r\n\r\n\r\nclass _Machine:\r\n    \"\"\"Drives the state machine over one full input string.\"\"\"\r\n\r\n    def __init__(self, text: str):\r\n        # A UTF-8 BOM is only legal at absolute offset zero. It is\r\n        # consumed silently and does not occupy a column of its own.\r\n        start_pos = 1 if text[:1] == _BOM else 0\r\n        self.sc = _Scanner(text, start_pos)\r\n        self.rows: list[list[str]] = []\r\n        self.row: list[str] = []\r\n        self.field_chars: list[str] = []\r\n        self.state = _State.FIELD_START\r\n        self.row_start_untouched = True\r\n        self.row_number = 1\r\n        self.field_number = 1\r\n        self.quote_start_line = 0\r\n        self.quote_start_col = 0\r\n\r\n    # -- error helper --------------------------------------------------\r\n    def _error(self, reason: str) -\u003e ParseError:\r\n        return ParseError(reason, self.sc.line, self.sc.col, self.row_number, self.field_number)\r\n\r\n    # -- field/row bookkeeping ------------------------------------------\r\n    def _commit_field(self, value: str) -\u003e None:\r\n        self.row.append(value)\r\n        self.field_number += 1\r\n\r\n    def _commit_row(self) -\u003e None:\r\n        self.rows.append(self.row.copy())\r\n        self.row.clear()\r\n        self.row_number += 1\r\n        self.field_number = 1\r\n\r\n    # -- per-state handlers ----------------------------------------------\r\n    def _step_field_start(self, ch: str) -\u003e None:\r\n        \"\"\"At the start of a field: skip padding, classify the row if needed.\"\"\"\r\n        sc = self.sc\r\n        if ch in _WS:\r\n            sc.advance()\r\n            return\r\n        if self.row_start_untouched and ch == \"#\":\r\n            self.state = _State.IN_COMMENT\r\n            sc.advance()\r\n            return\r\n        if self.row_start_untouched and _is_newline_start(ch):\r\n            # Blank/whitespace-only physical line: discard, no row emitted.\r\n            sc.advance_newline()\r\n            return\r\n        self.row_start_untouched = False\r\n        if ch == '\"':\r\n            self.quote_start_line, self.quote_start_col = sc.line, sc.col\r\n            self.field_chars = []\r\n            self.state = _State.IN_QUOTED\r\n            sc.advance()\r\n            return\r\n        if ch == \",\":\r\n            self._commit_field(\"\")\r\n            sc.advance()\r\n            return\r\n        if _is_newline_start(ch):\r\n            self._commit_field(\"\")\r\n            self._commit_row()\r\n            sc.advance_newline()\r\n            self.row_start_untouched = True\r\n            return\r\n        # First real character of an unquoted field.\r\n        self.field_chars = [ch]\r\n        self.state = _State.IN_UNQUOTED\r\n        sc.advance()\r\n\r\n    def _step_in_unquoted(self, ch: str) -\u003e None:\r\n        \"\"\"Accumulating an unquoted field; a quote here is malformed.\"\"\"\r\n        sc = self.sc\r\n        if ch == \",\":\r\n            self._commit_field(\"\".join(self.field_chars).rstrip(\" \\t\"))\r\n            self.field_chars = []\r\n            self.state = _State.FIELD_START\r\n            sc.advance()\r\n            return\r\n        if _is_newline_start(ch):\r\n            self._commit_field(\"\".join(self.field_chars).rstrip(\" \\t\"))\r\n            self.field_chars = []\r\n            self._commit_row()\r\n            sc.advance_newline()\r\n            self.state = _State.FIELD_START\r\n            self.row_start_untouched = True\r\n            return\r\n        if ch == '\"':\r\n            raise self._error(\"Unexpected quote character inside an unquoted field\")\r\n        self.field_chars.append(ch)\r\n        sc.advance()\r\n\r\n    def _step_in_quoted(self, ch: str) -\u003e None:\r\n        \"\"\"Inside a quoted field: verbatim content, newlines normalized.\"\"\"\r\n        sc = self.sc\r\n        if ch == '\"':\r\n            self.state = _State.QUOTE_PENDING\r\n            sc.advance()\r\n            return\r\n        if _is_newline_start(ch):\r\n            sc.advance_newline()\r\n            self.field_chars.append(\"\\n\")\r\n            return\r\n        self.field_chars.append(ch)\r\n        sc.advance()\r\n\r\n    def _step_quote_pending(self, ch: str) -\u003e None:\r\n        \"\"\"Just saw a quote inside a quoted field: escape or close?\"\"\"\r\n        if ch == '\"':\r\n            # Doubled quote: escaped literal quote, field stays open.\r\n            self.field_chars.append('\"')\r\n            self.state = _State.IN_QUOTED\r\n            self.sc.advance()\r\n            return\r\n        # Field is closed; re-process this same character in AFTER_QUOTE\r\n        # without consuming it (no cursor movement here).\r\n        self.state = _State.AFTER_QUOTE\r\n\r\n    def _step_after_quote(self, ch: str) -\u003e None:\r\n        \"\"\"After a quoted field's closing quote: only padding, then terminator.\"\"\"\r\n        sc = self.sc\r\n        if ch in _WS:\r\n            sc.advance()\r\n            return\r\n        if ch == \",\":\r\n            self._commit_field(\"\".join(self.field_chars))\r\n            self.field_chars = []\r\n            self.state = _State.FIELD_START\r\n            sc.advance()\r\n            return\r\n        if _is_newline_start(ch):\r\n            self._commit_field(\"\".join(self.field_chars))\r\n            self.field_chars = []\r\n            self._commit_row()\r\n            sc.advance_newline()\r\n            self.state = _State.FIELD_START\r\n            self.row_start_untouched = True\r\n            return\r\n        raise self._error(\r\n            f\"Unexpected character {ch!r} after closing quote; expected a comma or a newline\"\r\n        )\r\n\r\n    def _step_in_comment(self, ch: str) -\u003e None:\r\n        \"\"\"Discarding the remainder of a comment line.\"\"\"\r\n        sc = self.sc\r\n        if _is_newline_start(ch):\r\n            sc.advance_newline()\r\n            self.state = _State.FIELD_START\r\n            self.row_start_untouched = True\r\n            return\r\n        sc.advance()\r\n\r\n    _HANDLERS = {\r\n        _State.FIELD_START: _step_field_start,\r\n        _State.IN_UNQUOTED: _step_in_unquoted,\r\n        _State.IN_QUOTED: _step_in_quoted,\r\n        _State.QUOTE_PENDING: _step_quote_pending,\r\n        _State.AFTER_QUOTE: _step_after_quote,\r\n        _State.IN_COMMENT: _step_in_comment,\r\n    }\r\n\r\n    def run(self) -\u003e list[list[str]]:\r\n        sc = self.sc\r\n        while not sc.at_eof():\r\n            ch = sc.peek()\r\n            if ch == _BOM:\r\n                raise self._error(\"Byte-order mark is only permitted at the start of input\")\r\n            self._HANDLERS[self.state](self, ch)\r\n        self._finalize()\r\n        return self.rows\r\n\r\n    def _finalize(self) -\u003e None:\r\n        \"\"\"Handle input that ends without a trailing newline.\"\"\"\r\n        if self.state == _State.FIELD_START:\r\n            if not (self.row_start_untouched and not self.row):\r\n                self._commit_field(\"\")\r\n                self._commit_row()\r\n        elif self.state == _State.IN_UNQUOTED:\r\n            self._commit_field(\"\".join(self.field_chars).rstrip(\" \\t\"))\r\n            self._commit_row()\r\n        elif self.state in (_State.AFTER_QUOTE, _State.QUOTE_PENDING):\r\n            self._commit_field(\"\".join(self.field_chars))\r\n            self._commit_row()\r\n        elif self.state == _State.IN_QUOTED:\r\n            raise ParseError(\r\n                \"Unterminated quoted field (opening quote never closed)\",\r\n                self.quote_start_line,\r\n                self.quote_start_col,\r\n                self.row_number,\r\n                self.field_number,\r\n            )\r\n        # IN_COMMENT at EOF: nothing to commit, comment simply ends.\r\n\r\n\r\ndef parse(text: str) -\u003e list[list[str]]:\r\n    \"\"\"Parse ``text`` (already-decoded str) into a list of rows of fields.\r\n\r\n    See module docstring for the dialect rules enforced.\r\n    \"\"\"\r\n    return _Machine(text).run()\r\n"},"role":"primary-output","safe_href":"track-state-machine/loop-02/parser.py","sha256":"04774123096c1d39dd5c7a951c3a583acb2d359f3ba0df75eab3e50a66d60130"},{"diagnostics":[],"id":"track-state-machine-loop-02-tests","kind":"code","label":"loop-02 test_parser.py","path":"track-state-machine/loop-02/test_parser.py","presentation":{"caption":"53 unittest cases: all 30 loop-01 cases retained verbatim plus 23 new adversarial/error-location cases.","featured":false,"mode":"code","primary":false},"preview":{"kind":"text","language":"py","value":"\"\"\"Objective tests for the loop-02 refactored character-state-machine parser.\r\n\r\nLoop-02 keeps all loop-01 behavior (every loop-01 test case is repeated here\r\nverbatim) and adds a substantially larger set of adversarial malformed-input\r\nand error-location cases -- most of which were only probed ad-hoc against\r\nloop-01 (see loop-01/test-result.txt) and are now committed, repeatable\r\ntests.\r\n\r\nRun with: python test_parser.py\r\n\"\"\"\r\n\r\nimport unittest\r\n\r\nfrom parser import ParseError, parse\r\n\r\n\r\nclass TestBasicShapeAndAPI(unittest.TestCase):\r\n    def test_empty_input_returns_no_rows(self):\r\n        self.assertEqual(parse(\"\"), [])\r\n\r\n    def test_simple_two_row(self):\r\n        self.assertEqual(parse(\"a,b,c\\n1,2,3\\n\"), [[\"a\", \"b\", \"c\"], [\"1\", \"2\", \"3\"]])\r\n\r\n    def test_no_trailing_newline(self):\r\n        self.assertEqual(parse(\"a,b,c\"), [[\"a\", \"b\", \"c\"]])\r\n\r\n\r\nclass TestBomCommentsBlanks(unittest.TestCase):\r\n    def test_bom_at_start_is_stripped(self):\r\n        text = \"\\ufeffa,b\\n1,2\\n\"\r\n        self.assertEqual(parse(text), [[\"a\", \"b\"], [\"1\", \"2\"]])\r\n\r\n    def test_comment_lines_ignored(self):\r\n        text = \"# a comment\\na,b\\n   # indented comment\\n1,2\\n\"\r\n        self.assertEqual(parse(text), [[\"a\", \"b\"], [\"1\", \"2\"]])\r\n\r\n    def test_blank_lines_ignored(self):\r\n        text = \"a,b\\n\\n   \\n\\t\\n1,2\\n\"\r\n        self.assertEqual(parse(text), [[\"a\", \"b\"], [\"1\", \"2\"]])\r\n\r\n    def test_bom_comments_and_blanks_combined(self):\r\n        text = \"\\ufeff# header comment\\n\\na,b,c\\n\\n# mid comment\\n1,2,3\\n\"\r\n        self.assertEqual(parse(text), [[\"a\", \"b\", \"c\"], [\"1\", \"2\", \"3\"]])\r\n\r\n    def test_hash_not_at_start_of_line_is_literal(self):\r\n        # '#' only introduces a comment when it is the first non-whitespace\r\n        # character of the physical line -- not mid-field.\r\n        self.assertEqual(parse(\"a#b,c\\n\"), [[\"a#b\", \"c\"]])\r\n\r\n    def test_comment_with_no_trailing_newline_at_eof(self):\r\n        self.assertEqual(parse(\"a,b\\n#trailing comment\"), [[\"a\", \"b\"]])\r\n\r\n    def test_comment_only_file_produces_no_rows(self):\r\n        self.assertEqual(parse(\"# just a comment\\n\"), [])\r\n\r\n    def test_all_blank_and_comment_file_produces_no_rows(self):\r\n        self.assertEqual(parse(\"\\n \\n#c\\n\\t\\n\"), [])\r\n\r\n    def test_comment_immediately_after_bom_no_blank_line(self):\r\n        self.assertEqual(parse(\"\\ufeff#comment\\na,b\\n\"), [[\"a\", \"b\"]])\r\n\r\n\r\nclass TestQuotedFields(unittest.TestCase):\r\n    def test_quoted_comma(self):\r\n        self.assertEqual(parse('a,\"b,c\",d\\n'), [[\"a\", \"b,c\", \"d\"]])\r\n\r\n    def test_embedded_lf(self):\r\n        self.assertEqual(parse('a,\"line1\\nline2\",b\\n'), [[\"a\", \"line1\\nline2\", \"b\"]])\r\n\r\n    def test_embedded_crlf_normalized(self):\r\n        self.assertEqual(\r\n            parse('a,\"line1\\r\\nline2\",b\\n'), [[\"a\", \"line1\\nline2\", \"b\"]]\r\n        )\r\n\r\n    def test_embedded_bare_cr_normalized(self):\r\n        self.assertEqual(\r\n            parse('a,\"line1\\rline2\",b\\n'), [[\"a\", \"line1\\nline2\", \"b\"]]\r\n        )\r\n\r\n    def test_doubled_quote_escape(self):\r\n        self.assertEqual(parse('a,\"He said \"\"hi\"\"\",b\\n'), [[\"a\", 'He said \"hi\"', \"b\"]])\r\n\r\n    def test_comment_and_blank_look_alikes_retained_inside_quotes(self):\r\n        text = 'a,\"# not a comment\\n\\nstill quoted\",b\\n'\r\n        self.assertEqual(\r\n            parse(text), [[\"a\", \"# not a comment\\n\\nstill quoted\", \"b\"]]\r\n        )\r\n\r\n    def test_quoted_field_padding_spaces_trimmed_outside_quotes(self):\r\n        text = 'a,  \"value\"  ,b\\n'\r\n        self.assertEqual(parse(text), [[\"a\", \"value\", \"b\"]])\r\n\r\n    def test_quoted_field_preserves_interior_whitespace(self):\r\n        text = 'a,\"  spaced out  \",b\\n'\r\n        self.assertEqual(parse(text), [[\"a\", \"  spaced out  \", \"b\"]])\r\n\r\n    def test_empty_quoted_pair(self):\r\n        self.assertEqual(parse('\"\",\"\"\\n'), [[\"\", \"\"]])\r\n\r\n    def test_quoted_field_flush_at_eof_without_trailing_delimiter(self):\r\n        self.assertEqual(parse('a,\"b\"'), [[\"a\", \"b\"]])\r\n\r\n    def test_quote_immediately_reopened_yields_literal_quote_field(self):\r\n        # '\"\"\"\"' == open, doubled-quote (one literal '\"'), close.\r\n        self.assertEqual(parse('a,\"\"\"\",b\\n'), [[\"a\", '\"', \"b\"]])\r\n\r\n    def test_quoted_field_then_eof_right_after_comma(self):\r\n        self.assertEqual(parse('a,\"b\",'), [[\"a\", \"b\", \"\"]])\r\n\r\n\r\nclass TestRaggedRowsAndEmptyFields(unittest.TestCase):\r\n    def test_ragged_rows_preserved(self):\r\n        text = \"a,b,c\\n1,2\\nx,y,z,w\\n\"\r\n        self.assertEqual(\r\n            parse(text), [[\"a\", \"b\", \"c\"], [\"1\", \"2\"], [\"x\", \"y\", \"z\", \"w\"]]\r\n        )\r\n\r\n    def test_many_ragged_rows(self):\r\n        text = \"a\\nb,c\\nd,e,f\\ng\\n\"\r\n        self.assertEqual(parse(text), [[\"a\"], [\"b\", \"c\"], [\"d\", \"e\", \"f\"], [\"g\"]])\r\n\r\n    def test_empty_fields_and_trailing_comma(self):\r\n        text = \"a,,b,\\n\"\r\n        self.assertEqual(parse(text), [[\"a\", \"\", \"b\", \"\"]])\r\n\r\n    def test_leading_comma_produces_empty_first_field(self):\r\n        text = \",a\\n\"\r\n        self.assertEqual(parse(text), [[\"\", \"a\"]])\r\n\r\n    def test_lone_comma_row(self):\r\n        text = \",\\n\"\r\n        self.assertEqual(parse(text), [[\"\", \"\"]])\r\n\r\n\r\nclass TestTrimming(unittest.TestCase):\r\n    def test_unquoted_surrounding_whitespace_trimmed(self):\r\n        text = \"  a  ,  b b  ,c\\n\"\r\n        self.assertEqual(parse(text), [[\"a\", \"b b\", \"c\"]])\r\n\r\n    def test_unquoted_all_whitespace_field_becomes_empty(self):\r\n        text = \"a,   ,b\\n\"\r\n        self.assertEqual(parse(text), [[\"a\", \"\", \"b\"]])\r\n\r\n    def test_unquoted_tabs_only_field_becomes_empty(self):\r\n        text = \"a,\\t \\t,b\\n\"\r\n        self.assertEqual(parse(text), [[\"a\", \"\", \"b\"]])\r\n\r\n    def test_non_trim_whitespace_chars_preserved_in_unquoted_field(self):\r\n        # Vertical tab / form feed are not part of the trim set (only\r\n        # space and tab are); they must be preserved as literal content.\r\n        text = \"a,\\x0bx\\x0c,b\\n\"\r\n        self.assertEqual(parse(text), [[\"a\", \"\\x0bx\\x0c\", \"b\"]])\r\n\r\n\r\nclass TestCrOnlyLines(unittest.TestCase):\r\n    def test_cr_only_physical_lines(self):\r\n        text = \"a,b\\r1,2\\r\"\r\n        self.assertEqual(parse(text), [[\"a\", \"b\"], [\"1\", \"2\"]])\r\n\r\n    def test_mixed_crlf_and_lf_row_separators(self):\r\n        text = \"a,b\\r\\nc,d\\n\"\r\n        self.assertEqual(parse(text), [[\"a\", \"b\"], [\"c\", \"d\"]])\r\n\r\n\r\nclass TestUnicode(unittest.TestCase):\r\n    def test_unicode_content_preserved(self):\r\n        self.assertEqual(\r\n            parse(\"a,h\\u00e9llo w\\u00f6rld \\U0001F600,c\\n\"),\r\n            [[\"a\", \"h\\u00e9llo w\\u00f6rld \\U0001F600\", \"c\"]],\r\n        )\r\n\r\n\r\nclass TestCoreBlockingSamples(unittest.TestCase):\r\n    \"\"\"Blocking core samples: a Loop failing any of these must be rejected.\"\"\"\r\n\r\n    def test_core_embedded_comma(self):\r\n        self.assertEqual(parse('name,\"Doe, John\",age\\n'), [[\"name\", \"Doe, John\", \"age\"]])\r\n\r\n    def test_core_embedded_newline(self):\r\n        self.assertEqual(\r\n            parse('a,\"multi\\nline\",c\\n'), [[\"a\", \"multi\\nline\", \"c\"]]\r\n        )\r\n\r\n    def test_core_doubled_quote_escaping(self):\r\n        self.assertEqual(parse('\"a\"\"b\",c\\n'), [['a\"b', \"c\"]])\r\n\r\n\r\nclass TestMalformedInputs(unittest.TestCase):\r\n    def test_quote_in_unquoted_field_raises_with_position(self):\r\n        with self.assertRaises(ParseError) as ctx:\r\n            parse('a,b\"c,d\\n')\r\n        err = ctx.exception\r\n        self.assertEqual(err.line, 1)\r\n        self.assertEqual(err.col, 4)\r\n        self.assertIn(\"line 1\", str(err))\r\n        self.assertIn(\"column 4\", str(err))\r\n\r\n    def test_quote_in_unquoted_field_reports_row_and_field(self):\r\n        with self.assertRaises(ParseError) as ctx:\r\n            parse('x,y\\na,b\"c,d\\n')\r\n        err = ctx.exception\r\n        self.assertEqual(err.line, 2)\r\n        self.assertEqual(err.col, 4)\r\n        self.assertEqual(err.row_number, 2)\r\n        self.assertEqual(err.field_number, 2)\r\n\r\n    def test_non_whitespace_after_closing_quote_raises_with_position(self):\r\n        with self.assertRaises(ParseError) as ctx:\r\n            parse('a,\"b\"c,d\\n')\r\n        err = ctx.exception\r\n        self.assertEqual(err.line, 1)\r\n        self.assertEqual(err.col, 6)\r\n\r\n    def test_unterminated_quote_raises_with_open_position(self):\r\n        with self.assertRaises(ParseError) as ctx:\r\n            parse('a,\"b,c\\n')\r\n        err = ctx.exception\r\n        self.assertEqual(err.line, 1)\r\n        self.assertEqual(err.col, 3)\r\n\r\n    def test_unterminated_quote_after_odd_trailing_quotes(self):\r\n        # 'b\"\"' is 'b' followed by an escaped literal quote: the field is\r\n        # still open and needs one more real closing quote.\r\n        with self.assertRaises(ParseError) as ctx:\r\n            parse('a,\"b\"\"')\r\n        err = ctx.exception\r\n        self.assertEqual(err.line, 1)\r\n        self.assertEqual(err.col, 3)\r\n\r\n    def test_still_open_field_after_quote_then_comma_inside_quotes(self):\r\n        # 'b\"\",c\\n' inside quotes: the pair after b is a doubled quote, so\r\n        # the comma and 'c' are literal content and the field never closes.\r\n        with self.assertRaises(ParseError):\r\n            parse('a,\"b\"\",c\\n')\r\n\r\n    def test_multiline_quoted_field_error_position_tracks_embedded_newlines(self):\r\n        # Two embedded newlines inside the quoted field must advance the\r\n        # line counter correctly before the error is raised on line 3.\r\n        with self.assertRaises(ParseError) as ctx:\r\n            parse('a,\"line1\\nline2\\nline3\"X,d\\n')\r\n        err = ctx.exception\r\n        self.assertEqual(err.line, 3)\r\n        self.assertEqual(err.col, 7)\r\n\r\n    def test_bom_away_from_start_raises_with_position(self):\r\n        with self.assertRaises(ParseError) as ctx:\r\n            parse('a,b\\n\\ufeffc,d\\n')\r\n        err = ctx.exception\r\n        self.assertEqual(err.line, 2)\r\n        self.assertEqual(err.col, 1)\r\n\r\n    def test_bom_as_last_character_of_file_raises(self):\r\n        with self.assertRaises(ParseError) as ctx:\r\n            parse('a,b\\n\\ufeff')\r\n        err = ctx.exception\r\n        self.assertEqual(err.line, 2)\r\n        self.assertEqual(err.col, 1)\r\n\r\n    def test_bom_inside_unquoted_field_raises(self):\r\n        with self.assertRaises(ParseError) as ctx:\r\n            parse('a\\ufeffb,c\\n')\r\n        err = ctx.exception\r\n        self.assertEqual(err.line, 1)\r\n        self.assertEqual(err.col, 2)\r\n\r\n    def test_bom_inside_comment_line_raises(self):\r\n        with self.assertRaises(ParseError):\r\n            parse('a,b\\n#comment \\ufeffwith bom\\n')\r\n\r\n    def test_error_message_mentions_line_and_column_words(self):\r\n        with self.assertRaises(ParseError) as ctx:\r\n            parse('a,\"b,c\\n')\r\n        msg = str(ctx.exception)\r\n        self.assertIn(\"line\", msg)\r\n        self.assertIn(\"column\", msg)\r\n\r\n    def test_error_message_mentions_row_and_field_words(self):\r\n        with self.assertRaises(ParseError) as ctx:\r\n            parse('a,\"b,c\\n')\r\n        msg = str(ctx.exception)\r\n        self.assertIn(\"row\", msg)\r\n        self.assertIn(\"field\", msg)\r\n\r\n\r\nclass TestNoStdlibCsvImport(unittest.TestCase):\r\n    def test_source_does_not_import_csv(self):\r\n        with open(\"parser.py\", \"r\", encoding=\"utf-8\") as f:\r\n            source = f.read()\r\n        self.assertNotIn(\"import csv\", source)\r\n        self.assertNotIn(\"from csv\", source)\r\n\r\n\r\nif __name__ == \"__main__\":\r\n    unittest.main(verbosity=2)\r\n"},"role":"test-suite","safe_href":"track-state-machine/loop-02/test_parser.py","sha256":"d7ea112ccb6c9672df36646b5e53fbfdf232f5b1f6b48c60710c9a8016913bf0"},{"diagnostics":[],"id":"track-state-machine-loop-02-result","kind":"result","label":"loop-02 test-result.txt","path":"track-state-machine/loop-02/test-result.txt","presentation":{"caption":"Full `python test_parser.py` transcript, counts (53/53 passed), and a description of what changed vs loop-01.","featured":false,"mode":"log","primary":false},"preview":{"kind":"text","language":"txt","value":"Track: track-state-machine (character-state-machine architecture)\r\nLoop: loop-02 (refactor + expanded adversarial coverage)\r\nModel: claude-sonnet-5\r\n\r\nCommand:\r\n    python test_parser.py\r\n\r\nFull out
