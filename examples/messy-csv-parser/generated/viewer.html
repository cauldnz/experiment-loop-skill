ation/test-result.txt","sha256":"999d1b51810c14cd5e5117083c9d45bdc0230fd7939523c9cac0675553a7e4b1"},{"diagnostics":[],"id":"shared-bakeoff-summary","kind":"json","label":"Shared bakeoff summary","path":"cross-evaluation/summary.json","presentation":{"caption":"Machine-readable shared test count, pass state, failures, and blocking-core results.","featured":false,"mode":"structured_json","primary":false},"preview":{"kind":"json","value":{"blocking_core_samples":{"line-regex":"pass","state-machine":"pass"},"failures":[],"passed":true,"suite":"shared architecture-neutral bakeoff","tests_run":64}},"role":"objective-evidence","safe_href":"cross-evaluation/summary.json","sha256":"a4a63a947e173b02a4517981b3ad4d4b8fff4331ccbe85bb5efbfd72c5453067"},{"diagnostics":[],"id":"independent-terra-judge","kind":"judge-note","label":"Independent qualitative judge","path":"judging/independent-judge.md","presentation":{"caption":"Blind-first-pass gpt-5.6-terra tie-break selecting the state-machine base without overriding objective tests.","featured":true,"mode":"markdown","primary":false},"preview":{"kind":"text","language":"md","value":"# Independent qualitative judge\r\n\r\n**Judge model:** `gpt-5.6-terra`  \r\n**Decision:** select `track-state-machine` as the synthesis base.\r\n\r\n## Scope and objective gate\r\n\r\nThis is an independent qualitative tie-break, not a replacement for objective\r\ntesting. I inspected the two final parsers and final test files, both loop-02\r\ntest transcripts and provisional judge notes, and the complete cross-evaluation\r\nbundle (`test_bakeoff.py`, `test-result.txt`, and `summary.json`).\r\n\r\nThe shared bakeoff is the primary gate: it reports **64/64 passed** for the two\r\ncandidates together, no failures, and all blocking samples passed for each.\r\nI also reran `python test_bakeoff.py`: 64/64 passed. The local final suites also\r\npassed when rerun (38/38 and 53/53 respectively). Therefore correctness is\r\nrecorded as **5.0/5 for both candidates**. Track-local test counts are not\r\ncompared or used to select a winner.\r\n\r\n## Blind first pass\r\n\r\nIdentities were withheld while assigning the following labels and scores.\r\nQualitative scores only break the objective parity.\r\n\r\n| Criterion (weight) | Candidate A | Candidate B |\r\n|---|---:|---:|\r\n| Correctness (.40) | 5.0 | 5.0 |\r\n| Robustness (.20) | 4.6 | 4.8 |\r\n| Error clarity (.15) | 4.5 | 5.0 |\r\n| Maintainability (.15) | 4.2 | 4.8 |\r\n| Constraint adherence (.10) | 5.0 | 5.0 |\r\n| **Weighted total** | **4.745** | **4.940** |\r\n\r\n### Candidate A\r\n\r\nCandidate A has a compact, understandable decomposition: line segmentation\r\n(`_physical_lines`, lines 43-52), logical-record assembly (lines 55-127), then\r\nfield tokenization (lines 130-156). It explicitly tests both structural\r\nrecognition and regex tokenization. Its direct categories, such as\r\n`\"quote in unquoted field\"` (line 107) and\r\n`\"non-whitespace after closing quote before delimiter\"` (lines 97-101), are\r\nactionable; `_location` returns 1-based physical positions (lines 29-40).\r\n\r\nIts maintainability cost is that one grammar is represented twice: quote-state\r\nlogic in `_logical_records` (especially lines 74-112) and a second, dense\r\nregular expression in `_FIELD` (lines 16-26). Correct mapping through logical\r\nmultiline records also requires per-character `source_offsets` bookkeeping\r\n(lines 71, 117, 130-142). Those parts are valid and passed the common tests,\r\nbut make grammar changes and error-path review less localized. Error messages\r\nalso omit row and field context.\r\n\r\n### Candidate B\r\n\r\nCandidate B makes the parser grammar explicit in `_State` (lines 65-105), and\r\ncentralizes cursor ownership and all physical line/column movement in\r\n`_Scanner` (lines 115-153). The state handlers are short, named units with\r\nclear branch-local behavior: unquoted parsing at lines 226-246, quoted parsing\r\nat lines 248-260, quote disambiguation at lines 262-272, and post-quote\r\nvalidation at lines 274-296. The dispatch table (lines 308-315) exposes the\r\ncomplete transition surface.\r\n\r\n`ParseError` carries and reports 1-based line, column, row, and field values\r\n(lines 45-62); errors are raised at the current scanner position (lines\r\n174-176), while an unterminated field deliberately points to its opening quote\r\n(lines 339-346). This is precise and more useful to a caller than position-only\r\ntext. One residual trade-off prevents a perfect maintainability score: handler\r\nmethods coordinate through mutable machine buffers (`row`, `field_chars`, and\r\nstate initialized at lines 164-172), so state invariants still need disciplined\r\nreview.\r\n\r\n## Unblinding and recommendation\r\n\r\n- Candidate A = `line-regex`\r\n- Candidate B = `track-state-machine`\r\n\r\nChoose **`track-state-machine`**. Its margin comes from legible named\r\ntransitions, one authoritative physical-position mechanism, and richer,\r\nactionable `ParseError` context. Both satisfy the no-`csv` constraint verified\r\nby the shared bakeoff (test source lines 99-103) and both remain objectively\r\ncorrect.\r\n\r\n## Dissent and uncertainty\r\n\r\nThe line/regex design is shorter and its structural pre-scan is a reasonable\r\nsolution; it is not rejected for a test failure. Its local tests include useful\r\nnon-string input coverage, but that is not a shared requirement and did not\r\nchange the correctness score. Conversely, the state-machine’s mutable\r\nobject-wide buffers and larger implementation mean the preference is\r\nqualitative, not absolute. No helper is recommended for transplant from the\r\nrejected architecture: its offset-map and regex pipeline would duplicate the\r\nwinner’s scanner/state responsibilities.\r\n\r\n## Explicit gate statement\r\n\r\nObjective tests were **not overridden**: both finalists pass all 64 shared\r\ntests and all blocking samples. This recommendation only selects a base\r\narchitecture for synthesis after that objective parity.\r\n"},"role":"independent-assessment","safe_href":"judging/independent-judge.md","sha256":"1e3bddfa41dfdcbf501f8287b4c1efcb3187aa7dfba91451da8c7462e71a5c92"},{"diagnostics":[],"id":"independent-terra-scores","kind":"json","label":"Independent judge scores","path":"judging/scores.json","presentation":{"caption":"Machine-readable blind candidate scores, mapping, winner, and explicit objective non-override.","featured":false,"mode":"structured_json","primary":false},"preview":{"kind":"json","value":{"blind_candidates":{"Candidate A":{"scores":{"constraint_adherence":5.0,"correctness":5.0,"error_clarity":4.5,"maintainability":4.2,"robustness":4.6},"track_id":"line-regex","weighted_total":4.745},"Candidate B":{"scores":{"constraint_adherence":5.0,"correctness":5.0,"error_clarity":5.0,"maintainability":4.8,"robustness":4.8},"track_id":"track-state-machine","weighted_total":4.94}},"candidate_mapping":{"Candidate A":"line-regex","Candidate B":"track-state-machine"},"judge_role":"independent_qualitative_judge","model_id":"gpt-5.6-terra","objective_gate":{"authoritative_result":"both finalists pass all 64 shared tests and all blocking samples","independent_rerun":{"command":"python generated\\cross-evaluation\\test_bakeoff.py","result":"64 passed"},"objective_tests_overridden":false,"shared_suite":{"blocking_core_samples":{"line-regex":"pass","track-state-machine":"pass"},"failures":[],"passed":true,"tests_run":64},"status":"pass"},"proven_helpers_for_synthesis":{"items":[],"reason":"No rejected-track helper is both independently proven necessary and architecture-compatible. Importing the regex record/offset pipeline would duplicate the selected scanner and state-transition responsibilities."},"recommendation_basis":"Objective correctness is tied at 5.0; the state-machine is preferred solely for clearer transitions, centralized physical coordinates, and row/field-aware errors.","schema_version":"1.0","scoring_order":"blind_first_pass","weights":{"constraint_adherence":0.1,"correctness":0.4,"error_clarity":0.15,"maintainability":0.15,"robustness":0.2},"winner_track_id":"track-state-machine"}},"role":"independent-assessment","safe_href":"judging/scores.json","sha256":"dd6e5e1b6ce0a38054d46fddc3cc631aaa7655db107f16a23673747878710d96"},{"diagnostics":[],"id":"independent-terra-prompt-history","kind":"prompt-history","label":"Independent judge prompt history","path":"judging/prompt-history.md","presentation":{"caption":"Prompt and evidence scope supplied to the independent qualitative judge.","featured":false,"mode":"markdown","primary":false},"preview":{"kind":"text","language":"md","value":"# Independent judge prompt and feedback chain\r\n\r\n## Judge prompt\r\n\r\nAct as the independent qualitative judge for the two-track parser experiment.\r\nInspect the specified final parser/test files, loop-02 test results and\r\nprovisional notes, plus the shared cross-evaluation files. Treat the fact that\r\nboth finalists pass all 64 shared tests and all blocking samples as\r\nnon-overridable. Blind the first scoring pass as Candidate A/B. Score\r\nmaintainability and error clarity on a 0-5 scale; record correctness as 5.0 for\r\nboth and optionally score robustness and constraint adherence. Use weights:\r\ncorrectness .40, robustness .20, error clarity .15, maintainability .15, and\r\nconstraint adherence .10. Qualitative scores only break objective parity.\r\nWrite the independent judgment, structured scores, this prompt chain, and\r\nstatus under `generated\\judging\\`; choose a base architecture for synthesis.\r\nDo not modify the tracks, prompt, cross-evaluation, or `.github`.\r\n\r\n## Input evidence inspected identically\r\n\r\n1. `generated\\track-line-regex\\final\\parser.py`\r\n2. `generated\\track-line-regex\\final\\test_parser.py`\r\n3. `generated\\track-line-regex\\loop-02\\test-result.txt`\r\n4. `generated\\track-line-regex\\loop-02\\judge.md` (provisional only)\r\n5. `generated\\track-state-machine\\final\\parser.py`\r\n6. `generated\\track-state-machine\\final\\test_parser.py`\r\n7. `generated\\track-state-machine\\loop-02\\test-result.txt`\r\n8. `generated\\track-state-machine\\loop-02\\judge.md` (provisional only)\r\n9. `generated\\cross-evaluation\\test_bakeoff.py`\r\n10. `generated\\cross-evaluation\\test-result.txt`\r\n11. `generated\\cross-evaluation\\summary.json`\r\n\r\nIndependent verification commands and results:\r\n\r\n```text\r\npython generated\\cross-evaluation\\test_bakeoff.py        -\u003e 64 passed\r\npython generated\\track-line-regex\\final\\test_parser.py   -\u003e 38 passed\r\npython generated\\track-state-machine\\final\\test_parser.py -\u003e 53 passed\r\n```\r\n\r\nThe differing local-suite counts are evidence of each track's own regression\r\ncoverage only; they were not used as a cross-track score.\r\n\r\n## Provisional judge feedback received, not adopted as final\r\n\r\n- Line/regex self-judge: 38/38 local tests; provisional weighted score 4.85.\r\n  It credited source-offset maps, quote classification, and location checks.\r\n- State-machine self-judge: 53/53 local tests; provisional scores included\r\n  maintainability 4 and error clarity 5. It credited `_Scanner`, named\r\n  handlers, and row/field error context.\r\n\r\nBoth sources explicitly described themselves as provisional self-assessments.\r\nThe independent judge reread the implementation and common test harness rather\r\nthan treating either provisional total as authoritative.\r\n\r\n## Independent judge feedback\r\n\r\nBlind scores: Candidate A 4.745, Candidate B 4.940. Both have correctness 5.0\r\nbecause the shared gate passes. Candidate B has the stronger qualitative case:\r\none cursor owner for 1-based physical positions, named grammar states, and\r\n`ParseError` row/field context. Candidate A remains a valid, objectively\r\npassing implementation; its regex grammar plus structural pre-scan and\r\nper-character offset mapping are less localized for evolution.\r\n\r\nAfter scoring, identities were revealed: Candidate A is `line-regex`; Candidate\r\nB is `track-state-machine`.\r\n\r\n## Next prompt to synthesis\r\n\r\n```text\r\nUse generated\\track-state-machine\\final\\parser.py as the base architecture.\r\nPreserve its shared-bakeoff behavior and its Scanner/State/ParseError\r\ninvariants. Do not import the rejected line-regex record/offset pipeline:\r\nthe independent judge found no rejected-track helper that is both necessary\r\nand architecture-compatible. Any change must retain the 64 shared-test pass\r\ngate and report errors with accurate 1-based physical line/column.\r\n```\r\n"},"role":"provenance","safe_href":"judging/prompt-history.md","sha256":"81a7aed6c985d9669f6072364de0cd2f6af1f75c8650863e1d057f5a464f500f"}],"changed_files":["synthesis/loop-01/parser.py","synthesis/loop-01/test_parser.py","synthesis/loop-01/test-result.txt","synthesis/loop-01/judge.md","synthesis/loop-01/metadata.json","synthesis/loop-01/prompt-history.md"],"commands":{"build":"Author generated/synthesis/loop-01/parser.py (winning state machine verbatim + non-string parse() guard) and test_parser.py (winning suite verbatim + inlined shared bakeoff cases + guard regression).","judge":"Self-assessment against the 5-criterion weighted scorecard in judge.md plus a union-testing/review probe and forbidden-import scan; objective tests dominate.","run":"cd generated\\synthesis\\loop-01 \u0026\u0026 python test_parser.py"},"decision":"new_best","hypothesis":"Preserving the winning state machine verbatim, committing one runnable union suite (winning 53 + local shared bakeoff 31), and adding only the rejected Track's non-string boundary guard will keep correctness at 5/5 while improving misuse diagnostics, without touching the architecture or importing csv.","id":"synthesis-loop-01","index":4,"is_champion":false,"label":"synthesis-loop-01","lesson":{"action":"Incorporate only the boundary-level guard (with cited evidence) and reject the scanner-duplicating regex/offset pipeline; commit the union of both Tracks' objective evidence locally to prove shared-suite compatibility.","confidence":"high","evidence":"87/87 pass; the non-string guard converts an opaque internal TypeError from slicing None into an actionable 'text must be str'; union testing revealed only an under-specified (not incorrect) Unicode-whitespace edge.","trigger":"The independent judge recorded zero architecture-compatible helpers from the rejected Track, yet the rejected Track carried a small, proven, architecture-neutral API idea (non-string guard) not covered by the shared suite."},"model_id":"claude-opus-4.8","outcome":"87/87 objective tests pass (53 winning-suite verbatim + 31 local shared bakeoff + 3 non-string guard); all 3 blocking core samples pass; forbidden-import scan passes. Union testing found no functional bug but surfaced an under-specified edge (Unicode-whitespace-only lines are data in the winner, ignorable in the rejected Track) that is a deliberate, self-consistent winner choice affecting no hard gate.","parent_ids":["line-regex-loop-02","track-state-machine-loop-02"],"primary_artifact":{"diagnostics":[],"id":"synthesis-loop-01-parser","kind":"python-source","label":"loop-01 parser.py","path":"synthesis/loop-01/parser.py","presentation":{"caption":"Winning state machine kept verbatim plus the incorporated non-string boundary guard.","comparison_key":"parser-snapshot","featured":false,"mode":"code","primary":true},"preview":{"kind":"text","language":"py","value":"\"\"\"Hand-rolled parser for a messy vendor CSV dialect -- synthesis loop-01.\r\n\r\nSynthesis provenance\r\n--------------------\r\nThis is loop-01 of the ``synthesis`` Track (model ``claude-opus-4.8``). It has\r\na multi-parent lineage: ``line-regex-loop-02`` (rejected architecture) and\r\n``track-state-machine-loop-02`` (winning architecture). Per the independent\r\n``gpt-5.6-terra`` judge (weighted 4.940 vs 4.745), the winning\r\ncharacter-state-machine architecture is kept verbatim: named ``_State``\r\ntransitions, a single ``_Scanner`` owning physical coordinates, and\r\n``ParseError`` carrying 1-based line/column plus row/field context.\r\n\r\nThe judge found **no** rejected-track helper both necessary and\r\narchitecture-compatible: its offset-map/regex pipeline (``_physical_lines``,\r\n``_logical_records``, ``_FIELD``, per-character ``source_offsets``) would\r\nduplicate this scanner/state-transition responsibility and is therefore\r\nexplicitly rejected. The one narrowly-proven, architecture-neutral idea that\r\n*is* incorporated from the rejected Track is its **non-string input guard**:\r\n``parse(None)`` (or any non-``str``) now raises a clear\r\n``TypeError(\"text must be str\")`` at the public boundary instead of an opaque\r\n``TypeError: 'NoneType' object is not subscriptable`` leaking from an internal\r\nstring slice. Evidence: ``track-line-regex/final/parser.py`` lines 161-162 and\r\nits committed test ``test_type_error_for_non_string`` (final test_parser.py\r\nlines 146-148), which passed in that Track. This is a boundary precondition,\r\nnot a parsing mechanism, so it changes nothing about the state machine.\r\n\r\nArchitecture (unchanged from the winning Track)\r\n-----------------------------------------------\r\nA single-pass, whole-input **character state machine**. The entire input\r\nstring is scanned once (with multi-character newline sequences such as\r\n``\\\\r\\\\n`` collapsed into a single logical transition). A small ``_State``\r\nenum names every state the machine can be in; a dedicated handler method\r\nexists per state, and each handler's docstring records its invariants and the\r\ntransitions it may take. A ``_Scanner`` helper owns the raw cursor (character\r\noffset, 1-based line, 1-based column) and centralizes the two primitive moves\r\nevery state needs (``advance`` over an ordinary character, ``advance_newline``\r\nover a logical newline), so precise source positions are computed in exactly\r\none place instead of being duplicated across every branch.\r\n\r\nNo use of the standard-library ``csv`` module, ``pandas``, or any third-party\r\nparsing library.\r\n\r\nPublic API\r\n----------\r\n``ParseError`` -- raised for any malformed input; message includes a 1-based\r\nline and column plus the row/field index being parsed.\r\n\r\n``parse(text: str) -\u003e list[list[str]]`` -- parse the given text into rows of\r\nstring fields. Raises ``TypeError`` if ``text`` is not a ``str``.\r\n\"\"\"\r\n\r\nfrom __future__ import annotations\r\n\r\nfrom enum import Enum, auto\r\n\r\n\r\nclass ParseError(Exception):\r\n    \"\"\"Raised when the input cannot be parsed as valid vendor CSV.\r\n\r\n    Attributes:\r\n        line: 1-based line number where the problem was detected.\r\n        col: 1-based column number where the problem was detected.\r\n        row_number: 1-based index of the logical row being parsed.\r\n        field_number: 1-based index of the field within that row.\r\n    \"\"\"\r\n\r\n    def __init__(self, reason: str, line: int, col: int, row_number: int, field_number: int):\r\n        self.line = line\r\n        self.col = col\r\n        self.row_number = row_number\r\n        self.field_number = field_number\r\n        super().__init__(\r\n            f\"{reason} (line {line}, column {col}, row {row_number}, field {field_number})\"\r\n        )\r\n\r\n\r\nclass _State(Enum):\r\n    \"\"\"Named states of the whole-input character state machine.\r\n\r\n    FIELD_START\r\n        Positioned at the start of a field (either the first field of a\r\n        row, right after a row boundary, or any later field right after a\r\n        comma). Leading spaces/tabs are consumed here without being kept.\r\n        When this is the *first* field attempt of a fresh row\r\n        (``row_start_untouched`` is True) a ``#`` means \"comment line\" and\r\n        an immediate newline/EOF means \"blank line\" -- neither produces a\r\n        row.\r\n    IN_UNQUOTED\r\n        Accumulating characters of an unquoted field. Terminates on\r\n        comma, newline, or EOF. A literal quote character here is\r\n        malformed.\r\n    IN_QUOTED\r\n        Accumulating characters of a quoted field verbatim (interior\r\n        whitespace preserved). Newlines are normalized to ``\\\\n``. A quote\r\n        character transitions to QUOTE_PENDING to disambiguate an escaped\r\n        quote from field closure.\r\n    QUOTE_PENDING\r\n        Just saw a ``\"`` while inside a quoted field. If the next\r\n        character is also ``\"`` this is a doubled-quote escape and we\r\n        return to IN_QUOTED. Otherwise the field is closed and we move to\r\n        AFTER_QUOTE without consuming the next character.\r\n    AFTER_QUOTE\r\n        The quoted field's closing quote has been seen. Only spaces/tabs\r\n        are permitted until the field/row terminator (comma, newline, or\r\n        EOF); anything else is malformed.\r\n    IN_COMMENT\r\n        Consuming (and discarding) the remainder of a comment line, up to\r\n        but not including its terminating newline.\r\n    \"\"\"\r\n\r\n    FIELD_START = auto()\r\n    IN_UNQUOTED = auto()\r\n    IN_QUOTED = auto()\r\n    QUOTE_PENDING = auto()\r\n    AFTER_QUOTE = auto()\r\n    IN_COMMENT = auto()\r\n\r\n\r\n_BOM = \"\\ufeff\"\r\n_WS = (\" \", \"\\t\")\r\n\r\n\r\ndef _is_newline_start(ch: str) -\u003e bool:\r\n    return ch == \"\\r\" or ch == \"\\n\"\r\n\r\n\r\nclass _Scanner:\r\n    \"\"\"Owns the raw cursor over the input text.\r\n\r\n    Invariant: ``line``/``col`` always describe the position of the\r\n    character at ``text[pos]`` (or, at end of input, the position one past\r\n    the last character). This is the *only* class allowed to mutate\r\n    ``pos``/``line``/``col`` -- every state handler goes through\r\n    ``advance`` or ``advance_newline`` instead of touching them directly.\r\n    \"\"\"\r\n\r\n    __slots__ = (\"text\", \"n\", \"pos\", \"line\", \"col\")\r\n\r\n    def __init__(self, text: str, start_pos: int = 0):\r\n        self.text = text\r\n        self.n = len(text)\r\n        self.pos = start_pos\r\n        self.line = 1\r\n        self.col = 1\r\n\r\n    def at_eof(self) -\u003e bool:\r\n        return self.pos \u003e= self.n\r\n\r\n    def peek(self) -\u003e str:\r\n        \"\"\"Return the character at the cursor. Caller must check at_eof().\"\"\"\r\n        return self.text[self.pos]\r\n\r\n    def advance(self) -\u003e None:\r\n        \"\"\"Move past one ordinary (non-newline) character.\"\"\"\r\n        self.pos += 1\r\n        self.col += 1\r\n\r\n    def advance_newline(self) -\u003e None:\r\n        \"\"\"Move past one logical newline: \\\\r\\\\n, bare \\\\r, or bare \\\\n.\"\"\"\r\n        if self.text[self.pos] == \"\\r\" and self.pos + 1 \u003c self.n and self.text[self.pos + 1] == \"\\n\":\r\n            self.pos += 2\r\n        else:\r\n            self.pos += 1\r\n        self.line += 1\r\n        self.col = 1\r\n\r\n\r\nclass _Machine:\r\n    \"\"\"Drives the state machine over one full input string.\"\"\"\r\n\r\n    def __init__(self, text: str):\r\n        # A UTF-8 BOM is only legal at absolute offset zero. It is\r\n        # consumed silently and does not occupy a column of its own.\r\n        start_pos = 1 if text[:1] == _BOM else 0\r\n        self.sc = _Scanner(text, start_pos)\r\n        self.rows: list[list[str]] = []\r\n        self.row: list[str] = []\r\n        self.field_chars: list[str] = []\r\n        self.state = _State.FIELD_START\r\n        self.row_start_untouched = True\r\n        self.row_number = 1\r\n        self.field_number = 1\r\n        self.quote_start_line = 0\r\n        self.quote_start_col = 0\r\n\r\n    # -- error helper --------------------------------------------------\r\n    def _error(self, reason: str) -\u003e ParseError:\r\n        return ParseError(reason, self.sc.line, self.sc.col, self.row_number, self.field_number)\r\n\r\n    # -- field/row bookkeeping ------------------------------------------\r\n    def _commit_field(self, value: str) -\u003e None:\r\n        self.row.append(value)\r\n        self.field_number += 1\r\n\r\n    def _commit_row(self) -\u003e None:\r\n        self.rows.append(self.row.copy())\r\n        self.row.clear()\r\n        self.row_number += 1\r\n        self.field_number = 1\r\n\r\n    # -- per-state handlers ----------------------------------------------\r\n    def _step_field_start(self, ch: str) -\u003e None:\r\n        \"\"\"At the start of a field: skip padding, classify the row if needed.\"\"\"\r\n        sc = self.sc\r\n        if ch in _WS:\r\n            sc.advance()\r\n            return\r\n        if self.row_start_untouched and ch == \"#\":\r\n            self.state = _State.IN_COMMENT\r\n            sc.advance()\r\n            return\r\n        if self.row_start_untouched and _is_newline_start(ch):\r\n            # Blank/whitespace-only physical line: discard, no row emitted.\r\n            sc.advance_newline()\r\n            return\r\n        self.row_start_untouched = False\r\n        if ch == '\"':\r\n            self.quote_start_line, self.quote_start_col = sc.line, sc.col\r\n            self.field_chars = []\r\n            self.state = _State.IN_QUOTED\r\n            sc.advance()\r\n            return\r\n        if ch == \",\":\r\n            self._commit_field(\"\")\r\n            sc.advance()\r\n            return\r\n        if _is_newline_start(ch):\r\n            self._commit_field(\"\")\r\n            self._commit_row()\r\n            sc.advance_newline()\r\n            self.row_start_untouched = True\r\n            return\r\n        # First real character of an unquoted field.\r\n        self.field_chars = [ch]\r\n        self.state = _State.IN_UNQUOTED\r\n        sc.advance()\r\n\r\n    def _step_in_unquoted(self, ch: str) -\u003e None:\r\n        \"\"\"Accumulating an unquoted field; a quote here is malformed.\"\"\"\r\n        sc = self.sc\r\n        if ch == \",\":\r\n            self._commit_field(\"\".join(self.field_chars).rstrip(\" \\t\"))\r\n            self.field_chars = []\r\n            self.state = _State.FIELD_START\r\n            sc.advance()\r\n            return\r\n        if _is_newline_start(ch):\r\n            self._commit_field(\"\".join(self.field_chars).rstrip(\" \\t\"))\r\n            self.field_chars = []\r\n            self._commit_row()\r\n            sc.advance_newline()\r\n            self.state = _State.FIELD_START\r\n            self.row_start_untouched = True\r\n            return\r\n        if ch == '\"':\r\n            raise self._error(\"Unexpected quote character inside an unquoted field\")\r\n        self.field_chars.append(ch)\r\n        sc.advance()\r\n\r\n    def _step_in_quoted(self, ch: str) -\u003e None:\r\n        \"\"\"Inside a quoted field: verbatim content, newlines normalized.\"\"\"\r\n        sc = self.sc\r\n        if ch == '\"':\r\n            self.state = _State.QUOTE_PENDING\r\n            sc.advance()\r\n            return\r\n        if _is_newline_start(ch):\r\n            sc.advance_newline()\r\n            self.field_chars.append(\"\\n\")\r\n            return\r\n        self.field_chars.append(ch)\r\n        sc.advance()\r\n\r\n    def _step_quote_pending(self, ch: str) -\u003e None:\r\n        \"\"\"Just saw a quote inside a quoted field: escape or close?\"\"\"\r\n        if ch == '\"':\r\n            # Doubled quote: escaped literal quote, field stays open.\r\n            self.field_chars.append('\"')\r\n            self.state = _State.IN_QUOTED\r\n            self.sc.advance()\r\n            return\r\n        # Field is closed; re-process this same character in AFTER_QUOTE\r\n        # without consuming it (no cursor movement here).\r\n        self.state = _State.AFTER_QUOTE\r\n\r\n    def _step_after_quote(self, ch: str) -\u003e None:\r\n        \"\"\"After a quoted field's closing quote: only padding, then terminator.\"\"\"\r\n        sc = self.sc\r\n        if ch in _WS:\r\n            sc.advance()\r\n            return\r\n        if ch == \",\":\r\n            self._commit_field(\"\".join(self.field_chars))\r\n            self.field_chars = []\r\n            self.state = _State.FIELD_START\r\n            sc.advance()\r\n            return\r\n        if _is_newline_start(ch):\r\n            self._commit_field(\"\".join(self.field_chars))\r\n            self.field_chars = []\r\n            self._commit_row()\r\n            sc.advance_newline()\r\n            self.state = _State.FIELD_START\r\n            self.row_start_untouched = True\r\n            return\r\n        raise self._error(\r\n            f\"Unexpected character {ch!r} after closing quote; expected a comma or a newline\"\r\n        )\r\n\r\n    def _step_in_comment(self, ch: str) -\u003e None:\r\n        \"\"\"Discarding the remainder of a comment line.\"\"\"\r\n        sc = self.sc\r\n        if _is_newline_start(ch):\r\n            sc.advance_newline()\r\n            self.state = _State.FIELD_START\r\n            self.row_start_untouched = True\r\n            return\r\n        sc.advance()\r\n\r\n    _HANDLERS = {\r\n        _State.FIELD_START: _step_field_start,\r\n        _State.IN_UNQUOTED: _step_in_unquoted,\r\n        _State.IN_QUOTED: _step_in_quoted,\r\n        _State.QUOTE_PENDING: _step_quote_pending,\r\n        _State.AFTER_QUOTE: _step_after_quote,\r\n        _State.IN_COMMENT: _step_in_comment,\r\n    }\r\n\r\n    def run(self) -\u003e list[list[str]]:\r\n        sc = self.sc\r\n        while not sc.at_eof():\r\n            ch = sc.peek()\r\n            if ch == _BOM:\r\n                raise self._error(\"Byte-order mark is only permitted at the start of input\")\r\n            self._HANDLERS[self.state](self, ch)\r\n        self._finalize()\r\n        return self.rows\r\n\r\n    def _finalize(self) -\u003e None:\r\n        \"\"\"Handle input that ends without a trailing newline.\"\"\"\r\n        if self.state == _State.FIELD_START:\r\n            if not (self.row_start_untouched and not self.row):\r\n                self._commit_field(\"\")\r\n                self._commit_row()\r\n        elif self.state == _State.IN_UNQUOTED:\r\n            self._commit_field(\"\".join(self.field_chars).rstrip(\" \\t\"))\r\n            self._commit_row()\r\n        elif self.state in (_State.AFTER_QUOTE, _State.QUOTE_PENDING):\r\n            self._commit_field(\"\".join(self.field_chars))\r\n            self._commit_row()\r\n        elif self.state == _State.IN_QUOTED:\r\n            raise ParseError(\r\n                \"Unterminated quoted field (opening quote never closed)\",\r\n                self.quote_start_line,\r\n                self.quote_start_col,\r\n                self.row_number,\r\n                self.field_number,\r\n            )\r\n        # IN_COMMENT at EOF: nothing to commit, comment simply ends.\r\n\r\n\r\ndef parse(text: str) -\u003e list[list[str]]:\r\n    \"\"\"Parse ``text`` (already-decoded str) into a list of rows of fields.\r\n\r\n    See module docstring for the dialect rules enforced. Raises ``TypeError``\r\n    if ``text`` is not a ``str`` (a boundary precondition incorporated from the\r\n    rejected line-regex Track; see module docstring for evidence).\r\n    \"\"\"\r\n    if not isinstance(text, str):\r\n        raise TypeError(\"text must be str\")\r\n    return _Machine(text).run()\r\n"},"role":"primary-output","safe_href":"synthesis/loop-01/parser.py","sha256":"1cacafd4954f651c1625bd3432a52004f7f71a76689db86caef0bec75ce27539"},"primary_value":5,"prompt":{"input_feedback":"Winning base = track-state-machine-loop-02 (53/53, Scanner + per-state handlers, ParseError with line/col/row/field). Rejected = line-regex-loop-02 (38/38, ValueError-based ParseError, offset/regex pipeline, non-string guard). Independent gpt-5.6-terra judge: winner 4.940 vs 4.745, proven_helpers_for_synthesis = [] because the regex offset/record pipeline would duplicate the scanner.","judge_feedback":"87/87 pass; blocking samples pass; forbidden-import scan pass; weighted 4.85. Accepted exactly one helper (non-string guard, evidence cited); rejected the regex/offset pipeline and the ValueError re-base. Union testing found no functional bug; surfaced a deliberate Unicode-whitespace edge.","next_prompt":"loop-02: improve only from this loop's real evidence with behavior-safe changes and dedicated regression tests -- expose ParseError.reason and pin the deliberate ASCII-only whitespace behavior; add runnable fixtures; do not manufacture a failure.","track_prompt":"Run the synthesis Track: keep the winning character-state-machine architecture, reconcile the strongest compatible test/API evidence from both Tracks, incorporate only narrowly-proven architecture-compatible helpers, never import csv, preserve the public API and dialect rules. loop-01: establish a fresh synthesis candidate and run the state-machine suite plus a synthesis-local copy of the shared suite. Multi-parent lineage [line-regex-loop-02, track-state-machine-loop-02]."},"quality_gates":{"core_samples":"pass","forbidden_import_scan":"pass","objective_tests":"pass"},"score_values":{"constraint_adherence":5,"correctness":5,"error_clarity":5,"maintainability":4,"robustness":5},"scores":[{"criterion_id":"correctness","notes":"87/87 objective tests pass incl. all 3 blocking samples and the full local shared suite.","scorer_id":"self-judge-synthesis","value":5},{"criterion_id":"robustness","notes":"Winning adversarial coverage + shared bakeoff + non-string boundary all committed and green.","scorer_id":"self-judge-synthesis","value":5},{"criterion_id":"error_clarity","notes":"ParseError reports line/column/row/field; misuse now yields an actionable TypeError.","scorer_id":"self-judge-synthesis","value":5},{"criterion_id":"maintainability","notes":"Scanner + per-state handlers; not 5 because handlers still mutate shared machine state.","scorer_id":"self-judge-synthesis","value":4},{"criterion_id":"constraint_adherence","notes":"No csv/pandas/third-party import; named-state character state machine preserved.","scorer_id":"self-judge-synthesis","value":5}],"stop_reason":null,"topology_depth":2,"track_id":"synthesis","track_index":0,"track_label":"Synthesis (keep winning architecture, selectively incorporate proven helpers)"},{"artifacts":[{"diagnostics":[],"id":"synthesis-loop-02-parser","kind":"python-source","label":"loop-02 parser.py (synthesis champion)","path":"synthesis/loop-02/parser.py","presentation":{"alt_text":"Python source implementing the character-state-machine CSV parser with a Scanner, per-state handlers, and a ParseError exposing reason/line/col/row/field.","caption":"Synthesis champion: winning state machine + non-string guard + additive ParseError.reason.","comparison_key":"parser-snapshot","featured":true,"mode":"code","primary":true},"preview":{"kind":"text","language":"py","value":"\"\"\"Hand-rolled parser for a messy vendor CSV dialect -- synthesis loop-02.\r\n\r\nSynthesis provenance\r\n--------------------\r\nThis is loop-02 of the ``synthesis`` Track (model ``claude-opus-4.8``), whose\r\nparent is ``synthesis-loop-01``. It changes no parsing behavior relative to\r\nloop-01. It makes exactly one measured, behavior-safe API improvement driven by\r\nloop-01 evidence (a review of the two Tracks' error APIs): ``ParseError`` now\r\nalso exposes a ``reason`` attribute -- the bare cause string, previously only\r\nrecoverable by substring-parsing the formatted message. The formatted message\r\nand every existing attribute (``line``/``col``/``row_number``/``field_number``)\r\nare unchanged, so all loop-01 tests pass unchanged. loop-02 additionally commits\r\nregression tests that pin the winner's deliberate ASCII-only structural-\r\nwhitespace behavior (the under-specified edge surfaced by loop-01 union testing)\r\nand load runnable sample fixtures.\r\n\r\nLineage note: loop-01 has a multi-parent lineage of ``line-regex-loop-02``\r\n(rejected architecture) and ``track-state-machine-loop-02`` (winning\r\narchitecture). Per the independent\r\n``gpt-5.6-terra`` judge (weighted 4.940 vs 4.745), the winning\r\ncharacter-state-machine architecture is kept verbatim: named ``_State``\r\ntransitions, a single ``_Scanner`` owning physical coordinates, and\r\n``ParseError`` carrying 1-based line/column plus row/field context.\r\n\r\nThe judge found **no** rejected-track helper both necessary and\r\narchitecture-compatible: its offset-map/regex pipeline (``_physical_lines``,\r\n``_logical_records``, ``_FIELD``, per-character ``source_offsets``) would\r\nduplicate this scanner/state-transition responsibility and is therefore\r\nexplicitly rejected. The one narrowly-proven, architecture-neutral idea that\r\n*is* incorporated from the rejected Track is its **non-string input guard**:\r\n``parse(None)`` (or any non-``str``) now raises a clear\r\n``TypeError(\"text must be str\")`` at the public boundary instead of an opaque\r\n``TypeError: 'NoneType' object is not subscriptable`` leaking from an internal\r\nstring slice. Evidence: ``track-line-regex/final/parser.py`` lines 161-162 and\r\nits committed test ``test_type_error_for_non_string`` (final test_parser.py\r\nlines 146-148), which passed in that Track. This is a boundary precondition,\r\nnot a parsing mechanism, so it changes nothing about the state machine.\r\n\r\nArchitecture (unchanged from the winning Track)\r\n-----------------------------------------------\r\nA single-pass, whole-input **character state machine**. The entire input\r\nstring is scanned once (with multi-character newline sequences such as\r\n``\\\\r\\\\n`` collapsed into a single logical transition). A small ``_State``\r\nenum names every state the machine can be in; a dedicated handler method\r\nexists per state, and each handler's docstring records its invariants and the\r\ntransitions it may take. A ``_Scanner`` helper owns the raw cursor (character\r\noffset, 1-based line, 1-based column) and centralizes the two primitive moves\r\nevery state needs (``advance`` over an ordinary character, ``advance_newline``\r\nover a logical newline), so precise source positions are computed in exactly\r\none place instead of being duplicated across every branch.\r\n\r\nNo use of the standard-library ``csv`` module, ``pandas``, or any third-party\r\nparsing library.\r\n\r\nPublic API\r\n----------\r\n``ParseError`` -- raised for any malformed input; message includes a 1-based\r\nline and column plus the row/field index being parsed.\r\n\r\n``parse(text: str) -\u003e list[list[str]]`` -- parse the given text into rows of\r\nstring fields. Raises ``TypeError`` if ``text`` is not a ``str``.\r\n\"\"\"\r\n\r\nfrom __future__ import annotations\r\n\r\nfrom enum import Enum, auto\r\n\r\n\r\nclass ParseError(Exception):\r\n    \"\"\"Raised when the input cannot be parsed as valid vendor CSV.\r\n\r\n    Attributes:\r\n        reason: the bare human-readable cause, without the coordinate suffix.\r\n        line: 1-based line number where the problem was detected.\r\n        col: 1-based column number where the problem was detected.\r\n        row_number: 1-based index of the logical row being parsed.\r\n        field_number: 1-based index of the field within that row.\r\n    \"\"\"\r\n\r\n    def __init__(self, reason: str, line: int, col: int, row_number: int, field_number: int):\r\n        self.reason = reason\r\n        self.line = line\r\n        self.col = col\r\n        self.row_number = row_number\r\n        self.field_number = field_number\r\n        super().__init__(\r\n            f\"{reason} (line {line}, column {col}, row {row_number}, field {field_number})\"\r\n        )\r\n\r\n\r\nclass _State(Enum):\r\n    \"\"\"Named states of the whole-input character state machine.\r\n\r\n    FIELD_START\r\n        Positioned at the start of a field (either the first field of a\r\n        row, right after a row boundary, or any later field right after a\r\n        comma). Leading spaces/tabs are consumed here without being kept.\r\n        When this is the *first* field attempt of a fresh row\r\n        (``row_start_untouched`` is True) a ``#`` means \"comment line\" and\r\n        an immediate newline/EOF means \"blank line\" -- neither produces a\r\n        row.\r\n    IN_UNQUOTED\r\n        Accumulating characters of an unquoted field. Terminates on\r\n        comma, newline, or EOF. A literal quote character here is\r\n        malformed.\r\n    IN_QUOTED\r\n        Accumulating characters of a quoted field verbatim (interior\r\n        whitespace preserved). Newlines are normalized to ``\\\\n``. A quote\r\n        character transitions to QUOTE_PENDING to disambiguate an escaped\r\n        quote from field closure.\r\n    QUOTE_PENDING\r\n        Just saw a ``\"`` while inside a quoted field. If the next\r\n        character is also ``\"`` this is a doubled-quote escape and we\r\n        return to IN_QUOTED. Otherwise the field is closed and we move to\r\n        AFTER_QUOTE without consuming the next character.\r\n    AFTER_QUOTE\r\n        The quoted field's closing quote has been seen. Only spaces/tabs\r\n        are permitted until the field/row terminator (comma, newline, or\r\n        EOF); anything else is malformed.\r\n    IN_COMMENT\r\n        Consuming (and discarding) the remainder of a comment line, up to\r\n        but not including its terminating newline.\r\n    \"\"\"\r\n\r\n    FIELD_START = auto()\r\n    IN_UNQUOTED = auto()\r\n    IN_QUOTED = auto()\r\n    QUOTE_PENDING = auto()\r\n    AFTER_QUOTE = auto()\r\n    IN_COMMENT = auto()\r\n\r\n\r\n_BOM = \"\\ufeff\"\r\n_WS = (\" \", \"\\t\")\r\n\r\n\r\ndef _is_newline_start(ch: str) -\u003e bool:\r\n    return ch == \"\\r\" or ch == \"\\n\"\r\n\r\n\r\nclass _Scanner:\r\n    \"\"\"Owns the raw cursor over the input text.\r\n\r\n    Invariant: ``line``/``col`` always describe the position of the\r\n    character at ``text[pos]`` (or, at end of input, the position one past\r\n    the last character). This is the *only* class allowed to mutate\r\n    ``pos``/``line``/``col`` -- every state handler goes through\r\n    ``advance`` or ``advance_newline`` instead of touching them directly.\r\n    \"\"\"\r\n\r\n    __slots__ = (\"text\", \"n\", \"pos\", \"line\", \"col\")\r\n\r\n    def __init__(self, text: str, start_pos: int = 0):\r\n        self.text = text\r\n        self.n = len(text)\r\n        self.pos = start_pos\r\n        self.line = 1\r\n        self.col = 1\r\n\r\n    def at_eof(self) -\u003e bool:\r\n        return self.pos \u003e= self.n\r\n\r\n    def peek(self) -\u003e str:\r\n        \"\"\"Return the character at the cursor. Caller must check at_eof().\"\"\"\r\n        return self.text[self.pos]\r\n\r\n    def advance(self) -\u003e None:\r\n        \"\"\"Move past one ordinary (non-newline) character.\"\"\"\r\n        self.pos += 1\r\n        self.col += 1\r\n\r\n    def advance_newline(self) -\u003e None:\r\n        \"\"\"Move past one logical newline: \\\\r\\\\n, bare \\\\r, or bare \\\\n.\"\"\"\r\n        if self.text[self.pos] == \"\\r\" and self.pos + 1 \u003c self.n and self.text[self.pos + 1] == \"\\n\":\r\n            self.pos += 2\r\n        else:\r\n            self.pos += 1\r\n        self.line += 1\r\n        self.col = 1\r\n\r\n\r\nclass _Machine:\r\n    \"\"\"Drives the state machine over one full input string.\"\"\"\r\n\r\n    def __init__(self, text: str):\r\n        # A UTF-8 BOM is only legal at absolute offset zero. It is\r\n        # consumed silently and does not occupy a column of its own.\r\n        start_pos = 1 if text[:1] == _BOM else 0\r\n        self.sc = _Scanner(text, start_pos)\r\n        self.rows: list[list[str]] = []\r\n        self.row: list[str] = []\r\n        self.field_chars: list[str] = []\r\n        self.state = _State.FIELD_START\r\n        self.row_start_untouched = True\r\n        self.row_number = 1\r\n        self.field_number = 1\r\n        self.quote_start_line = 0\r\n        self.quote_start_col = 0\r\n\r\n    # -- error helper --------------------------------------------------\r\n    def _error(self, reason: str) -\u003e ParseError:\r\n        return ParseError(reason, self.sc.line, self.sc.col, self.row_number, self.field_number)\r\n\r\n    # -- field/row bookkeeping ------------------------------------------\r\n    def _commit_field(self, value: str) -\u003e None:\r\n        self.row.append(value)\r\n        self.field_number += 1\r\n\r\n    def _commit_row(self) -\u003e None:\r\n        self.rows.append(self.row.copy())\r\n        self.row.clear()\r\n        self.row_number += 1\r\n        self.field_number = 1\r\n\r\n    # -- per-state handlers ----------------------------------------------\r\n    def _step_field_start(self, ch: str) -\u003e None:\r\n        \"\"\"At the start of a field: skip padding, classify the row if needed.\"\"\"\r\n        sc = self.sc\r\n        if ch in _WS:\r\n            sc.advance()\r\n            return\r\n        if self.row_start_untouched and ch == \"#\":\r\n            self.state = _State.IN_COMMENT\r\n            sc.advance()\r\n            return\r\n        if self.row_start_untouched and _is_newline_start(ch):\r\n            # Blank/whitespace-only physical line: discard, no row emitted.\r\n            sc.advance_newline()\r\n            return\r\n        self.row_start_untouched = False\r\n        if ch == '\"':\r\n            self.quote_start_line, self.quote_start_col = sc.line, sc.col\r\n            self.field_chars = []\r\n            self.state = _State.IN_QUOTED\r\n            sc.advance()\r\n            return\r\n        if ch == \",\":\r\n            self._commit_field(\"\")\r\n            sc.advance()\r\n            return\r\n        if _is_newline_start(ch):\r\n            self._commit_field(\"\")\r\n            self._commit_row()\r\n            sc.advance_newline()\r\n            self.row_start_untouched = True\r\n            return\r\n        # First real character of an unquoted field.\r\n        self.field_chars = [ch]\r\n        self.state = _State.IN_UNQUOTED\r\n        sc.advance()\r\n\r\n    def _step_in_unquoted(self, ch: str) -\u003e None:\r\n        \"\"\"Accumulating an unquoted field; a quote here is malformed.\"\"\"\r\n        sc = self.sc\r\n        if ch == \",\":\r\n            self._commit_field(\"\".join(self.field_chars).rstrip(\" \\t\"))\r\n            self.field_chars = []\r\n            self.state = _State.FIELD_START\r\n            sc.advance()\r\n            return\r\n        if _is_newline_start(ch):\r\n            self._commit_field(\"\".join(self.field_chars).rstrip(\" \\t\"))\r\n            self.field_chars = []\r\n            self._commit_row()\r\n            sc.advance_newline()\r\n            self.state = _State.FIELD_START\r\n            self.row_start_untouched = True\r\n            return\r\n        if ch == '\"':\r\n            raise self._error(\"Unexpected quote character inside an unquoted field\")\r\n        self.field_chars.append(ch)\r\n        sc.advance()\r\n\r\n    def _step_in_quoted(self, ch: str) -\u003e None:\r\n        \"\"\"Inside a quoted field: verbatim content, newlines normalized.\"\"\"\r\n        sc = self.sc\r\n        if ch == '\"':\r\n            self.state = _State.QUOTE_PENDING\r\n            sc.advance()\r\n            return\r\n        if _is_newline_start(ch):\r\n            sc.advance_newline()\r\n            self.field_chars.append(\"\\n\")\r\n            return\r\n        self.field_chars.append(ch)\r\n        sc.advance()\r\n\r\n    def _step_quote_pending(self, ch: str) -\u003e None:\r\n        \"\"\"Just saw a quote inside a quoted field: escape or close?\"\"\"\r\n        if ch == '\"':\r\n            # Doubled quote: escaped literal quote, field stays open.\r\n            self.field_chars.append('\"')\r\n            self.state = _State.IN_QUOTED\r\n            self.sc.advance()\r\n            return\r\n        # Field is closed; re-process this same character in AFTER_QUOTE\r\n        # without consuming it (no cursor movement here).\r\n        self.state = _State.AFTER_QUOTE\r\n\r\n    def _step_after_quote(self, ch: str) -\u003e None:\r\n        \"\"\"After a quoted field's closing quote: only padding, then terminator.\"\"\"\r\n        sc = self.sc\r\n        if ch in _WS:\r\n            sc.advance()\r\n            return\r\n        if ch == \",\":\r\n            self._commit_field(\"\".join(self.field_chars))\r\n            self.field_chars = []\r\n            self.state = _State.FIELD_START\r\n            sc.advance()\r\n            return\r\n        if _is_newline_start(ch):\r\n            self._commit_field(\"\".join(self.field_chars))\r\n            self.field_chars = []\r\n            self._commit_row()\r\n            sc.advance_newline()\r\n            self.state = _State.FIELD_START\r\n            self.row_start_untouched = True\r\n            return\r\n        raise self._error(\r\n            f\"Unexpected character {ch!r} after closing quote; expected a comma or a newline\"\r\n        )\r\n\r\n    def _step_in_comment(self, ch: str) -\u003e None:\r\n        \"\"\"Discarding the remainder of a comment line.\"\"\"\r\n        sc = self.sc\r\n        if _is_newline_start(ch):\r\n            sc.advance_newline()\r\n            self.state = _State.FIELD_START\r\n            self.row_start_untouched = True\r\n            return\r\n        sc.advance()\r\n\r\n    _HANDLERS = {\r\n        _State.FIELD_START: _step_field_start,\r\n        _State.IN_UNQUOTED: _step_in_unquoted,\r\n        _State.IN_QUOTED: _step_in_quoted,\r\n        _State.QUOTE_PENDING: _step_quote_pending,\r\n        _State.AFTER_QUOTE: _step_after_quote,\r\n        _State.IN_COMMENT: _step_in_comment,\r\n    }\r\n\r\n    def run(self) -\u003e list[list[str]]:\r\n        sc = self.sc\r\n        while not sc.at_eof():\r\n            ch = sc.peek()\r\n            if ch == _BOM:\r\n                raise self._error(\"Byte-order mark is only permitted at the start of input\")\r\n            self._HANDLERS[self.state](self, ch)\r\n        self._finalize()\r\n        return self.rows\r\n\r\n    def _finalize(self) -\u003e None:\r\n        \"\"\"Handle input that ends without a trailing newline.\"\"\"\r\n        if self.state == _State.FIELD_START:\r\n            if not (self.row_start_untouched and not self.row):\r\n                self._commit_field(\"\")\r\n                self._commit_row()\r\n        elif self.state == _State.IN_UNQUOTED:\r\n            self._commit_field(\"\".join(self.field_chars).rstrip(\" \\t\"))\r\n            self._commit_row()\r\n        elif self.state in (_State.AFTER_QUOTE, _State.QUOTE_PENDING):\r\n            self._commit_field(\"\".join(self.field_chars))\r\n            self._commit_row()\r\n        elif self.state == _State.IN_QUOTED:\r\n            raise ParseError(\r\n                \"Unterminated quoted field (opening quote never closed)\",\r\n                self.quote_start_line,\r\n                self.quote_start_col,\r\n                self.row_number,\r\n                self.field_number,\r\n            )\r\n        # IN_COMMENT at EOF: nothing to commit, comment simply ends.\r\n\r\n\r\ndef parse(text: str) -\u003e list[list[str]]:\r\n    \"\"\"Parse ``text`` (already-decoded str) into a list of rows of fields.\r\n\r\n    See module docstring for the dialect rules enforced. Raises ``TypeError``\r\n    if ``text`` is not a ``str`` (a boundary precondition incorporated from the\r\n    rejected line-regex Track; see module docstring for evidence).\r\n    \"\"\"\r\n    if not isinstance(text, str):\r\n        raise TypeError(\"text must be str\")\r\n    return _Machine(text).run()\r\n"},"role":"primary-output","safe_href":"synthesis/loop-02/parser.py","sha256":"8e5d76be27af670d91f4dff20120c6e877579c9ddeb0f6e5c3938f2b419d6ece"},{"diagnostics":[],"id":"synthesis-loop-02-tests","kind":"python-source","label":"loop-02 test_parser.py","path":"synthesis/loop-02/test_parser.py","presentation":{"caption":"97 tests: 87 inherited union suite + reason + Unicode-whitespace-pinning + fixture tests.","featured":false,"mode":"code","primary":false},"preview":{"kind":"text","language":"py","value":"\"\"\"Objective tests for the synthesis loop-02 parser.\r\n\r\nInherits the entire loop-01 union suite verbatim (winning state-machine suite +\r\nlocal shared bakeoff + non-string guard) and adds loop-02's evidence-driven\r\nadditions, all behavior-safe:\r\n\r\n  * ``TestParseErrorReasonAttribute`` -- the measured API-clarity improvement:\r\n    ``ParseError.reason`` exposes the bare cause; the formatted message and all\r\n    other attributes are unchanged.\r\n  * ``TestUnicodeWhitespacePinned`` -- pins the winner's deliberate ASCII-only\r\n    structural-whitespace behavior for Unicode-whitespace-only lines (the\r\n    under-specified edge surfaced by loop-01 union testing). No behavior change;\r\n    this closes the coverage/documentation gap.\r\n  * ``TestFixtures`` -- loads the runnable sample fixtures under ``fixtures/``.\r\n\r\nRun with: python test_parser.py\r\n\"\"\"\r\n\r\nimport re\r\nimport unittest\r\nfrom pathlib import Path\r\n\r\nfrom parser import ParseError, parse\r\n\r\n\r\n# ---------------------------------------------------------------------------\r\n# Winning track-state-machine loop-02 suite (reproduced verbatim)\r\n# ---------------------------------------------------------------------------\r\nclass TestBasicShapeAndAPI(unittest.TestCase):\r\n    def test_empty_input_returns_no_rows(self):\r\n        self.assertEqual(parse(\"\"), [])\r\n\r\n    def test_simple_two_row(self):\r\n        self.assertEqual(parse(\"a,b,c\\n1,2,3\\n\"), [[\"a\", \"b\", \"c\"], [\"1\", \"2\", \"3\"]])\r\n\r\n    def test_no_trailing_newline(self):\r\n        self.assertEqual(parse(\"a,b,c\"), [[\"a\", \"b\", \"c\"]])\r\n\r\n\r\nclass TestBomCommentsBlanks(unittest.TestCase):\r\n    def test_bom_at_start_is_stripped(self):\r\n        text = \"\\ufeffa,b\\n1,2\\n\"\r\n        self.assertEqual(parse(text), [[\"a\", \"b\"], [\"1\", \"2\"]])\r\n\r\n    def test_comment_lines_ignored(self):\r\n        text = \"# a comment\\na,b\\n   # indented comment\\n1,2\\n\"\r\n        self.assertEqual(parse(text), [[\"a\", \"b\"], [\"1\", \"2\"]])\r\n\r\n    def test_blank_lines_ignored(self):\r\n        text = \"a,b\\n\\n   \\n\\t\\n1,2\\n\"\r\n        self.assertEqual(parse(text), [[\"a\", \"b\"], [\"1\", \"2\"]])\r\n\r\n    def test_bom_comments_and_blanks_combined(self):\r\n        text = \"\\ufeff# header comment\\n\\na,b,c\\n\\n# mid comment\\n1,2,3\\n\"\r\n        self.assertEqual(parse(text), [[\"a\", \"b\", \"c\"], [\"1\", \"2\", \"3\"]])\r\n\r\n    def test_hash_not_at_start_of_line_is_literal(self):\r\n        # '#' only introduces a comment when it is the first non-whitespace\r\n        # character of the physical line -- not mid-field.\r\n        self.assertEqual(parse(\"a#b,c\\n\"), [[\"a#b\", \"c\"]])\r\n\r\n    def test_comment_with_no_trailing_newline_at_eof(self):\r\n        self.assertEqual(parse(\"a,b\\n#trailing comment\"), [[\"a\", \"b\"]])\r\n\r\n    def test_comment_only_file_produces_no_rows(self):\r\n        self.assertEqual(parse(\"# just a comment\\n\"), [])\r\n\r\n    def test_all_blank_and_comment_file_produces_no_rows(self):\r\n        self.assertEqual(parse(\"\\n \\n#c\\n\\t\\n\"), [])\r\n\r\n    def test_comment_immediately_after_bom_no_blank_line(self):\r\n        self.assertEqual(parse(\"\\ufeff#comment\\na,b\\n\"), [[\"a\", \"b\"]])\r\n\r\n\r\nclass TestQuotedFields(unittest.TestCase):\r\n    def test_quoted_comma(self):\r\n        self.assertEqual(parse('a,\"b,c\",d\\n'), [[\"a\", \"b,c\", \"d\"]])\r\n\r\n    def test_embedded_lf(self):\r\n        self.assertEqual(parse('a,\"line1\\nline2\",b\\n'), [[\"a\", \"line1\\nline2\", \"b\"]])\r\n\r\n    def test_embedded_crlf_normalized(self):\r\n        self.assertEqual(\r\n            parse('a,\"line1\\r\\nline2\",b\\n'), [[\"a\", \"line1\\nline2\", \"b\"]]\r\n        )\r\n\r\n    def test_embedded_bare_cr_normalized(self):\r\n        self.assertEqual(\r\n            parse('a,\"line1\\rline2\",b\\n'), [[\"a\", \"line1\\nline2\", \"b\"]]\r\n        )\r\n\r\n    def test_doubled_quote_escape(self):\r\n        self.assertEqual(parse('a,\"He said \"\"hi\"\"\",b\\n'), [[\"a\", 'He said \"hi\"', \"b\"]])\r\n\r\n    def test_comment_and_blank_look_alikes_retained_inside_quotes(self):\r\n        text = 'a,\"# not a comment\\n\\nstill quoted\",b\\n'\r\n        self.assertEqual(\r\n            parse(text), [[\"a\", \"# not a comment\\n\\nstill quoted\", \"b\"]]\r\n        )\r\n\r\n    def test_quoted_field_padding_spaces_trimmed_outside_quotes(self):\r\n        text = 'a,  \"value\"  ,b\\n'\r\n        self.assertEqual(parse(text), [[\"a\", \"value\", \"b\"]])\r\n\r\n    def test_quoted_field_preserves_interior_whitespace(self):\r\n        text = 'a,\"  spaced out  \",b\\n'\r\n        self.assertEqual(parse(text), [[\"a\", \"  spaced out  \", \"b\"]])\r\n\r\n    def test_empty_quoted_pair(self):\r\n        self.assertEqual(parse('\"\",\"\"\\n'), [[\"\", \"\"]])\r\n\r\n    def test_quoted_field_flush_at_eof_without_trailing_delimiter(self):\r\n        self.assertEqual(parse('a,\"b\"'), [[\"a\", \"b\"]])\r\n\r\n    def test_quote_immediately_reopened_yields_literal_quote_field(self):\r\n        # '\"\"\"\"' == open, doubled-quote (one literal '\"'), close.\r\n        self.assertEqual(parse('a,\"\"\"\",b\\n'), [[\"a\", '\"', \"b\"]])\r\n\r\n    def test_quoted_field_then_eof_right_after_comma(self):\r\n        self.assertEqual(parse('a,\"b\",'), [[\"a\", \"b\", \"\"]])\r\n\r\n\r\nclass TestRaggedRowsAndEmptyFields(unittest.TestCase):\r\n    def test_ragged_rows_preserved(self):\r\n        text = \"a,b,c\\n1,2\\nx,y,z,w\\n\"\r\n        self.assertEqual(\r\n            parse(text), [[\"a\", \"b\", \"c\"], [\"1\", \"2\"], [\"x\", \"y\", \"z\", \"w\"]]\r\n        )\r\n\r\n    def test_many_ragged_rows(self):\r\n        text = \"a\\nb,c\\nd,e,f\\ng\\n\"\r\n        self.assertEqual(parse(text), [[\"a\"], [\"b\", \"c\"], [\"d\", \"e\", \"f\"], [\"g\"]])\r\n\r\n    def test_empty_fields_and_trailing_comma(self):\r\n        text = \"a,,b,\\n\"\r\n        self.assertEqual(parse(text), [[\"a\", \"\", \"b\", \"\"]])\r\n\r\n    def test_leading_comma_produces_empty_first_field(self):\r\n        text = \",a\\n\"\r\n        self.assertEqual(parse(text), [[\"\", \"a\"]])\r\n\r\n    def test_lone_comma_row(self):\r\n        text = \",\\n\"\r\n        self.assertEqual(parse(text), [[\"\", \"\"]])\r\n\r\n\r\nclass TestTrimming(unittest.TestCase):\r\n    def test_unquoted_surrounding_whitespace_trimmed(self):\r\n        text = \"  a  ,  b b  ,c\\n\"\r\n        self.assertEqual(parse(text), [[\"a\", \"b b\", \"c\"]])\r\n\r\n    def test_unquoted_all_whitespace_field_becomes_empty(self):\r\n        text = \"a,   ,b\\n\"\r\n        self.assertEqual(parse(text), [[\"a\", \"\", \"b\"]])\r\n\r\n    def test_unquoted_tabs_only_field_becomes_empty(self):\r\n        text = \"a,\\t \\t,b\\n\"\r\n        self.assertEqual(parse(text), [[\"a\", \"\", \"b\"]])\r\n\r\n    def test_non_trim_whitespace_chars_preserved_in_unquoted_field(self):\r\n        # Vertical tab / form feed are not part of the trim set (only\r\n        # space and tab are); they must be preserved as literal content.\r\n        text = \"a,\\x0bx\\x0c,b\\n\"\r\n        self.assertEqual(parse(text), [[\"a\", \"\\x0bx\\x0c\", \"b\"]])\r\n\r\n\r\nclass TestCrOnlyLines(unittest.TestCase):\r\n    def test_cr_only_physical_lines(self):\r\n        text = \"a,b\\r1,2\\r\"\r\n        self.assertEqual(parse(text), [[\"a\", \"b\"], [\"1\", \"2\"]])\r\n\r\n    def test_mixed_crlf_and_lf_row_separators(self):\r\n        text = \"a,b\\r\\nc,d\\n\"\r\n        self.assertEqual(parse(text), [[\"a\", \"b\"], [\"c\", \"d\"]])\r\n\r\n\r\nclass TestUnicode(unittest.TestCase):\r\n    def test_unicode_content_preserved(self):\r\n        self.assertEqual(\r\n            parse(\"a,h\\u00e9llo w\\u00f6rld \\U0001F600,c\\n\"),\r\n            [[\"a\", \"h\\u00e9llo w\\u00f6rld \\U0001F600\", \"c\"]],\r\n        )\r\n\r\n\r\nclass TestCoreBlockingSamples(unittest.TestCase):\r\n    \"\"\"Blocking core samples: a Loop failing any of these must be rejected.\"\"\"\r\n\r\n    def test_core_embedded_comma(self):\r\n        self.assertEqual(parse('name,\"Doe, John\",age\\n'), [[\"name\", \"Doe, John\", \"age\"]])\r\n\r\n    def test_core_embedded_newline(self):\r\n        self.assertEqual(\r\n            parse('a,\"multi\\nline\",c\\n'), [[\"a\", \"multi\\nline\", \"c\"]]\r\n        )\r\n\r\n    def test_core_doubled_quote_escaping(self):\r\n        self.assertEqual(parse('\"a\"\"b\",c\\n'), [['a\"b', \"c\"]])\r\n\r\n\r\nclass TestMalformedInputs(unittest.TestCase):\r\n    def test_quote_in_unquoted_field_raises_with_position(self):\r\n        with self.assertRaises(ParseError) as ctx:\r\n            parse('a,b\"c,d\\n')\r\n        err = ctx.exception\r\n        self.assertEqual(err.line, 1)\r\n        self.assertEqual(err.col, 4)\r\n        self.assertIn(\"line 1\", str(err))\r\n        self.assertIn(\"column 4\", str(err))\r\n\r\n    def test_quote_in_unquoted_field_reports_row_and_field(self):\r\n        with self.assertRaises(ParseError) as ctx:\r\n            parse('x,y\\na,b\"c,d\\n')\r\n        err = ctx.exception\r\n        self.assertEqual(err.line, 2)\r\n        self.assertEqual(err.col, 4)\r\n        self.assertEqual(err.row_number, 2)\r\n        self.assertEqual(err.field_number, 2)\r\n\r\n    def test_non_whitespace_after_closing_quote_raises_with_position(self):\r\n        with self.assertRaises(ParseError) as ctx:\r\n            parse('a,\"b\"c,d\\n')\r\n        err = ctx.exception\r\n        self.assertEqual(err.line, 1)\r\n        self.assertEqual(err.col, 6)\r\n\r\n    def test_unterminated_quote_raises_with_open_position(self):\r\n        with self.assertRaises(ParseError) as ctx:\r\n            parse('a,\"b,c\\n')\r\n        err = ctx.exception\r\n        self.assertEqual(err.line, 1)\r\n        self.assertEqual(err.col, 3)\r\n\r\n    def test_unterminated_quote_after_odd_trailing_quotes(self):\r\n        # 'b\"\"' is 'b' followed by an escaped literal quote: the field is\r\n        # still open and needs one more real closing quote.\r\n        with self.assertRaises(ParseError) as ctx:\r\n            parse('a,\"b\"\"')\r\n        err = ctx.exception\r\n        self.assertEqual(err.line, 1)\r\n        self.assertEqual(err.col, 3)\r\n\r\n    def test_still_open_field_after_quote_then_comma_inside_quotes(self):\r\n        # 'b\"\",c\\n' inside quotes: the pair after b is a doubled quote, so\r\n        # the comma and 'c' are literal content and the field never closes.\r\n        with self.assertRaises(ParseError):\r\n            parse('a,\"b\"\",c\\n')\r\n\r\n    def test_multiline_quoted_field_error_position_tracks_embedded_newlines(self):\r\n        # Two embedded newlines inside the quoted field must advance the\r\n        # line counter correctly before the error is raised on line 3.\r\n        with self.assertRaises(ParseError) as ctx:\r\n            parse('a,\"line1\\nline2\\nline3\"X,d\\n')\r\n        err = ctx.exception\r\n        self.assertEqual(err.line, 3)\r\n        self.assertEqual(err.col, 7)\r\n\r\n    def test_bom_away_from_start_raises_with_position(self):\r\n        with self.assertRaises(ParseError) as ctx:\r\n            parse('a,b\\n\\ufeffc,d\\n')\r\n        err = ctx.exception\r\n        self.assertEqual(err.line, 2)\r\n        self.assertEqual(err.col, 1)\r\n\r\n    def test_bom_as_last_character_of_file_raises(self):\r\n        with self.assertRaises(ParseError) as ctx:\r\n            parse('a,b\\n\\ufeff')\r\n        err = ctx.exception\r\n        self.assertEqual(err.line, 2)\r\n        self.assertEqual(err.col, 1)\r\n\r\n    def test_bom_inside_unquoted_field_raises(self):\r\n        with self.assertRaises(ParseError) as ctx:\r\n            parse('a\\ufeffb,c\\n')\r\n        err = ctx.exception\r\n        self.assertEqual(err.line, 1)\r\n        self.assertEqual(err.col, 2)\r\n\r\n    def test_bom_inside_comment_line_raises(self):\r\n        with self.assertRaises(ParseError):\r\n            parse('a,b\\n#comment \\ufeffwith bom\\n')\r\n\r\n    def test_error_message_mentions_line_and_column_words(self):\r\n        with self.assertRaises(ParseError) as ctx:\r\n            parse('a,\"b,c\\n')\r\n        msg = str(ctx.exception)\r\n        self.assertIn(\"line\", msg)\r\n        self.assertIn(\"column\", msg)\r\n\r\n    def test_error_message_mentions_row_and_field_words(self):\r\n        with self.assertRaises(ParseError) as ctx:\r\n            parse('a,\"b,c\\n')\r\n        msg = str(ctx.exception)\r\n        self.assertIn(\"row\", msg)\r\n        self.assertIn(\"field\", msg)\r\n\r\n\r\nclass TestNoStdlibCsvImport(unittest.TestCase):\r\n    def test_source_does_not_import_csv(self):\r\n        with open(\"parser.py\", \"r\", encoding=\"utf-8\") as f:\r\n            source = f.read()\r\n        self.assertNotIn(\"import csv\", source)\r\n        self.assertNotIn(\"from csv\", source)\r\n\r\n\r\n# ---------------------------------------------------------------------------\r\n# Shared architecture-neutral bakeoff cases, copied from\r\n# generated/cross-evaluation/test_bakeoff.py and run against THIS parser.\r\n# ---------------------------------------------------------------------------\r\n_SHARED_VALID_CASES = [\r\n    (\"blocking_quoted_comma\", 'id,\"Doe, Jane\"\\n', [[\"id\", \"Doe, Jane\"]]),\r\n    (\"blocking_embedded_lf\", 'id,\"first\\nsecond\"\\n', [[\"id\", \"first\\nsecond\"]]),\r\n    (\"blocking_embedded_crlf\", 'id,\"first\\r\\nsecond\"\\r\\n', [[\"id\", \"first\\nsecond\"]]),\r\n    (\"blocking_doubled_quote\", '\"say \"\"hello\"\"\",ok\\n', [['say \"hello\"', \"ok\"]]),\r\n    (\"bom_comments_blanks\", \"\\ufeff # vendor\\n\\n a , b \\n\", [[\"a\", \"b\"]]),\r\n    (\"padded_comment\", \"\\t  # ignored\\r\\nx,y\\r\\n\", [[\"x\", \"y\"]]),\r\n    (\"comment_at_eof\", \"# ignored\", []),\r\n    (\"quoted_hash_is_data\", '\"#not comment\",x\\n', [[\"#not comment\", \"x\"]]),\r\n    (\"hash_in_later_field\", \"x,#not comment\\n\", [[\"x\", \"#not comment\"]]),\r\n    (\"blank_inside_quote\", '\"a\\n\\nb\",c\\n', [[\"a\\n\\nb\", \"c\"]]),\r\n    (\"comment_inside_quote\", '\"a\\n#still data\\nb\",c\\n', [[\"a\\n#still data\\nb\", \"c\"]]),\r\n    (\"bare_cr_normalized\", '\"a\\rb\",c\\r', [[\"a\\nb\", \"c\"]]),\r\n    (\"mixed_newlines\", \"a,b\\r\\nc,d\\re,f\\n\", [[\"a\", \"b\"], [\"c\", \"d\"], [\"e\", \"f\"]]),\r\n    (\"ragged_rows\", \"a,b,c\\n1\\n2,3\\n\", [[\"a\", \"b\", \"c\"], [\"1\"], [\"2\", \"3\"]]),\r\n    (\"empty_fields\", \",a,,\\n\", [[\"\", \"a\", \"\", \"\"]]),\r\n    (\"quoted_empty\", '\"\",x\\n', [[\"\", \"x\"]]),\r\n    (\"ascii_padding\", ' \\tplain \\t, \\t\" quoted \" \\t\\n', [[\"plain\", \" quoted \"]]),\r\n    (\"unicode_not_padding\", \"\\u00a0x\\u00a0,y\\n\", [[\"\\u00a0x\\u00a0\", \"y\"]]),\r\n    (\"padded_quoted_field\", '\\t \"x,y\"\\t,z\\n', [[\"x,y\", \"z\"]]),\r\n    (\"data_without_final_newline\", \"a,b\", [[\"a\", \"b\"]]),\r\n    (\"empty_input\", \"\", []),\r\n    (\"blank_only_input\", \" \\t\\r\\n\\t\\n\", []),\r\n    (\"four_quotes\", '\"\"\"\",x\\n', [['\"', \"x\"]]),\r\n    (\"multiline_doubled_quote\", '\"a\\n\"\"b\"\"\\nc\",z\\n', [['a\\n\"b\"\\nc', \"z\"]]),\r\n]\r\n\r\n_SHARED_ERROR_CASES = [\r\n    (\"quote_in_unquoted\", 'a,b\"c\\n', 1, 4, \"quote\"),\r\n    (\"junk_after_quote\", '\"a\"x\\n', 1, 4, \"after\"),\r\n    (\"unterminated\", 'a,\"b\\nc', 1, 3, \"unterminated\"),\r\n    (\"junk_second_lf\", 'ok\\n\"x\"z\\n', 2, 4, \"after\"),\r\n    (\"junk_second_crlf\", 'ok\\r\\n\"x\"z\\r\\n', 2, 4, \"after\"),\r\n    (\"interior_bom\", \"a,\\ufeffb\\n\", 1, 3, \"BOM|Byte-order\"),\r\n    (\"second_bom\", \"\\ufeffa,b\\n\\ufeffc,d\\n\", 2, 1, \"BOM|Byte-order\"),\r\n]\r\n\r\n\r\nclass TestSharedBakeoffSuite(unittest.TestCase):\r\n    \"\"\"Local re-run of the architecture-neutral shared bakeoff cases.\"\"\"\r\n\r\n    maxDiff = None\r\n\r\n\r\ndef _install_shared_cases() -\u003e None:\r\n    for name, text, expected in _SHARED_VALID_CASES:\r\n        def valid_test(self, text=text, expected=expected):\r\n            self.assertEqual(parse(text), expected)\r\n\r\n        setattr(TestSharedBakeoffSuite, f\"test_shared_valid_{name}\", valid_test)\r\n\r\n    for name, text, line, column, pattern in _SHARED_ERROR_CASES:\r\n        def error_test(self, text=text, line=line, column=column, pattern=pattern):\r\n            with self.assertRaises(ParseError) as caught:\r\n                parse(text)\r\n            message = str(caught.exception)\r\n            self.assertRegex(message, rf\"line\\s+{line}\\b\")\r\n            self.assertRegex(message, rf\"column\\s+{column}\\b\")\r\n            self.assertRegex(message, re.compile(pattern, re.IGNORECASE))\r\n\r\n        setattr(TestSharedBakeoffSuite, f\"test_shared_error_{name}\", error_test)\r\n\r\n\r\n_install_shared_cases()\r\n\r\n\r\n# ---------------------------------------------------------------------------\r\n# Incorporated helper from the rejected line-regex Track: non-string guard.\r\n# Evidence: track-line-regex/final/parser.py lines 161-162 and its committed\r\n# test test_type_error_for_non_string.\r\n# ---------------------------------------------------------------------------\r\nclass TestNonStringInput(unittest.TestCase):\r\n    def test_none_raises_type_error(self):\r\n        with self.assertRaisesRegex(TypeError, \"text must be str\"):\r\n            parse(None)\r\n\r\n    def test_bytes_raises_type_error(self):\r\n        with self.assertRaisesRegex(TypeError, \"text must be str\"):\r\n            parse(b\"a,b\\n\")\r\n\r\n    def test_list_raises_type_error(self):\r\n        with self.assertRaisesRegex(TypeError, \"text must be str\"):\r\n            parse([\"a\", \"b\"])\r\n\r\n\r\n# ---------------------------------------------------------------------------\r\n# loop-02 additions (behavior-safe; driven by loop-01 evidence)\r\n# ---------------------------------------------------------------------------\r\nclass TestParseErrorReasonAttribute(unittest.TestCase):\r\n    \"\"\"The measured error-API clarity improvement: ParseError.reason.\"\"\"\r\n\r\n    def test_reason_exposed_for_unterminated_quote(self):\r\n        with self.assertRaises(ParseError) as ctx:\r\n            parse('a,\"b,c\\n')\r\n        err = ctx.exception\r\n        self.assertEqual(\r\n            err.reason, \"Unterminated quoted field (opening quote never closed)\"\r\n        )\r\n        # Message is unchanged: it still begins with the bare reason and still\r\n        # carries the full coordinate suffix.\r\n        self.assertTrue(str(err).startswith(err.reason))\r\n        self.assertIn(\"line 1\", str(err))\r\n        self.assertIn(\"column 3\", str(err))\r\n\r\n    def test_reason_exposed_for_quote_in_unquoted(self):\r\n        with self.assertRaises(ParseError) as ctx:\r\n            parse('a,b\"c,d\\n')\r\n        err = ctx.exception\r\n        self.assertEqual(\r\n            err.reason, \"Unexpected quote character inside an unquoted field\"\r\n        )\r\n        self.assertTrue(str(err).startswith(err.reason))\r\n\r\n    def test_reason_exposed_for_bom(self):\r\n        with self.assertRaises(ParseError) as ctx:\r\n            parse('a,b\\n\\ufeffc,d\\n')\r\n        err = ctx.exception\r\n        self.assertEqual(\r\n            err.reason, \"Byte-order mark is only permitted at the start of input\"\r\n        )\r\n\r\n    def test_existing_attributes_unchanged(self):\r\n        with self.assertRaises(ParseError) as ctx:\r\n            parse('x,y\\na,b\"c,d\\n')\r\n        err = ctx.exception\r\n        self.assertEqual((err.line, err.col, err.row_number, err.field_number), (2, 4, 2, 2))\r\n\r\n\r\nclass TestUnicodeWhitespacePinned(unittest.TestCase):\r\n    \"\"\"Pin the winner's deliberate ASCII-only structural-whitespace behavior.\
