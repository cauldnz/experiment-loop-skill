copied verbatim from loop-02 into final/ (identical SHA-256).","comparison_key":"parser-snapshot","featured":true,"mode":"code","primary":false},"preview":{"kind":"text","language":"py","value":"\"\"\"Hand-rolled parser for a messy vendor CSV dialect -- synthesis loop-02.\r\n\r\nSynthesis provenance\r\n--------------------\r\nThis is loop-02 of the ``synthesis`` Track (model ``claude-opus-4.8``), whose\r\nparent is ``synthesis-loop-01``. It changes no parsing behavior relative to\r\nloop-01. It makes exactly one measured, behavior-safe API improvement driven by\r\nloop-01 evidence (a review of the two Tracks' error APIs): ``ParseError`` now\r\nalso exposes a ``reason`` attribute -- the bare cause string, previously only\r\nrecoverable by substring-parsing the formatted message. The formatted message\r\nand every existing attribute (``line``/``col``/``row_number``/``field_number``)\r\nare unchanged, so all loop-01 tests pass unchanged. loop-02 additionally commits\r\nregression tests that pin the winner's deliberate ASCII-only structural-\r\nwhitespace behavior (the under-specified edge surfaced by loop-01 union testing)\r\nand load runnable sample fixtures.\r\n\r\nLineage note: loop-01 has a multi-parent lineage of ``line-regex-loop-02``\r\n(rejected architecture) and ``track-state-machine-loop-02`` (winning\r\narchitecture). Per the independent\r\n``gpt-5.6-terra`` judge (weighted 4.940 vs 4.745), the winning\r\ncharacter-state-machine architecture is kept verbatim: named ``_State``\r\ntransitions, a single ``_Scanner`` owning physical coordinates, and\r\n``ParseError`` carrying 1-based line/column plus row/field context.\r\n\r\nThe judge found **no** rejected-track helper both necessary and\r\narchitecture-compatible: its offset-map/regex pipeline (``_physical_lines``,\r\n``_logical_records``, ``_FIELD``, per-character ``source_offsets``) would\r\nduplicate this scanner/state-transition responsibility and is therefore\r\nexplicitly rejected. The one narrowly-proven, architecture-neutral idea that\r\n*is* incorporated from the rejected Track is its **non-string input guard**:\r\n``parse(None)`` (or any non-``str``) now raises a clear\r\n``TypeError(\"text must be str\")`` at the public boundary instead of an opaque\r\n``TypeError: 'NoneType' object is not subscriptable`` leaking from an internal\r\nstring slice. Evidence: ``track-line-regex/final/parser.py`` lines 161-162 and\r\nits committed test ``test_type_error_for_non_string`` (final test_parser.py\r\nlines 146-148), which passed in that Track. This is a boundary precondition,\r\nnot a parsing mechanism, so it changes nothing about the state machine.\r\n\r\nArchitecture (unchanged from the winning Track)\r\n-----------------------------------------------\r\nA single-pass, whole-input **character state machine**. The entire input\r\nstring is scanned once (with multi-character newline sequences such as\r\n``\\\\r\\\\n`` collapsed into a single logical transition). A small ``_State``\r\nenum names every state the machine can be in; a dedicated handler method\r\nexists per state, and each handler's docstring records its invariants and the\r\ntransitions it may take. A ``_Scanner`` helper owns the raw cursor (character\r\noffset, 1-based line, 1-based column) and centralizes the two primitive moves\r\nevery state needs (``advance`` over an ordinary character, ``advance_newline``\r\nover a logical newline), so precise source positions are computed in exactly\r\none place instead of being duplicated across every branch.\r\n\r\nNo use of the standard-library ``csv`` module, ``pandas``, or any third-party\r\nparsing library.\r\n\r\nPublic API\r\n----------\r\n``ParseError`` -- raised for any malformed input; message includes a 1-based\r\nline and column plus the row/field index being parsed.\r\n\r\n``parse(text: str) -\u003e list[list[str]]`` -- parse the given text into rows of\r\nstring fields. Raises ``TypeError`` if ``text`` is not a ``str``.\r\n\"\"\"\r\n\r\nfrom __future__ import annotations\r\n\r\nfrom enum import Enum, auto\r\n\r\n\r\nclass ParseError(Exception):\r\n    \"\"\"Raised when the input cannot be parsed as valid vendor CSV.\r\n\r\n    Attributes:\r\n        reason: the bare human-readable cause, without the coordinate suffix.\r\n        line: 1-based line number where the problem was detected.\r\n        col: 1-based column number where the problem was detected.\r\n        row_number: 1-based index of the logical row being parsed.\r\n        field_number: 1-based index of the field within that row.\r\n    \"\"\"\r\n\r\n    def __init__(self, reason: str, line: int, col: int, row_number: int, field_number: int):\r\n        self.reason = reason\r\n        self.line = line\r\n        self.col = col\r\n        self.row_number = row_number\r\n        self.field_number = field_number\r\n        super().__init__(\r\n            f\"{reason} (line {line}, column {col}, row {row_number}, field {field_number})\"\r\n        )\r\n\r\n\r\nclass _State(Enum):\r\n    \"\"\"Named states of the whole-input character state machine.\r\n\r\n    FIELD_START\r\n        Positioned at the start of a field (either the first field of a\r\n        row, right after a row boundary, or any later field right after a\r\n        comma). Leading spaces/tabs are consumed here without being kept.\r\n        When this is the *first* field attempt of a fresh row\r\n        (``row_start_untouched`` is True) a ``#`` means \"comment line\" and\r\n        an immediate newline/EOF means \"blank line\" -- neither produces a\r\n        row.\r\n    IN_UNQUOTED\r\n        Accumulating characters of an unquoted field. Terminates on\r\n        comma, newline, or EOF. A literal quote character here is\r\n        malformed.\r\n    IN_QUOTED\r\n        Accumulating characters of a quoted field verbatim (interior\r\n        whitespace preserved). Newlines are normalized to ``\\\\n``. A quote\r\n        character transitions to QUOTE_PENDING to disambiguate an escaped\r\n        quote from field closure.\r\n    QUOTE_PENDING\r\n        Just saw a ``\"`` while inside a quoted field. If the next\r\n        character is also ``\"`` this is a doubled-quote escape and we\r\n        return to IN_QUOTED. Otherwise the field is closed and we move to\r\n        AFTER_QUOTE without consuming the next character.\r\n    AFTER_QUOTE\r\n        The quoted field's closing quote has been seen. Only spaces/tabs\r\n        are permitted until the field/row terminator (comma, newline, or\r\n        EOF); anything else is malformed.\r\n    IN_COMMENT\r\n        Consuming (and discarding) the remainder of a comment line, up to\r\n        but not including its terminating newline.\r\n    \"\"\"\r\n\r\n    FIELD_START = auto()\r\n    IN_UNQUOTED = auto()\r\n    IN_QUOTED = auto()\r\n    QUOTE_PENDING = auto()\r\n    AFTER_QUOTE = auto()\r\n    IN_COMMENT = auto()\r\n\r\n\r\n_BOM = \"\\ufeff\"\r\n_WS = (\" \", \"\\t\")\r\n\r\n\r\ndef _is_newline_start(ch: str) -\u003e bool:\r\n    return ch == \"\\r\" or ch == \"\\n\"\r\n\r\n\r\nclass _Scanner:\r\n    \"\"\"Owns the raw cursor over the input text.\r\n\r\n    Invariant: ``line``/``col`` always describe the position of the\r\n    character at ``text[pos]`` (or, at end of input, the position one past\r\n    the last character). This is the *only* class allowed to mutate\r\n    ``pos``/``line``/``col`` -- every state handler goes through\r\n    ``advance`` or ``advance_newline`` instead of touching them directly.\r\n    \"\"\"\r\n\r\n    __slots__ = (\"text\", \"n\", \"pos\", \"line\", \"col\")\r\n\r\n    def __init__(self, text: str, start_pos: int = 0):\r\n        self.text = text\r\n        self.n = len(text)\r\n        self.pos = start_pos\r\n        self.line = 1\r\n        self.col = 1\r\n\r\n    def at_eof(self) -\u003e bool:\r\n        return self.pos \u003e= self.n\r\n\r\n    def peek(self) -\u003e str:\r\n        \"\"\"Return the character at the cursor. Caller must check at_eof().\"\"\"\r\n        return self.text[self.pos]\r\n\r\n    def advance(self) -\u003e None:\r\n        \"\"\"Move past one ordinary (non-newline) character.\"\"\"\r\n        self.pos += 1\r\n        self.col += 1\r\n\r\n    def advance_newline(self) -\u003e None:\r\n        \"\"\"Move past one logical newline: \\\\r\\\\n, bare \\\\r, or bare \\\\n.\"\"\"\r\n        if self.text[self.pos] == \"\\r\" and self.pos + 1 \u003c self.n and self.text[self.pos + 1] == \"\\n\":\r\n            self.pos += 2\r\n        else:\r\n            self.pos += 1\r\n        self.line += 1\r\n        self.col = 1\r\n\r\n\r\nclass _Machine:\r\n    \"\"\"Drives the state machine over one full input string.\"\"\"\r\n\r\n    def __init__(self, text: str):\r\n        # A UTF-8 BOM is only legal at absolute offset zero. It is\r\n        # consumed silently and does not occupy a column of its own.\r\n        start_pos = 1 if text[:1] == _BOM else 0\r\n        self.sc = _Scanner(text, start_pos)\r\n        self.rows: list[list[str]] = []\r\n        self.row: list[str] = []\r\n        self.field_chars: list[str] = []\r\n        self.state = _State.FIELD_START\r\n        self.row_start_untouched = True\r\n        self.row_number = 1\r\n        self.field_number = 1\r\n        self.quote_start_line = 0\r\n        self.quote_start_col = 0\r\n\r\n    # -- error helper --------------------------------------------------\r\n    def _error(self, reason: str) -\u003e ParseError:\r\n        return ParseError(reason, self.sc.line, self.sc.col, self.row_number, self.field_number)\r\n\r\n    # -- field/row bookkeeping ------------------------------------------\r\n    def _commit_field(self, value: str) -\u003e None:\r\n        self.row.append(value)\r\n        self.field_number += 1\r\n\r\n    def _commit_row(self) -\u003e None:\r\n        self.rows.append(self.row.copy())\r\n        self.row.clear()\r\n        self.row_number += 1\r\n        self.field_number = 1\r\n\r\n    # -- per-state handlers ----------------------------------------------\r\n    def _step_field_start(self, ch: str) -\u003e None:\r\n        \"\"\"At the start of a field: skip padding, classify the row if needed.\"\"\"\r\n        sc = self.sc\r\n        if ch in _WS:\r\n            sc.advance()\r\n            return\r\n        if self.row_start_untouched and ch == \"#\":\r\n            self.state = _State.IN_COMMENT\r\n            sc.advance()\r\n            return\r\n        if self.row_start_untouched and _is_newline_start(ch):\r\n            # Blank/whitespace-only physical line: discard, no row emitted.\r\n            sc.advance_newline()\r\n            return\r\n        self.row_start_untouched = False\r\n        if ch == '\"':\r\n            self.quote_start_line, self.quote_start_col = sc.line, sc.col\r\n            self.field_chars = []\r\n            self.state = _State.IN_QUOTED\r\n            sc.advance()\r\n            return\r\n        if ch == \",\":\r\n            self._commit_field(\"\")\r\n            sc.advance()\r\n            return\r\n        if _is_newline_start(ch):\r\n            self._commit_field(\"\")\r\n            self._commit_row()\r\n            sc.advance_newline()\r\n            self.row_start_untouched = True\r\n            return\r\n        # First real character of an unquoted field.\r\n        self.field_chars = [ch]\r\n        self.state = _State.IN_UNQUOTED\r\n        sc.advance()\r\n\r\n    def _step_in_unquoted(self, ch: str) -\u003e None:\r\n        \"\"\"Accumulating an unquoted field; a quote here is malformed.\"\"\"\r\n        sc = self.sc\r\n        if ch == \",\":\r\n            self._commit_field(\"\".join(self.field_chars).rstrip(\" \\t\"))\r\n            self.field_chars = []\r\n            self.state = _State.FIELD_START\r\n            sc.advance()\r\n            return\r\n        if _is_newline_start(ch):\r\n            self._commit_field(\"\".join(self.field_chars).rstrip(\" \\t\"))\r\n            self.field_chars = []\r\n            self._commit_row()\r\n            sc.advance_newline()\r\n            self.state = _State.FIELD_START\r\n            self.row_start_untouched = True\r\n            return\r\n        if ch == '\"':\r\n            raise self._error(\"Unexpected quote character inside an unquoted field\")\r\n        self.field_chars.append(ch)\r\n        sc.advance()\r\n\r\n    def _step_in_quoted(self, ch: str) -\u003e None:\r\n        \"\"\"Inside a quoted field: verbatim content, newlines normalized.\"\"\"\r\n        sc = self.sc\r\n        if ch == '\"':\r\n            self.state = _State.QUOTE_PENDING\r\n            sc.advance()\r\n            return\r\n        if _is_newline_start(ch):\r\n            sc.advance_newline()\r\n            self.field_chars.append(\"\\n\")\r\n            return\r\n        self.field_chars.append(ch)\r\n        sc.advance()\r\n\r\n    def _step_quote_pending(self, ch: str) -\u003e None:\r\n        \"\"\"Just saw a quote inside a quoted field: escape or close?\"\"\"\r\n        if ch == '\"':\r\n            # Doubled quote: escaped literal quote, field stays open.\r\n            self.field_chars.append('\"')\r\n            self.state = _State.IN_QUOTED\r\n            self.sc.advance()\r\n            return\r\n        # Field is closed; re-process this same character in AFTER_QUOTE\r\n        # without consuming it (no cursor movement here).\r\n        self.state = _State.AFTER_QUOTE\r\n\r\n    def _step_after_quote(self, ch: str) -\u003e None:\r\n        \"\"\"After a quoted field's closing quote: only padding, then terminator.\"\"\"\r\n        sc = self.sc\r\n        if ch in _WS:\r\n            sc.advance()\r\n            return\r\n        if ch == \",\":\r\n            self._commit_field(\"\".join(self.field_chars))\r\n            self.field_chars = []\r\n            self.state = _State.FIELD_START\r\n            sc.advance()\r\n            return\r\n        if _is_newline_start(ch):\r\n            self._commit_field(\"\".join(self.field_chars))\r\n            self.field_chars = []\r\n            self._commit_row()\r\n            sc.advance_newline()\r\n            self.state = _State.FIELD_START\r\n            self.row_start_untouched = True\r\n            return\r\n        raise self._error(\r\n            f\"Unexpected character {ch!r} after closing quote; expected a comma or a newline\"\r\n        )\r\n\r\n    def _step_in_comment(self, ch: str) -\u003e None:\r\n        \"\"\"Discarding the remainder of a comment line.\"\"\"\r\n        sc = self.sc\r\n        if _is_newline_start(ch):\r\n            sc.advance_newline()\r\n            self.state = _State.FIELD_START\r\n            self.row_start_untouched = True\r\n            return\r\n        sc.advance()\r\n\r\n    _HANDLERS = {\r\n        _State.FIELD_START: _step_field_start,\r\n        _State.IN_UNQUOTED: _step_in_unquoted,\r\n        _State.IN_QUOTED: _step_in_quoted,\r\n        _State.QUOTE_PENDING: _step_quote_pending,\r\n        _State.AFTER_QUOTE: _step_after_quote,\r\n        _State.IN_COMMENT: _step_in_comment,\r\n    }\r\n\r\n    def run(self) -\u003e list[list[str]]:\r\n        sc = self.sc\r\n        while not sc.at_eof():\r\n            ch = sc.peek()\r\n            if ch == _BOM:\r\n                raise self._error(\"Byte-order mark is only permitted at the start of input\")\r\n            self._HANDLERS[self.state](self, ch)\r\n        self._finalize()\r\n        return self.rows\r\n\r\n    def _finalize(self) -\u003e None:\r\n        \"\"\"Handle input that ends without a trailing newline.\"\"\"\r\n        if self.state == _State.FIELD_START:\r\n            if not (self.row_start_untouched and not self.row):\r\n                self._commit_field(\"\")\r\n                self._commit_row()\r\n        elif self.state == _State.IN_UNQUOTED:\r\n            self._commit_field(\"\".join(self.field_chars).rstrip(\" \\t\"))\r\n            self._commit_row()\r\n        elif self.state in (_State.AFTER_QUOTE, _State.QUOTE_PENDING):\r\n            self._commit_field(\"\".join(self.field_chars))\r\n            self._commit_row()\r\n        elif self.state == _State.IN_QUOTED:\r\n            raise ParseError(\r\n                \"Unterminated quoted field (opening quote never closed)\",\r\n                self.quote_start_line,\r\n                self.quote_start_col,\r\n                self.row_number,\r\n                self.field_number,\r\n            )\r\n        # IN_COMMENT at EOF: nothing to commit, comment simply ends.\r\n\r\n\r\ndef parse(text: str) -\u003e list[list[str]]:\r\n    \"\"\"Parse ``text`` (already-decoded str) into a list of rows of fields.\r\n\r\n    See module docstring for the dialect rules enforced. Raises ``TypeError``\r\n    if ``text`` is not a ``str`` (a boundary precondition incorporated from the\r\n    rejected line-regex Track; see module docstring for evidence).\r\n    \"\"\"\r\n    if not isinstance(text, str):\r\n        raise TypeError(\"text must be str\")\r\n    return _Machine(text).run()\r\n"},"role":"champion-output","safe_href":"synthesis/final/parser.py","sha256":"8e5d76be27af670d91f4dff20120c6e877579c9ddeb0f6e5c3938f2b419d6ece"},{"diagnostics":[],"id":"synthesis-final-readme","kind":"markdown","label":"final/README.md","path":"synthesis/final/README.md","presentation":{"caption":"API, dialect rules, and run command for the champion.","featured":false,"mode":"markdown","primary":false},"preview":{"kind":"text","language":"md","value":"# Synthesis champion -- messy vendor CSV parser\r\n\r\nThis is the promoted champion of the **synthesis** Track (`claude-opus-4.8`),\r\nsnapshot of `synthesis-loop-02`. The synthesis Track kept the winning\r\n**character-state-machine** architecture selected by the independent\r\n`gpt-5.6-terra` judge (weighted 4.940 vs 4.745 over the rejected line-oriented/\r\nregex Track) and selectively incorporated one narrowly-proven, architecture-\r\nneutral helper from the rejected Track.\r\n\r\n## Public API\r\n\r\n```python\r\nfrom parser import ParseError, parse\r\n\r\nrows = parse(text)   # text: str  -\u003e  list[list[str]]  (rows of string fields)\r\n```\r\n\r\n- `parse(text: str) -\u003e list[list[str]]` parses an already-decoded string into\r\n  rows of string fields, preserving ragged row widths.\r\n- `parse(...)` raises `TypeError(\"text must be str\")` if `text` is not a `str`\r\n  (a boundary precondition incorporated from the rejected Track).\r\n- Malformed input raises `ParseError`, whose message includes a 1-based\r\n  **line**, **column**, **row**, and **field**, and which exposes those as\r\n  attributes plus `.reason` (the bare cause):\r\n\r\n  ```python\r\n  try:\r\n      parse('a,b\"c\\n')\r\n  except ParseError as e:\r\n      e.reason        # \"Unexpected quote character inside an unquoted field\"\r\n      e.line, e.col   # 1, 4\r\n      e.row_number, e.field_number  # 1, 2\r\n      str(e)          # \"...inside an unquoted field (line 1, column 4, row 1, field 2)\"\r\n  ```\r\n\r\nNo standard-library `csv`, `pandas`, or any third-party parsing library is\r\nimported.\r\n\r\n## Dialect rules\r\n\r\n- **UTF-8 BOM** accepted only at absolute offset zero (consumed silently, does\r\n  not occupy a column); a BOM anywhere else is a `ParseError`.\r\n- **Comment lines** whose first non-whitespace character is `#` are ignored when\r\n  not inside a quoted field.\r\n- **Blank / whitespace-only physical lines** are ignored when not inside a\r\n  quoted field. *Only ASCII space (0x20) and tab (0x09) count as structural\r\n  whitespace* -- a line of only Unicode whitespace (e.g. U+00A0) is data, not a\r\n  blank line (see `test_parser.py::TestUnicodeWhitespacePinned`).\r\n- **Quoted fields** may contain commas, embedded newlines (CRLF/CR/LF are\r\n  normalized to `\\n`), and doubled quotes (`\"\"` -\u003e `\"`). Interior whitespace is\r\n  preserved; spaces/tabs are allowed around the quoted token and are trimmed.\r\n- **Unquoted fields** have surrounding spaces/tabs trimmed.\r\n- **Ragged rows** (differing field counts) are preserved as-is.\r\n- **Malformed inputs** raising `ParseError`: a quote inside an unquoted field,\r\n  non-whitespace after a closing quote before a comma/newline, an unterminated\r\n  quoted field (reported at its opening quote), and a BOM away from offset zero.\r\n\r\n## Run\r\n\r\n```\r\npython test_parser.py\r\n```\r\n\r\nRuns 97 tests (the winning state-machine suite verbatim + a local copy of the\r\narchitecture-neutral shared bakeoff suite + the non-string-guard, `.reason`,\r\nUnicode-whitespace-pinning, and fixture-loading tests). No external\r\ndependencies; runnable directly from this directory.\r\n\r\n## Files\r\n\r\n- `parser.py` -- the parser (`ParseError`, `parse`).\r\n- `test_parser.py` -- 97 objective tests.\r\n- `fixtures/sample.csv` -- a valid, deliberately messy example (comment + blank\r\n  lines, quoted embedded comma, embedded newline, doubled-quote escape, unquoted\r\n  padding trimmed, ragged row).\r\n- `fixtures/malformed_unterminated_quote.csv`,\r\n  `fixtures/malformed_quote_in_unquoted.csv` -- malformed examples demonstrating\r\n  actionable `ParseError` messages.\r\n- `test-result.txt` -- champion verification transcript and counts.\r\n\r\n## Provenance\r\n\r\nLineage: `synthesis-loop-02` \u003c- `synthesis-loop-01` \u003c-\r\n[`line-regex-loop-02` (rejected), `track-state-machine-loop-02` (winning base)].\r\nSee `../loop-01/` and `../loop-02/` for per-loop artifacts,\r\n`../synthesis-report.md` for the full contribution/rejection analysis, and\r\n`../manifest-fragment.json` for the manifest-ready records.\r\n"},"role":"documentation","safe_href":"synthesis/final/README.md","sha256":"1c6e79c3f61849d3525743b104e329c652b989842ddb87fe0570777f17993f8f"},{"diagnostics":[],"id":"synthesis-loop-02-judge","kind":"judge-note","label":"Synthesis Loop 02 judge","path":"synthesis/loop-02/judge.md","presentation":{"caption":"Final objective-first scorecard assessment with zero-regression evidence.","featured":false,"mode":"markdown","primary":false},"preview":{"kind":"text","language":"md","value":"# Judge: synthesis loop-02\r\n\r\n**Role:** synthesis generator self-assessment (`claude-opus-4.8`). Provisional;\r\nobjective tests dominate.\r\n\r\n**Parent:** `synthesis-loop-01`.\r\n\r\n## What this loop did (only from loop-01 evidence; no manufactured failure)\r\n\r\nloop-01 found **no functional bug** but produced two pieces of real evidence:\r\n(1) a review of the two Tracks' error APIs showed the winner exposes structured\r\n`line/col/row/field` attributes but *not* the bare cause, forcing callers to\r\nsubstring-parse the message; and (2) union testing surfaced an under-specified\r\nedge -- Unicode-whitespace-only lines are data in the winner (ASCII-only\r\nstructural whitespace) but ignorable in the rejected Track, and this behavior\r\nwas implicit/untested in the winner. loop-02 acts on both with measured,\r\nbehavior-safe changes:\r\n\r\n1. **Error-API clarity (behavior-safe):** `ParseError` now sets\r\n   `self.reason = reason`. The formatted message string and all existing\r\n   attributes are unchanged. Callers can read `err.reason` directly instead of\r\n   parsing text. Covered by `TestParseErrorReasonAttribute` (4 tests), including\r\n   an assertion that the message still starts with the reason and still carries\r\n   the coordinate suffix, and that `line/col/row/field` are unchanged.\r\n\r\n2. **Coverage/documentation gap (no behavior change):** committed\r\n   `TestUnicodeWhitespacePinned` (3 tests) that pin the winner's deliberate\r\n   ASCII-only structural-whitespace behavior for Unicode-whitespace-only lines,\r\n   with a contrasting test proving ASCII space/tab-only lines are still blanks.\r\n   This converts an implicit, untested behavior into an explicit contract.\r\n\r\n3. **Runnable fixtures:** `fixtures/sample.csv` (valid, messy: comment + blank\r\n   lines, quoted comma, embedded newline, doubled-quote escape, unquoted\r\n   padding trimmed, ragged row) and two malformed fixtures, loaded by\r\n   `TestFixtures` (3 tests) relative to the test file so `python test_parser.py`\r\n   runs standalone.\r\n\r\n## Evidence inspected\r\n\r\n- `python test_parser.py` -\u003e **Ran 97 tests, OK** (see `test-result.txt`).\r\n- **Zero-regression check:** loop-01's unmodified 87-test suite re-run against\r\n  loop-02's `parser.py` -\u003e 87/87 OK. The `reason` addition is purely additive.\r\n- `forbidden_import_scan` -\u003e PASS. Blocking core samples -\u003e PASS.\r\n\r\n## Scores (0-5)\r\n\r\n| Criterion (weight) | Score | Basis |\r\n|---|---:|---|\r\n| correctness (.40) | 5 | 97/97 pass incl. all blocking samples; zero regression vs loop-01. |\r\n| robustness (.20) | 5 | Under-specified Unicode-whitespace edge now pinned; fixtures exercised. |\r\n| error_clarity (.15) | 5 | `ParseError.reason` adds programmatic access to the cause on top of line/column/row/field. |\r\n| maintainability (.15) | 4 | Same clean Scanner + per-state design; handlers still mutate shared state (documented future work). |\r\n| constraint_adherence (.10) | 5 | No `csv`/`pandas`/third-party import; architecture unchanged. |\r\n\r\n**Weighted total:** 0.40·5 + 0.20·5 + 0.15·5 + 0.15·4 + 0.10·5 = **4.85**.\r\n\r\n## Quality gates\r\n\r\n- core_samples: **pass**\r\n- objective_tests: **pass**\r\n- forbidden_import_scan: **pass**\r\n\r\n## What did not change / remaining limitation\r\n\r\n- No parsing behavior changed. The only runtime-visible addition is the new\r\n  `ParseError.reason` attribute (message text identical).\r\n- Maintainability remains 4/5: the per-state handlers still coordinate through\r\n  mutable `_Machine` instance buffers. A functional-core refactor (pure\r\n  `(state, char) -\u003e (new_state, actions)` handlers) is the documented\r\n  highest-value next experiment but adds real ceremony and was not pursued\r\n  because loop-02 found no functional defect requiring it.\r\n\r\n## Champion recommendation\r\n\r\nloop-02 is the synthesis champion: it strictly dominates loop-01 (superset of\r\ntests, added programmatic error access, pinned an under-specified edge) with\r\nzero behavioral regression and all hard gates green.\r\n"},"role":"assessment","safe_href":"synthesis/loop-02/judge.md","sha256":"2af08b26fab3af8554aa7e702c9a39ecaf95989d85d23cc40e36da6d985e5037"},{"diagnostics":[],"id":"synthesis-loop-02-prompt-history","kind":"prompt-history","label":"Synthesis Loop 02 prompt history","path":"synthesis/loop-02/prompt-history.md","presentation":{"caption":"Complete evidence-driven final synthesis prompt and feedback chain.","featured":false,"mode":"markdown","primary":false},"preview":{"kind":"text","language":"md","value":"# Prompt history: synthesis / loop-02\r\n\r\n## Complete Track prompt (synthesis Track, loop-02 portion)\r\n\r\nloop-02: improve only from actual loop-01 evidence (e.g. a real gap found by\r\nunion testing/review, error/API clarity, or maintainability); if no functional\r\nbug exists, make a measured, behavior-safe improvement with a dedicated\r\nregression test. `parent_ids`: [`synthesis-loop-01`]. Do not manufacture\r\nfailures. Keep the winning character-state-machine architecture; never import\r\nthe standard-library `csv`; preserve the public API (`ParseError`,\r\n`parse(text: str) -\u003e list[list[str]]`) and all dialect/malformed-input\r\nrequirements. Include runnable sample fixture(s) under `loop-02/fixtures`.\r\nPer-loop files required: parser.py, test_parser.py, test-result.txt (commands +\r\ncomplete outputs/counts), judge.md, metadata.json, prompt-history.md. A Loop\r\nfailing any objective hard gate cannot be champion; embedded comma/newline/\r\ndoubled quote are blocking.\r\n\r\n## Input feedback (from synthesis-loop-01)\r\n\r\n- loop-01 candidate = winning state machine (verbatim) + one incorporated helper\r\n  (non-string `TypeError` guard). 87/87 objective tests pass (53 winning-suite +\r\n  31 local shared bakeoff + 3 guard); forbidden-import scan passes; all blocking\r\n  samples pass.\r\n- loop-01 union-testing/review evidence:\r\n  1. Error-API review: the winner exposes structured `line/col/row/field` but\r\n     not the bare cause; callers must substring-parse the message to get it.\r\n  2. Union testing: Unicode-whitespace-only lines are treated as data by the\r\n     winner (ASCII-only structural whitespace) vs. ignorable by the rejected\r\n     Track. This is a deliberate, self-consistent winner choice (aligned with\r\n     the shared `unicode_not_padding` case) -- NOT a functional bug -- but it was\r\n     implicit and untested.\r\n- Explicit instruction: no functional bug exists, so make measured,\r\n  behavior-safe improvements with dedicated regression tests; do not manufacture\r\n  a failure.\r\n\r\n## Judge feedback (this loop's self-assessment)\r\n\r\n97/97 objective tests pass. Two behavior-safe improvements landed, each with\r\ndedicated regression tests: (1) `ParseError.reason` attribute (message text and\r\nall other attributes unchanged); (2) committed tests pinning the winner's\r\ndeliberate ASCII-only structural-whitespace behavior. Zero-regression proven:\r\nloop-01's unmodified 87-test suite passes against loop-02's parser. All hard\r\ngates green; weighted self-score 4.85. Recommended as synthesis champion.\r\n\r\n## Next prompt (would be handed to a hypothetical loop-03)\r\n\r\nThe synthesis Track's plan called for exactly two Loops, so there is no loop-03.\r\nIf maintainability were the deciding factor in a future loop, the next\r\nhypothesis -- inherited from the winning Track's own backlog -- would be to\r\nreshape each `_step_*` handler into a standalone pure function of\r\n`(machine_state, ch) -\u003e (new_state, actions)` rather than a bound method\r\nmutating `self`, pushing maintainability toward 5 at the cost of extra ceremony.\r\nThis should be pursued only if an evaluator flags maintainability as decisive,\r\nsince loop-02 found no functional defect requiring it. The other high-value\r\nfollow-up is acquiring real vendor fixtures to resolve the under-specified\r\nUnicode-whitespace question against ground truth rather than pinning the current\r\ndeliberate choice.\r\n"},"role":"provenance","safe_href":"synthesis/loop-02/prompt-history.md","sha256":"07c0a18ec3f5df2a2d6b56ccfcde5c44a8879c0450b493a944a2328a7fb61993"},{"diagnostics":[],"id":"synthesis-report","kind":"markdown","label":"Final synthesis report","path":"synthesis/synthesis-report.md","presentation":{"caption":"Contributions, explicit rejections, loop progression, final scores, limitations, and next experiment.","featured":true,"mode":"markdown","primary":false},"preview":{"kind":"text","language":"md","value":"# Synthesis report -- messy vendor CSV parser\r\n\r\n**Synthesis role model:** `claude-opus-4.8`\r\n**Champion:** `synthesis-loop-02` (promoted to `generated/synthesis/final/`)\r\n**Result:** 97/97 objective tests pass; all blocking core samples pass; no\r\nforbidden `csv` import; zero regression across loops.\r\n\r\n---\r\n\r\n## 1. Starting point (authoritative, never overridden)\r\n\r\nBoth finalist architectures objectively pass the shared **64/64** architecture-\r\nneutral bakeoff and every blocking core sample (embedded comma, embedded\r\nnewline, doubled-quote escaping). The independent `gpt-5.6-terra` judge did\r\n**not** override objective tests; it broke the correctness tie qualitatively and\r\nselected the **character-state-machine** Track as the synthesis base:\r\n\r\n| Criterion (weight) | line-regex (rejected) | track-state-machine (winner) |\r\n|---|---:|---:|\r\n| correctness (.40) | 5.0 | 5.0 |\r\n| robustness (.20) | 4.6 | 4.8 |\r\n| error_clarity (.15) | 4.5 | 5.0 |\r\n| maintainability (.15) | 4.2 | 4.8 |\r\n| constraint_adherence (.10) | 5.0 | 5.0 |\r\n| **weighted total** | **4.745** | **4.940** |\r\n\r\nThe winner's margin: legible named `_State` transitions, one authoritative\r\nphysical-position mechanism (`_Scanner`), and richer, actionable `ParseError`\r\ncontext (1-based line/column **plus** row/field).\r\n\r\n## 2. What each Track contributed\r\n\r\n### track-state-machine (winning base) -- kept verbatim\r\n- The entire architecture: `_State` enum, `_Scanner` (sole owner of\r\n  pos/line/col), per-state `_Machine` handlers, dict dispatch, and a\r\n  row/field-aware `ParseError`. Preserved byte-for-byte in synthesis loop-01;\r\n  **not** hybridized with any regex logical-record assembly.\r\n- Its full 53-case objective suite, reproduced verbatim in the synthesis suite.\r\n\r\n### line-regex (rejected) -- one narrowly-proven helper incorporated\r\n- **Accepted:** the **non-string input guard**. `parse()` now raises\r\n  `TypeError(\"text must be str\")` at the public boundary.\r\n  - *Evidence:* `track-line-regex/final/parser.py` lines 161-162 and its\r\n    committed, passing test `test_type_error_for_non_string`.\r\n  - *Why it improves the winner:* the winner previously leaked an opaque\r\n    `TypeError: 'NoneType' object is not subscriptable` from an internal string\r\n    slice on misuse; the guard makes misuse actionable.\r\n  - *Why it is architecture-compatible:* it is a boundary precondition, not a\r\n    parsing mechanism, so the state machine is untouched.\r\n\r\n## 3. What was rejected, and why\r\n\r\n- **The regex/offset pipeline** (`_physical_lines`, `_logical_records`,\r\n  `_FIELD`, per-character `source_offsets`). The independent judge recorded\r\n  `proven_helpers_for_synthesis = []`: importing this would duplicate the\r\n  winner's scanner and state-transition responsibilities. Confirmed\r\n  independently -- the winner already yields precise physical line/column *and*\r\n  richer row/field context without any offset map. This is an explicit,\r\n  evidence-based rejection of the incompatible helpers.\r\n- **Re-basing `ParseError` on `ValueError`** (the rejected Track's hierarchy).\r\n  Not adopted: no objective test requires it, and the winner's `Exception` base\r\n  plus structured `line/col/row/field` attributes is a deliberate, stable\r\n  contract; changing the base could subtly shift caller `except` semantics for\r\n  zero proven benefit.\r\n\r\n## 4. Loop progression\r\n\r\n### synthesis-loop-01 -- establish the candidate (parents: line-regex-loop-02, track-state-machine-loop-02)\r\n- Winning state machine verbatim + the accepted non-string guard.\r\n- Committed one runnable **union** suite: 53 winning-suite cases (verbatim) +\r\n  31 local shared-bakeoff cases (24 valid + 7 error, copied from\r\n  `generated/cross-evaluation/test_bakeoff.py` and run against the local parser)\r\n  + 3 non-string guard tests = **87/87 pass**.\r\n- **Union-testing finding (no functional bug):** the rejected Track treats\r\n  Unicode-whitespace-only lines (e.g. U+00A0, U+2003) as ignorable blank/comment\r\n  lines; the winner treats only ASCII space/tab as structural whitespace, so\r\n  such a line is data. This is a *deliberate, self-consistent* winner choice --\r\n  it agrees with the shared suite's own `unicode_not_padding` case -- and\r\n  affects **no** hard gate. It was, however, implicit and untested.\r\n\r\n### synthesis-loop-02 -- improve only from loop-01 evidence (parent: synthesis-loop-01)\r\nBecause loop-01 found **no functional bug**, two *measured, behavior-safe*\r\nimprovements were made, each with a dedicated regression test and zero\r\nbehavior change:\r\n1. **Error-API clarity:** `ParseError` now exposes a `.reason` attribute (the\r\n   bare cause). The formatted message and every existing attribute are\r\n   unchanged. (`TestParseErrorReasonAttribute`, 4 tests.)\r\n2. **Coverage/documentation gap:** committed regression tests that **pin** the\r\n   winner's deliberate ASCII-only structural-whitespace behavior, converting an\r\n   implicit behavior into an explicit contract. (`TestUnicodeWhitespacePinned`,\r\n   3 tests, incl. a contrast test that ASCII space/tab-only lines are still\r\n   blanks.)\r\n3. **Runnable fixtures** under `fixtures/` loaded by `TestFixtures` (3 tests).\r\n\r\nTotal **97/97 pass**. **Zero-regression** proven: loop-01's unmodified 87-test\r\nsuite passes against loop-02's `parser.py`.\r\n\r\n## 5. Final scores (0-5) and gate\r\n\r\nObjective correctness is the primary hard gate and dominates; qualitative scores\r\nare provisional self-assessment.\r\n\r\n| Criterion (weight) | Champion score | Notes |\r\n|---|---:|---|\r\n| correctness (.40) | 5 | 97/97 objective tests, all blocking samples, zero regression. |\r\n| robustness (.20) | 5 | Winning adversarial coverage + shared bakeoff + non-string boundary + pinned Unicode edge + fixtures. |\r\n| error_clarity (.15) | 5 | `ParseError` reports line/column/row/field and exposes `.reason`; misuse raises an actionable `TypeError`. |\r\n| maintainability (.15) | 4 | Clean `_Scanner` + per-state handlers; not 5 because handlers mutate shared instance state. |\r\n| constraint_adherence (.10) | 5 | No `csv`/`pandas`/third-party import; state-machine architecture preserved. |\r\n\r\n**Weighted total: 4.85.** Quality gates: `core_samples` PASS, `objective_tests`\r\nPASS, `forbidden_import_scan` PASS. As a synthesis Loop passing every objective\r\nhard gate, loop-02 is eligible as champion and is promoted.\r\n\r\n## 6. Independent judge result (recap)\r\n\r\n`gpt-5.6-terra` selected `track-state-machine` as base (4.940 vs 4.745), with\r\nobjective tests **not** overridden (64/64 for both finalists), and recorded no\r\narchitecture-compatible transplantable helper. The synthesis honored both: kept\r\nthe architecture, and incorporated only a boundary-level API idea the judge's\r\n\"no proven helper\" note was specifically about the *regex/offset pipeline*, not\r\nabout a precondition guard.\r\n\r\n## 7. Remaining limitations\r\n\r\n- **Self-judged synthesis loops.** Objective tests are authoritative and green;\r\n  qualitative scores are provisional.\r\n- **Maintainability 4/5.** Per-state handlers still coordinate through mutable\r\n  `_Machine` buffers. A functional-core refactor (pure\r\n  `(state, char) -\u003e (new_state, actions)` handlers) is deferred; it adds real\r\n  ceremony and no functional defect requires it.\r\n- **Under-specified Unicode whitespace.** The champion *pins* the deliberate\r\n  ASCII-only interpretation, but the prompt does not define the whitespace set;\r\n  a byte-oriented or Unicode-aware consumer might expect different blank-line\r\n  handling.\r\n- **Position units.** Line/column are per Python `str` code point (parse accepts\r\n  an already-decoded `str`), not per UTF-16 unit or UTF-8 byte.\r\n\r\n## 8. Next highest-value experiment\r\n\r\n**Acquire real vendor CSV fixtures** (ground truth) to resolve the one genuine\r\nopen question -- whether Unicode-whitespace-only lines should be ignored -- and,\r\nif maintainability becomes the deciding factor for a downstream consumer,\r\n**refactor each `_step_*` handler into a standalone pure function** of\r\n`(machine_state, ch) -\u003e (new_state, actions)` to push maintainability toward 5\r\nwithout changing behavior. The fixture-driven question is higher value: it could\r\nconvert a currently-pinned *assumption* into a *verified requirement*.\r\n\r\n---\r\n\r\n### Artifact index\r\n\r\n- `loop-01/` and `loop-02/` -- per-loop `parser.py`, `test_parser.py`,\r\n  `test-result.txt`, `judge.md`, `metadata.json`, `prompt-history.md`\r\n  (loop-02 also has `fixtures/`).\r\n- `final/` -- champion `parser.py`, `test_parser.py`, `test-result.txt`,\r\n  `README.md`, `fixtures/`.\r\n- `manifest-fragment.json` -- Track definition + two manifest-ready iterations\r\n  with SHA-256 artifact hashes, full prompt chain, parent lineage, scores,\r\n  quality gates, changed files, lessons, decisions, stop reasons.\r\n- `status.json` -- machine-readable Track status.\r\n"},"role":"synthesis-report","safe_href":"synthesis/synthesis-report.md","sha256":"0f29a1e691cf6227796a19e82924a293b24d29398f2699863ad0cb6d22504268"}],"changed_files":["synthesis/loop-02/parser.py","synthesis/loop-02/test_parser.py","synthesis/loop-02/test-result.txt","synthesis/loop-02/judge.md","synthesis/loop-02/metadata.json","synthesis/loop-02/prompt-history.md","synthesis/loop-02/fixtures/sample.csv","synthesis/loop-02/fixtures/malformed_unterminated_quote.csv","synthesis/loop-02/fixtures/malformed_quote_in_unquoted.csv","synthesis/final/parser.py","synthesis/final/test_parser.py","synthesis/final/test-result.txt","synthesis/final/README.md","synthesis/final/fixtures/sample.csv","synthesis/final/fixtures/malformed_unterminated_quote.csv","synthesis/final/fixtures/malformed_quote_in_unquoted.csv"],"commands":{"build":"Copy loop-01 parser/tests to loop-02; add self.reason to ParseError; add TestParseErrorReasonAttribute, TestUnicodeWhitespacePinned, and TestFixtures; author fixtures/sample.csv and two malformed fixtures.","judge":"Self-assessment in judge.md plus an explicit zero-regression re-run of loop-01's unmodified suite against loop-02's parser.py and a forbidden-import scan.","run":"cd generated\\synthesis\\loop-02 \u0026\u0026 python test_parser.py"},"decision":"new_best","hypothesis":"Because loop-01 found no functional bug, two measured behavior-safe changes driven by loop-01 evidence -- exposing ParseError.reason and pinning the winner's deliberate ASCII-only whitespace behavior -- will raise API/documentation clarity with zero regression, and runnable fixtures will demonstrate the champion end-to-end.","id":"synthesis-loop-02","index":5,"is_champion":true,"label":"synthesis-loop-02","lesson":{"action":"Expose ParseError.reason (message and other attributes unchanged) and commit regression tests pinning the winner's deliberate ASCII-only whitespace behavior, plus runnable fixtures.","confidence":"high","evidence":"97/97 pass and a zero-regression re-run of loop-01's unmodified 87-test suite against loop-02's parser.py confirmed no observable behavior change beyond the new attribute.","trigger":"loop-01 found no functional defect, so an improvement had to be genuinely additive rather than a manufactured bug fix."},"model_id":"claude-opus-4.8","outcome":"97/97 objective tests pass (87 inherited + 4 ParseError.reason + 3 Unicode-whitespace pinning + 3 fixture loading). Zero regression: loop-01's unmodified 87-test suite passes against loop-02's parser.py. All blocking core samples pass; forbidden-import scan passes. Message text and existing ParseError attributes are unchanged; the only runtime-visible addition is the .reason attribute.","parent_ids":["synthesis-loop-01"],"primary_artifact":{"diagnostics":[],"id":"synthesis-loop-02-parser","kind":"python-source","label":"loop-02 parser.py (synthesis champion)","path":"synthesis/loop-02/parser.py","presentation":{"alt_text":"Python source implementing the character-state-machine CSV parser with a Scanner, per-state handlers, and a ParseError exposing reason/line/col/row/field.","caption":"Synthesis champion: winning state machine + non-string guard + additive ParseError.reason.","comparison_key":"parser-snapshot","featured":true,"mode":"code","primary":true},"preview":{"kind":"text","language":"py","value":"\"\"\"Hand-rolled parser for a messy vendor CSV dialect -- synthesis loop-02.\r\n\r\nSynthesis provenance\r\n--------------------\r\nThis is loop-02 of the ``synthesis`` Track (model ``claude-opus-4.8``), whose\r\nparent is ``synthesis-loop-01``. It changes no parsing behavior relative to\r\nloop-01. It makes exactly one measured, behavior-safe API improvement driven by\r\nloop-01 evidence (a review of the two Tracks' error APIs): ``ParseError`` now\r\nalso exposes a ``reason`` attribute -- the bare cause string, previously only\r\nrecoverable by substring-parsing the formatted message. The formatted message\r\nand every existing attribute (``line``/``col``/``row_number``/``field_number``)\r\nare unchanged, so all loop-01 tests pass unchanged. loop-02 additionally commits\r\nregression tests that pin the winner's deliberate ASCII-only structural-\r\nwhitespace behavior (the under-specified edge surfaced by loop-01 union testing)\r\nand load runnable sample fixtures.\r\n\r\nLineage note: loop-01 has a multi-parent lineage of ``line-regex-loop-02``\r\n(rejected architecture) and ``track-state-machine-loop-02`` (winning\r\narchitecture). Per the independent\r\n``gpt-5.6-terra`` judge (weighted 4.940 vs 4.745), the winning\r\ncharacter-state-machine architecture is kept verbatim: named ``_State``\r\ntransitions, a single ``_Scanner`` owning physical coordinates, and\r\n``ParseError`` carrying 1-based line/column plus row/field context.\r\n\r\nThe judge found **no** rejected-track helper both necessary and\r\narchitecture-compatible: its offset-map/regex pipeline (``_physical_lines``,\r\n``_logical_records``, ``_FIELD``, per-character ``source_offsets``) would\r\nduplicate this scanner/state-transition responsibility and is therefore\r\nexplicitly rejected. The one narrowly-proven, architecture-neutral idea that\r\n*is* incorporated from the rejected Track is its **non-string input guard**:\r\n``parse(None)`` (or any non-``str``) now raises a clear\r\n``TypeError(\"text must be str\")`` at the public boundary instead of an opaque\r\n``TypeError: 'NoneType' object is not subscriptable`` leaking from an internal\r\nstring slice. Evidence: ``track-line-regex/final/parser.py`` lines 161-162 and\r\nits committed test ``test_type_error_for_non_string`` (final test_parser.py\r\nlines 146-148), which passed in that Track. This is a boundary precondition,\r\nnot a parsing mechanism, so it changes nothing about the state machine.\r\n\r\nArchitecture (unchanged from the winning Track)\r\n-----------------------------------------------\r\nA single-pass, whole-input **character state machine**. The entire input\r\nstring is scanned once (with multi-character newline sequences such as\r\n``\\\\r\\\\n`` collapsed into a single logical transition). A small ``_State``\r\nenum names every state the machine can be in; a dedicated handler method\r\nexists per state, and each handler's docstring records its invariants and the\r\ntransitions it may take. A ``_Scanner`` helper owns the raw cursor (character\r\noffset, 1-based line, 1-based column) and centralizes the two primitive moves\r\nevery state needs (``advance`` over an ordinary character, ``advance_newline``\r\nover a logical newline), so precise source positions are computed in exactly\r\none place instead of being duplicated across every branch.\r\n\r\nNo use of the standard-library ``csv`` module, ``pandas``, or any third-party\r\nparsing library.\r\n\r\nPublic API\r\n----------\r\n``ParseError`` -- raised for any malformed input; message includes a 1-based\r\nline and column plus the row/field index being parsed.\r\n\r\n``parse(text: str) -\u003e list[list[str]]`` -- parse the given text into rows of\r\nstring fields. Raises ``TypeError`` if ``text`` is not a ``str``.\r\n\"\"\"\r\n\r\nfrom __future__ import annotations\r\n\r\nfrom enum import Enum, auto\r\n\r\n\r\nclass ParseError(Exception):\r\n    \"\"\"Raised when the input cannot be parsed as valid vendor CSV.\r\n\r\n    Attributes:\r\n        reason: the bare human-readable cause, without the coordinate suffix.\r\n        line: 1-based line number where the problem was detected.\r\n        col: 1-based column number where the problem was detected.\r\n        row_number: 1-based index of the logical row being parsed.\r\n        field_number: 1-based index of the field within that row.\r\n    \"\"\"\r\n\r\n    def __init__(self, reason: str, line: int, col: int, row_number: int, field_number: int):\r\n        self.reason = reason\r\n        self.line = line\r\n        self.col = col\r\n        self.row_number = row_number\r\n        self.field_number = field_number\r\n        super().__init__(\r\n            f\"{reason} (line {line}, column {col}, row {row_number}, field {field_number})\"\r\n        )\r\n\r\n\r\nclass _State(Enum):\r\n    \"\"\"Named states of the whole-input character state machine.\r\n\r\n    FIELD_START\r\n        Positioned at the start of a field (either the first field of a\r\n        row, right after a row boundary, or any later field right after a\r\n        comma). Leading spaces/tabs are consumed here without being kept.\r\n        When this is the *first* field attempt of a fresh row\r\n        (``row_start_untouched`` is True) a ``#`` means \"comment line\" and\r\n        an immediate newline/EOF means \"blank line\" -- neither produces a\r\n        row.\r\n    IN_UNQUOTED\r\n        Accumulating characters of an unquoted field. Terminates on\r\n        comma, newline, or EOF. A literal quote character here is\r\n        malformed.\r\n    IN_QUOTED\r\n        Accumulating characters of a quoted field verbatim (interior\r\n        whitespace preserved). Newlines are normalized to ``\\\\n``. A quote\r\n        character transitions to QUOTE_PENDING to disambiguate an escaped\r\n        quote from field closure.\r\n    QUOTE_PENDING\r\n        Just saw a ``\"`` while inside a quoted field. If the next\r\n        character is also ``\"`` this is a doubled-quote escape and we\r\n        return to IN_QUOTED. Otherwise the field is closed and we move to\r\n        AFTER_QUOTE without consuming the next character.\r\n    AFTER_QUOTE\r\n        The quoted field's closing quote has been seen. Only spaces/tabs\r\n        are permitted until the field/row terminator (comma, newline, or\r\n        EOF); anything else is malformed.\r\n    IN_COMMENT\r\n        Consuming (and discarding) the remainder of a comment line, up to\r\n        but not including its terminating newline.\r\n    \"\"\"\r\n\r\n    FIELD_START = auto()\r\n    IN_UNQUOTED = auto()\r\n    IN_QUOTED = auto()\r\n    QUOTE_PENDING = auto()\r\n    AFTER_QUOTE = auto()\r\n    IN_COMMENT = auto()\r\n\r\n\r\n_BOM = \"\\ufeff\"\r\n_WS = (\" \", \"\\t\")\r\n\r\n\r\ndef _is_newline_start(ch: str) -\u003e bool:\r\n    return ch == \"\\r\" or ch == \"\\n\"\r\n\r\n\r\nclass _Scanner:\r\n    \"\"\"Owns the raw cursor over the input text.\r\n\r\n    Invariant: ``line``/``col`` always describe the position of the\r\n    character at ``text[pos]`` (or, at end of input, the position one past\r\n    the last character). This is the *only* class allowed to mutate\r\n    ``pos``/``line``/``col`` -- every state handler goes through\r\n    ``advance`` or ``advance_newline`` instead of touching them directly.\r\n    \"\"\"\r\n\r\n    __slots__ = (\"text\", \"n\", \"pos\", \"line\", \"col\")\r\n\r\n    def __init__(self, text: str, start_pos: int = 0):\r\n        self.text = text\r\n        self.n = len(text)\r\n        self.pos = start_pos\r\n        self.line = 1\r\n        self.col = 1\r\n\r\n    def at_eof(self) -\u003e bool:\r\n        return self.pos \u003e= self.n\r\n\r\n    def peek(self) -\u003e str:\r\n        \"\"\"Return the character at the cursor. Caller must check at_eof().\"\"\"\r\n        return self.text[self.pos]\r\n\r\n    def advance(self) -\u003e None:\r\n        \"\"\"Move past one ordinary (non-newline) character.\"\"\"\r\n        self.pos += 1\r\n        self.col += 1\r\n\r\n    def advance_newline(self) -\u003e None:\r\n        \"\"\"Move past one logical newline: \\\\r\\\\n, bare \\\\r, or bare \\\\n.\"\"\"\r\n        if self.text[self.pos] == \"\\r\" and self.pos + 1 \u003c self.n and self.text[self.pos + 1] == \"\\n\":\r\n            self.pos += 2\r\n        else:\r\n            self.pos += 1\r\n        self.line += 1\r\n        self.col = 1\r\n\r\n\r\nclass _Machine:\r\n    \"\"\"Drives the state machine over one full input string.\"\"\"\r\n\r\n    def __init__(self, text: str):\r\n        # A UTF-8 BOM is only legal at absolute offset zero. It is\r\n        # consumed silently and does not occupy a column of its own.\r\n        start_pos = 1 if text[:1] == _BOM else 0\r\n        self.sc = _Scanner(text, start_pos)\r\n        self.rows: list[list[str]] = []\r\n        self.row: list[str] = []\r\n        self.field_chars: list[str] = []\r\n        self.state = _State.FIELD_START\r\n        self.row_start_untouched = True\r\n        self.row_number = 1\r\n        self.field_number = 1\r\n        self.quote_start_line = 0\r\n        self.quote_start_col = 0\r\n\r\n    # -- error helper --------------------------------------------------\r\n    def _error(self, reason: str) -\u003e ParseError:\r\n        return ParseError(reason, self.sc.line, self.sc.col, self.row_number, self.field_number)\r\n\r\n    # -- field/row bookkeeping ------------------------------------------\r\n    def _commit_field(self, value: str) -\u003e None:\r\n        self.row.append(value)\r\n        self.field_number += 1\r\n\r\n    def _commit_row(self) -\u003e None:\r\n        self.rows.append(self.row.copy())\r\n        self.row.clear()\r\n        self.row_number += 1\r\n        self.field_number = 1\r\n\r\n    # -- per-state handlers ----------------------------------------------\r\n    def _step_field_start(self, ch: str) -\u003e None:\r\n        \"\"\"At the start of a field: skip padding, classify the row if needed.\"\"\"\r\n        sc = self.sc\r\n        if ch in _WS:\r\n            sc.advance()\r\n            return\r\n        if self.row_start_untouched and ch == \"#\":\r\n            self.state = _State.IN_COMMENT\r\n            sc.advance()\r\n            return\r\n        if self.row_start_untouched and _is_newline_start(ch):\r\n            # Blank/whitespace-only physical line: discard, no row emitted.\r\n            sc.advance_newline()\r\n            return\r\n        self.row_start_untouched = False\r\n        if ch == '\"':\r\n            self.quote_start_line, self.quote_start_col = sc.line, sc.col\r\n            self.field_chars = []\r\n            self.state = _State.IN_QUOTED\r\n            sc.advance()\r\n            return\r\n        if ch == \",\":\r\n            self._commit_field(\"\")\r\n            sc.advance()\r\n            return\r\n        if _is_newline_start(ch):\r\n            self._commit_field(\"\")\r\n            self._commit_row()\r\n            sc.advance_newline()\r\n            self.row_start_untouched = True\r\n            return\r\n        # First real character of an unquoted field.\r\n        self.field_chars = [ch]\r\n        self.state = _State.IN_UNQUOTED\r\n        sc.advance()\r\n\r\n    def _step_in_unquoted(self, ch: str) -\u003e None:\r\n        \"\"\"Accumulating an unquoted field; a quote here is malformed.\"\"\"\r\n        sc = self.sc\r\n        if ch == \",\":\r\n            self._commit_field(\"\".join(self.field_chars).rstrip(\" \\t\"))\r\n            self.field_chars = []\r\n            self.state = _State.FIELD_START\r\n            sc.advance()\r\n            return\r\n        if _is_newline_start(ch):\r\n            self._commit_field(\"\".join(self.field_chars).rstrip(\" \\t\"))\r\n            self.field_chars = []\r\n            self._commit_row()\r\n            sc.advance_newline()\r\n            self.state = _State.FIELD_START\r\n            self.row_start_untouched = True\r\n            return\r\n        if ch == '\"':\r\n            raise self._error(\"Unexpected quote character inside an unquoted field\")\r\n        self.field_chars.append(ch)\r\n        sc.advance()\r\n\r\n    def _step_in_quoted(self, ch: str) -\u003e None:\r\n        \"\"\"Inside a quoted field: verbatim content, newlines normalized.\"\"\"\r\n        sc = self.sc\r\n        if ch == '\"':\r\n            self.state = _State.QUOTE_PENDING\r\n            sc.advance()\r\n            return\r\n        if _is_newline_start(ch):\r\n            sc.advance_newline()\r\n            self.field_chars.append(\"\\n\")\r\n            return\r\n        self.field_chars.append(ch)\r\n        sc.advance()\r\n\r\n    def _step_quote_pending(self, ch: str) -\u003e None:\r\n        \"\"\"Just saw a quote inside a quoted field: escape or close?\"\"\"\r\n        if ch == '\"':\r\n            # Doubled quote: escaped literal quote, field stays open.\r\n            self.field_chars.append('\"')\r\n            self.state = _State.IN_QUOTED\r\n            self.sc.advance()\r\n            return\r\n        # Field is closed; re-process this same character in AFTER_QUOTE\r\n        # without consuming it (no cursor movement here).\r\n        self.state = _State.AFTER_QUOTE\r\n\r\n    def _step_after_quote(self, ch: str) -\u003e None:\r\n        \"\"\"After a quoted field's closing quote: only padding, then terminator.\"\"\"\r\n        sc = self.sc\r\n        if ch in _WS:\r\n            sc.advance()\r\n            return\r\n        if ch == \",\":\r\n            self._commit_field(\"\".join(self.field_chars))\r\n            self.field_chars = []\r\n            self.state = _State.FIELD_START\r\n            sc.advance()\r\n            return\r\n        if _is_newline_start(ch):\r\n            self._commit_field(\"\".join(self.field_chars))\r\n            self.field_chars = []\r\n            self._commit_row()\r\n            sc.advance_newline()\r\n            self.state = _State.FIELD_START\r\n            self.row_start_untouched = True\r\n            return\r\n        raise self._error(\r\n            f\"Unexpected character {ch!r} after closing quote; expected a comma or a newline\"\r\n        )\r\n\r\n    def _step_in_comment(self, ch: str) -\u003e None:\r\n        \"\"\"Discarding the remainder of a comment line.\"\"\"\r\n        sc = self.sc\r\n        if _is_newline_start(ch):\r\n            sc.advance_newline()\r\n            self.state = _State.FIELD_START\r\n            self.row_start_untouched = True\r\n            return\r\n        sc.advance()\r\n\r\n    _HANDLERS = {\r\n        _State.FIELD_START: _step_field_start,\r\n        _State.IN_UNQUOTED: _step_in_unquoted,\r\n        _State.IN_QUOTED: _step_in_quoted,\r\n        _State.QUOTE_PENDING: _step_quote_pending,\r\n        _State.AFTER_QUOTE: _step_after_quote,\r\n        _State.IN_COMMENT: _step_in_comment,\r\n    }\r\n\r\n    def run(self) -\u003e list[list[str]]:\r\n        sc = self.sc\r\n        while not sc.at_eof():\r\n            ch = sc.peek()\r\n            if ch == _BOM:\r\n                raise self._error(\"Byte-order mark is only permitted at the start of input\")\r\n            self._HANDLERS[self.state](self, ch)\r\n        self._finalize()\r\n        return self.rows\r\n\r\n    def _finalize(self) -\u003e None:\r\n        \"\"\"Handle input that ends without a trailing newline.\"\"\"\r\n        if self.state == _State.FIELD_START:\r\n            if not (self.row_start_untouched and not self.row):\r\n                self._commit_field(\"\")\r\n                self._commit_row()\r\n        elif self.state == _State.IN_UNQUOTED:\r\n            self._commit_field(\"\".join(self.field_chars).rstrip(\" \\t\"))\r\n            self._commit_row()\r\n        elif self.state in (_State.AFTER_QUOTE, _State.QUOTE_PENDING):\r\n            self._commit_field(\"\".join(self.field_chars))\r\n            self._commit_row()\r\n        elif self.state == _State.IN_QUOTED:\r\n            raise ParseError(\r\n                \"Unterminated quoted field (opening quote never closed)\",\r\n                self.quote_start_line,\r\n                self.quote_start_col,\r\n                self.row_number,\r\n                self.field_number,\r\n            )\r\n        # IN_COMMENT at EOF: nothing to commit, comment simply ends.\r\n\r\n\r\ndef parse(text: str) -\u003e list[list[str]]:\r\n    \"\"\"Parse ``text`` (already-decoded str) into a list of rows of fields.\r\n\r\n    See module docstring for the dialect rules enforced. Raises ``TypeError``\r\n    if ``text`` is not a ``str`` (a boundary precondition incorporated from the\r\n    rejected line-regex Track; see module docstring for evidence).\r\n    \"\"\"\r\n    if not isinstance(text, str):\r\n        raise TypeError(\"text must be str\")\r\n    return _Machine(text).run()\r\n"},"role":"primary-output","safe_href":"synthesis/loop-02/parser.py","sha256":"8e5d76be27af670d91f4dff20120c6e877579c9ddeb0f6e5c39 tive tests. Use `claude-opus-4.8` for a synthesis Track\r\nthat keeps the winning architecture and selectively incorporates any proven\r\nhelper from the rejected Track.\r\n\r\nProduce runnable parser snapshots, committed sample fixtures, test-result\r\nArtifacts, judge notes, complete prompt/feedback history, and a Manifest v1.1.\r\nRecord the actual model ID for every generator, judge, synthesis role, and Loop.\r\n","statement":"Hand-roll a Python parser for a messy vendor CSV dialect and determine which of two competing architectures provides the strongest objectively correct, robust, actionable, maintainable, constraint-adherent implementation.","success_criteria":["Every blocking core sample passes and the primary objective correctness score reaches the hard gate of 5 points.","Shared architecture-neutral tests compare both finalists without favoring track-local test counts.","The independent qualitative judge breaks only objective parity and never overrides an objective failure.","The champion has runnable parser, tests, fixtures, clear ParseError evidence, complete prompt/feedback lineage, and verified artifact hashes."]},"rules":["Objective tests are authoritative: the primary correctness criterion is a hard gate at \u003e=5 points, and a primary objective failure forces rejection regardless of qualitative opinion.","Embedded commas, embedded newlines, and doubled-quote escaping are blocking core samples; any failure blocks promotion.","The independent gpt-5.6-terra judge may break an objective tie on maintainability and error clarity but may never override objective tests.","Track-local test counts are supporting evidence only; the shared architecture-neutral bakeoff is the primary cross-track comparison.","A synthesis helper from the rejected architecture is accepted only when objective evidence shows it is architecture-compatible and non-duplicative."],"schema_version":"1.1","scorecard":[{"comparable_across_tracks":true,"direction":"maximize","gate":{"ope ary objective location assertion failed.","iteration_id":"line-regex-loop-01"},{"caption":"Source-offset mapping repaired the measured diagnostic failure and produced a 38/38 finalist.","iteration_id":"line-regex-loop-02"},{"caption":"The state-machine baseline was correct but exposed a monolithic-function maintainability weakness.","iteration_id":"track-state-machine-loop-01"},{"caption":"A Scanner and per-state handlers delivered zero regression, 53/53 tests, and the independent judge's preferred base.","iteration_id":"track-state-machine-loop-02"},{"caption":"Multi-parent synthesis preserved the winning architecture, added one boundary guard, and passed an 87-test union suite.","iteration_id":"synthesis-loop-01"},{"caption":"Evidence-driven API and contract improvements reached 97/97 with zero regression and were promoted as champion.","iteration_id":"synthesis-loop-02"}],"primary_comparison_key":"parser-snapshot"},"synthesis":"The line/regex baseline was correctly rejected when Loop 01 failed its primary objective location test despite passing all core samples; Loop 02 repaired that failure and entered the shared bakeoff. Both finalists then passed all 64 shared tests and blocking samples. A blind-first-pass gpt-5.6-terra qualitative tie-break selected the character-state-machine base (4.940 vs 4.745) without overriding objective parity. Synthesis preserved that architecture, accepted only the line/regex track's architecture-neutral non-string guard, explicitly rejected its duplicate regex/offset pipeline, added ParseError.reason and pinned whitespace behavior, and promoted synthesis-loop-02 after 97/97 tests, all hard gates, and an 87/87 zero-regression rerun passed. Remaining caveats are mutable handler state and under-specified Unicode whitespace.","title":"Messy Vendor CSV Parser Architecture Bake-off","tracks":[{"final_decision":"Promote loop 02: all 38 expanded objective tests and all blocking core gates pass.","hypothesis":"Physical-line assembly plus anc "],"id":"provisional-self-judge","judge_panel":"line-regex-self-panel","primary":false,"type":"llm_rubric","weight":1.0},{"criterion_ids":["correctness","robustness","error_clarity","maintainability","constraint_adherence"],"id":"self-judge-track-state-machine","judge_panel":"state-machine-self-panel","primary":false,"type":"llm_rubric","weight":1.0},{"criterion_ids":["correctness","robustness","error_clarity","maintainability","constraint_adherence"],"id":"self-judge-synthesis","judge_panel":"synthesis-self-panel","primary":false,"type":"llm_rubric","weight":1.0},{"criterion_ids":["correctness","robustness","error_clarity","maintainability","constraint_adherence"],"id":"independent-terra-qualitative","judge_panel":"independent-terra-panel","primary":false,"type":"llm_rubric","weight":1.0}],"story":{"featured_artifact_id":"synthesis-final-parser","milestones":[{"caption":"Line/regex baseline passed every blocking sample but was rejected when its primary objective location assertion failed.","iteration_id":"line-regex-loop-01"},{"caption":"Source-offset mapping repaired the measured diagnostic failure and produced a 38/38 finalist.","iteration_id":"line-regex-loop-02"},{"caption":"The state-machine baseline was correct but exposed a monolithic-function maintainability weakness.","iteration_id":"track-state-machine-loop-01"},{"caption":"A Scanner and per-state handlers delivered zero regression, 53/53 tests, and the independent judge's preferred base.","iteration_id":"track-state-machine-loop-02"},{"caption":"Multi-parent synthesis preserved the winning architecture, added one boundary guard, and passed an 87-test union suite.","iteration_id":"synthesis-loop-01"},{"caption":"Evidence-driven API and contract improvements reached 97/97 with zero regression and were promoted as champion.","iteration_id":"synthesis-loop-02"}],"primary_comparison_key":"parser-snapshot"},"title":"Messy Vendor CSV Parser Architecture Bake-off","tracks":[{"final_decision":"Promote loop 02: al
