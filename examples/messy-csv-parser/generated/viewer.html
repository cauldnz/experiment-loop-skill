nquoted_all_whitespace_field_becomes_empty (__main__.TestTrimming.test_unquoted_all_whitespace_field_becomes_empty) ... ok\r\ntest_unquoted_surrounding_whitespace_trimmed (__main__.TestTrimming.test_unquoted_surrounding_whitespace_trimmed) ... ok\r\ntest_unquoted_tabs_only_field_becomes_empty (__main__.TestTrimming.test_unquoted_tabs_only_field_becomes_empty) ... ok\r\ntest_unicode_content_preserved (__main__.TestUnicode.test_unicode_content_preserved) ... ok\r\n\r\n----------------------------------------------------------------------\r\nRan 53 tests in 0.005s\r\n\r\nOK\r\n----------------------------------------------------------------------\r\n\r\nCounts: 53 tests run, 53 passed, 0 failed, 0 errors.\r\n(Up from loop-01's 30; the 30 loop-01 tests are unchanged/still present and\r\n23 new adversarial/error-location tests were added.)\r\n\r\nBlocking core samples (all must pass, and did):\r\n  - test_core_embedded_comma ... ok\r\n  - test_core_embedded_newline ... ok\r\n  - test_core_doubled_quote_escaping ... ok\r\n\r\nWhat changed vs loop-01 and why:\r\n  - Refactored the single ~250-line procedural `parse()` into a `_Scanner`\r\n    class (owns pos/line/col; the only place that mutates them, via\r\n    `advance()`/`advance_newline()`) plus a `_Machine` class with one small\r\n    handler method per `_State` member, dispatched from a dict. This\r\n    directly addresses the maintainability weakness identified in\r\n    loop-01's judge.md, without changing any observable parsing behavior\r\n    (all 30 loop-01 test cases pass unchanged against loop-02's parser.py).\r\n  - `ParseError` now also reports `row_number`/`field_number` in addition\r\n    to line/column, improving error_clarity (verified by\r\n    test_error_message_mentions_row_and_field_words and\r\n    test_quote_in_unquoted_field_reports_row_and_field).\r\n  - Promoted 12 of loop-01's ad-hoc adversarial probes into committed,\r\n    repeatable tests (empty quoted pair, quoted-field-flush-at-EOF,\r\n    odd-trailing-quotes-still-unterminated, multi-line error position,\r\n    bare-CR-in-quotes, comment-with-no-trailing-newline, BOM in three more\r\n    contexts, '#' not at line start, tabs-only field, mixed CRLF/LF,\r\n    unicode content, comment-only file) and added several more (still-open\r\n    field via doubled-quote-then-literal-comma, all-blank-and-comment\r\n    file, comment right after BOM with no blank line, non-trim whitespace\r\n    chars like vertical-tab/form-feed preserved literally, quoted field\r\n    immediately followed by EOF right after a comma).\r\n"},"role":"test-output","safe_href":"track-state-machine/loop-02/test-result.txt","sha256":"ddd520659655c039bd5ab41042eeeef5c4bb838a45744965370f14983cd59b3a"},{"diagnostics":[],"id":"track-state-machine-final-parser","kind":"code","label":"final/parser.py (promoted champion snapshot)","path":"track-state-machine/final/parser.py","presentation":{"alt_text":"Final promoted character-state-machine CSV parser source, identical to loop-02.","caption":"Champion parser.py copied verbatim from loop-02 into final/ for downstream synthesis comparison.","comparison_key":"parser-snapshot","featured":true,"mode":"code","primary":false},"preview":{"kind":"text","language":"py","value":"\"\"\"Hand-rolled parser for a messy vendor CSV dialect.\r\n\r\nArchitecture\r\n------------\r\nThis module implements a single-pass, whole-input **character state\r\nmachine**. The entire input string is scanned once (with multi-character\r\nnewline sequences such as ``\\\\r\\\\n`` collapsed into a single logical\r\ntransition). A small ``_State`` enum names every state the machine can be\r\nin; a dedicated handler method exists per state, and each handler's\r\ndocstring records its invariants and the transitions it may take. A\r\n``_Scanner`` helper owns the raw cursor (character offset, 1-based line,\r\n1-based column) and centralizes the two primitive moves every state needs\r\n(``advance`` over an ordinary character, ``advance_newline`` over a\r\nlogical newline), so precise source positions are computed in exactly one\r\nplace instead of being duplicated across every branch.\r\n\r\nThis is loop-02 of the ``track-state-machine`` Track. It keeps loop-01's\r\nproven state/transition design (all 30 loop-01 tests still pass unchanged)\r\nbut refactors the single ~250-line procedural function into:\r\n\r\n  * ``_Scanner``       -- owns pos/line/col, the only place that advances them.\r\n  * ``_Machine``        -- owns the field/row buffers and one small handler\r\n                           method per ``_State`` member.\r\n  * ``ParseError``      -- now also reports which row/field was being\r\n                           parsed when the problem was found, in addition\r\n                           to the 1-based line/column.\r\n\r\nNo use of the standard-library ``csv`` module, ``pandas``, or any\r\nthird-party parsing library.\r\n\r\nPublic API\r\n----------\r\n``ParseError`` -- raised for any malformed input; message includes a\r\n1-based line and column plus the row/field index being parsed.\r\n\r\n``parse(text: str) -\u003e list[list[str]]`` -- parse the given text into rows\r\nof string fields.\r\n\"\"\"\r\n\r\nfrom __future__ import annotations\r\n\r\nfrom enum import Enum, auto\r\n\r\n\r\nclass ParseError(Exception):\r\n    \"\"\"Raised when the input cannot be parsed as valid vendor CSV.\r\n\r\n    Attributes:\r\n        line: 1-based line number where the problem was detected.\r\n        col: 1-based column number where the problem was detected.\r\n        row_number: 1-based index of the logical row being parsed.\r\n        field_number: 1-based index of the field within that row.\r\n    \"\"\"\r\n\r\n    def __init__(self, reason: str, line: int, col: int, row_number: int, field_number: int):\r\n        self.line = line\r\n        self.col = col\r\n        self.row_number = row_number\r\n        self.field_number = field_number\r\n        super().__init__(\r\n            f\"{reason} (line {line}, column {col}, row {row_number}, field {field_number})\"\r\n        )\r\n\r\n\r\nclass _State(Enum):\r\n    \"\"\"Named states of the whole-input character state machine.\r\n\r\n    FIELD_START\r\n        Positioned at the start of a field (either the first field of a\r\n        row, right after a row boundary, or any later field right after a\r\n        comma). Leading spaces/tabs are consumed here without being kept.\r\n        When this is the *first* field attempt of a fresh row\r\n        (``row_start_untouched`` is True) a ``#`` means \"comment line\" and\r\n        an immediate newline/EOF means \"blank line\" -- neither produces a\r\n        row.\r\n    IN_UNQUOTED\r\n        Accumulating characters of an unquoted field. Terminates on\r\n        comma, newline, or EOF. A literal quote character here is\r\n        malformed.\r\n    IN_QUOTED\r\n        Accumulating characters of a quoted field verbatim (interior\r\n        whitespace preserved). Newlines are normalized to ``\\\\n``. A quote\r\n        character transitions to QUOTE_PENDING to disambiguate an escaped\r\n        quote from field closure.\r\n    QUOTE_PENDING\r\n        Just saw a ``\"`` while inside a quoted field. If the next\r\n        character is also ``\"`` this is a doubled-quote escape and we\r\n        return to IN_QUOTED. Otherwise the field is closed and we move to\r\n        AFTER_QUOTE without consuming the next character.\r\n    AFTER_QUOTE\r\n        The quoted field's closing quote has been seen. Only spaces/tabs\r\n        are permitted until the field/row terminator (comma, newline, or\r\n        EOF); anything else is malformed.\r\n    IN_COMMENT\r\n        Consuming (and discarding) the remainder of a comment line, up to\r\n        but not including its terminating newline.\r\n    \"\"\"\r\n\r\n    FIELD_START = auto()\r\n    IN_UNQUOTED = auto()\r\n    IN_QUOTED = auto()\r\n    QUOTE_PENDING = auto()\r\n    AFTER_QUOTE = auto()\r\n    IN_COMMENT = auto()\r\n\r\n\r\n_BOM = \"\\ufeff\"\r\n_WS = (\" \", \"\\t\")\r\n\r\n\r\ndef _is_newline_start(ch: str) -\u003e bool:\r\n    return ch == \"\\r\" or ch == \"\\n\"\r\n\r\n\r\nclass _Scanner:\r\n    \"\"\"Owns the raw cursor over the input text.\r\n\r\n    Invariant: ``line``/``col`` always describe the position of the\r\n    character at ``text[pos]`` (or, at end of input, the position one past\r\n    the last character). This is the *only* class allowed to mutate\r\n    ``pos``/``line``/``col`` -- every state handler goes through\r\n    ``advance`` or ``advance_newline`` instead of touching them directly.\r\n    \"\"\"\r\n\r\n    __slots__ = (\"text\", \"n\", \"pos\", \"line\", \"col\")\r\n\r\n    def __init__(self, text: str, start_pos: int = 0):\r\n        self.text = text\r\n        self.n = len(text)\r\n        self.pos = start_pos\r\n        self.line = 1\r\n        self.col = 1\r\n\r\n    def at_eof(self) -\u003e bool:\r\n        return self.pos \u003e= self.n\r\n\r\n    def peek(self) -\u003e str:\r\n        \"\"\"Return the character at the cursor. Caller must check at_eof().\"\"\"\r\n        return self.text[self.pos]\r\n\r\n    def advance(self) -\u003e None:\r\n        \"\"\"Move past one ordinary (non-newline) character.\"\"\"\r\n        self.pos += 1\r\n        self.col += 1\r\n\r\n    def advance_newline(self) -\u003e None:\r\n        \"\"\"Move past one logical newline: \\\\r\\\\n, bare \\\\r, or bare \\\\n.\"\"\"\r\n        if self.text[self.pos] == \"\\r\" and self.pos + 1 \u003c self.n and self.text[self.pos + 1] == \"\\n\":\r\n            self.pos += 2\r\n        else:\r\n            self.pos += 1\r\n        self.line += 1\r\n        self.col = 1\r\n\r\n\r\nclass _Machine:\r\n    \"\"\"Drives the state machine over one full input string.\"\"\"\r\n\r\n    def __init__(self, text: str):\r\n        # A UTF-8 BOM is only legal at absolute offset zero. It is\r\n        # consumed silently and does not occupy a column of its own.\r\n        start_pos = 1 if text[:1] == _BOM else 0\r\n        self.sc = _Scanner(text, start_pos)\r\n        self.rows: list[list[str]] = []\r\n        self.row: list[str] = []\r\n        self.field_chars: list[str] = []\r\n        self.state = _State.FIELD_START\r\n        self.row_start_untouched = True\r\n        self.row_number = 1\r\n        self.field_number = 1\r\n        self.quote_start_line = 0\r\n        self.quote_start_col = 0\r\n\r\n    # -- error helper --------------------------------------------------\r\n    def _error(self, reason: str) -\u003e ParseError:\r\n        return ParseError(reason, self.sc.line, self.sc.col, self.row_number, self.field_number)\r\n\r\n    # -- field/row bookkeeping ------------------------------------------\r\n    def _commit_field(self, value: str) -\u003e None:\r\n        self.row.append(value)\r\n        self.field_number += 1\r\n\r\n    def _commit_row(self) -\u003e None:\r\n        self.rows.append(self.row.copy())\r\n        self.row.clear()\r\n        self.row_number += 1\r\n        self.field_number = 1\r\n\r\n    # -- per-state handlers ----------------------------------------------\r\n    def _step_field_start(self, ch: str) -\u003e None:\r\n        \"\"\"At the start of a field: skip padding, classify the row if needed.\"\"\"\r\n        sc = self.sc\r\n        if ch in _WS:\r\n            sc.advance()\r\n            return\r\n        if self.row_start_untouched and ch == \"#\":\r\n            self.state = _State.IN_COMMENT\r\n            sc.advance()\r\n            return\r\n        if self.row_start_untouched and _is_newline_start(ch):\r\n            # Blank/whitespace-only physical line: discard, no row emitted.\r\n            sc.advance_newline()\r\n            return\r\n        self.row_start_untouched = False\r\n        if ch == '\"':\r\n            self.quote_start_line, self.quote_start_col = sc.line, sc.col\r\n            self.field_chars = []\r\n            self.state = _State.IN_QUOTED\r\n            sc.advance()\r\n            return\r\n        if ch == \",\":\r\n            self._commit_field(\"\")\r\n            sc.advance()\r\n            return\r\n        if _is_newline_start(ch):\r\n            self._commit_field(\"\")\r\n            self._commit_row()\r\n            sc.advance_newline()\r\n            self.row_start_untouched = True\r\n            return\r\n        # First real character of an unquoted field.\r\n        self.field_chars = [ch]\r\n        self.state = _State.IN_UNQUOTED\r\n        sc.advance()\r\n\r\n    def _step_in_unquoted(self, ch: str) -\u003e None:\r\n        \"\"\"Accumulating an unquoted field; a quote here is malformed.\"\"\"\r\n        sc = self.sc\r\n        if ch == \",\":\r\n            self._commit_field(\"\".join(self.field_chars).rstrip(\" \\t\"))\r\n            self.field_chars = []\r\n            self.state = _State.FIELD_START\r\n            sc.advance()\r\n            return\r\n        if _is_newline_start(ch):\r\n            self._commit_field(\"\".join(self.field_chars).rstrip(\" \\t\"))\r\n            self.field_chars = []\r\n            self._commit_row()\r\n            sc.advance_newline()\r\n            self.state = _State.FIELD_START\r\n            self.row_start_untouched = True\r\n            return\r\n        if ch == '\"':\r\n            raise self._error(\"Unexpected quote character inside an unquoted field\")\r\n        self.field_chars.append(ch)\r\n        sc.advance()\r\n\r\n    def _step_in_quoted(self, ch: str) -\u003e None:\r\n        \"\"\"Inside a quoted field: verbatim content, newlines normalized.\"\"\"\r\n        sc = self.sc\r\n        if ch == '\"':\r\n            self.state = _State.QUOTE_PENDING\r\n            sc.advance()\r\n            return\r\n        if _is_newline_start(ch):\r\n            sc.advance_newline()\r\n            self.field_chars.append(\"\\n\")\r\n            return\r\n        self.field_chars.append(ch)\r\n        sc.advance()\r\n\r\n    def _step_quote_pending(self, ch: str) -\u003e None:\r\n        \"\"\"Just saw a quote inside a quoted field: escape or close?\"\"\"\r\n        if ch == '\"':\r\n            # Doubled quote: escaped literal quote, field stays open.\r\n            self.field_chars.append('\"')\r\n            self.state = _State.IN_QUOTED\r\n            self.sc.advance()\r\n            return\r\n        # Field is closed; re-process this same character in AFTER_QUOTE\r\n        # without consuming it (no cursor movement here).\r\n        self.state = _State.AFTER_QUOTE\r\n\r\n    def _step_after_quote(self, ch: str) -\u003e None:\r\n        \"\"\"After a quoted field's closing quote: only padding, then terminator.\"\"\"\r\n        sc = self.sc\r\n        if ch in _WS:\r\n            sc.advance()\r\n            return\r\n        if ch == \",\":\r\n            self._commit_field(\"\".join(self.field_chars))\r\n            self.field_chars = []\r\n            self.state = _State.FIELD_START\r\n            sc.advance()\r\n            return\r\n        if _is_newline_start(ch):\r\n            self._commit_field(\"\".join(self.field_chars))\r\n            self.field_chars = []\r\n            self._commit_row()\r\n            sc.advance_newline()\r\n            self.state = _State.FIELD_START\r\n            self.row_start_untouched = True\r\n            return\r\n        raise self._error(\r\n            f\"Unexpected character {ch!r} after closing quote; expected a comma or a newline\"\r\n        )\r\n\r\n    def _step_in_comment(self, ch: str) -\u003e None:\r\n        \"\"\"Discarding the remainder of a comment line.\"\"\"\r\n        sc = self.sc\r\n        if _is_newline_start(ch):\r\n            sc.advance_newline()\r\n            self.state = _State.FIELD_START\r\n            self.row_start_untouched = True\r\n            return\r\n        sc.advance()\r\n\r\n    _HANDLERS = {\r\n        _State.FIELD_START: _step_field_start,\r\n        _State.IN_UNQUOTED: _step_in_unquoted,\r\n        _State.IN_QUOTED: _step_in_quoted,\r\n        _State.QUOTE_PENDING: _step_quote_pending,\r\n        _State.AFTER_QUOTE: _step_after_quote,\r\n        _State.IN_COMMENT: _step_in_comment,\r\n    }\r\n\r\n    def run(self) -\u003e list[list[str]]:\r\n        sc = self.sc\r\n        while not sc.at_eof():\r\n            ch = sc.peek()\r\n            if ch == _BOM:\r\n                raise self._error(\"Byte-order mark is only permitted at the start of input\")\r\n            self._HANDLERS[self.state](self, ch)\r\n        self._finalize()\r\n        return self.rows\r\n\r\n    def _finalize(self) -\u003e None:\r\n        \"\"\"Handle input that ends without a trailing newline.\"\"\"\r\n        if self.state == _State.FIELD_START:\r\n            if not (self.row_start_untouched and not self.row):\r\n                self._commit_field(\"\")\r\n                self._commit_row()\r\n        elif self.state == _State.IN_UNQUOTED:\r\n            self._commit_field(\"\".join(self.field_chars).rstrip(\" \\t\"))\r\n            self._commit_row()\r\n        elif self.state in (_State.AFTER_QUOTE, _State.QUOTE_PENDING):\r\n            self._commit_field(\"\".join(self.field_chars))\r\n            self._commit_row()\r\n        elif self.state == _State.IN_QUOTED:\r\n            raise ParseError(\r\n                \"Unterminated quoted field (opening quote never closed)\",\r\n                self.quote_start_line,\r\n                self.quote_start_col,\r\n                self.row_number,\r\n                self.field_number,\r\n            )\r\n        # IN_COMMENT at EOF: nothing to commit, comment simply ends.\r\n\r\n\r\ndef parse(text: str) -\u003e list[list[str]]:\r\n    \"\"\"Parse ``text`` (already-decoded str) into a list of rows of fields.\r\n\r\n    See module docstring for the dialect rules enforced.\r\n    \"\"\"\r\n    return _Machine(text).run()\r\n"},"role":"champion-output","safe_href":"track-state-machine/final/parser.py","sha256":"04774123096c1d39dd5c7a951c3a583acb2d359f3ba0df75eab3e50a66d60130"},{"diagnostics":[],"id":"track-state-machine-loop-02-judge","kind":"judge-note","label":"Loop 02 provisional judge","path":"track-state-machine/loop-02/judge.md","presentation":{"caption":"Provisional assessment of the zero-regression Scanner/per-state-handler refactor.","featured":false,"mode":"markdown","primary":false},"preview":{"kind":"text","language":"md","value":"# Judge: track-state-machine loop 02\r\n\r\n## What changed\r\n- Refactored the loop-01 parser: extracted a `_Scanner` class that is the\r\n  sole owner of `pos`/`line`/`col` (via `advance()`/`advance_newline()`),\r\n  and split the monolithic `parse()` dispatch into a `_Machine` class with\r\n  one dedicated handler method per `_State` (`_step_field_start`,\r\n  `_step_in_unquoted`, `_step_in_quoted`, `_step_quote_pending`,\r\n  `_step_after_quote`, `_step_in_comment`), wired through a small\r\n  state-to-handler dict in `run()`.\r\n- Enriched `ParseError` to also carry/report `row_number` and\r\n  `field_number` alongside the existing 1-based `line`/`col`.\r\n- Verified byte-for-byte behavioral equivalence with loop-01: copied\r\n  loop-01's original, unmodified `test_parser.py` into a throwaway\r\n  directory alongside loop-02's `parser.py` and re-ran it -- all 30 pass\r\n  (see command transcript folded into this loop's evidence below; the\r\n  scratch directory was deleted immediately after, nothing left in the\r\n  track beyond the artifacts required).\r\n- Expanded `test_parser.py` from 30 to 53 tests: kept all 30 loop-01 cases\r\n  verbatim and added 23 new ones (12 promoted from loop-01's ad-hoc\r\n  adversarial probes, 11 newly written), focused on error-location\r\n  precision and dialect edge cases per the track prompt's explicit ask to\r\n  \"expand adversarial malformed cases and error location checks.\"\r\n\r\n## Evidence inspected\r\n- `python test_parser.py` in `loop-02/` -\u003e 53/53 passed (`test-result.txt`\r\n  has the full transcript and counts).\r\n- Regression check: loop-01's original `test_parser.py` run unmodified\r\n  against loop-02's `parser.py` -\u003e 30/30 passed, confirming the refactor\r\n  changed no observable behavior (message text grew but still contains the\r\n  same \"line N\"/\"column N\" substrings the loop-01 assertions check for).\r\n- Manually re-derived the multi-line error-position math for\r\n  `test_multiline_quoted_field_error_position_tracks_embedded_newlines`\r\n  (two embedded newlines inside a quoted field, error on the third\r\n  physical line) and confirmed the test's expected line=3, col=7 by\r\n  counting characters by hand before writing the assertion.\r\n\r\n## Scores\r\n- correctness: 5 — all 53 objective tests pass, including all three\r\n  blocking core samples; no observable-behavior change from the\r\n  already-correct loop-01.\r\n- robustness: 5 — every adversarial case identified in loop-01 (probed\r\n  ad-hoc there) is now a committed regression test and passes, plus new\r\n  ones (still-open field via doubled-quote-then-comma inside quotes,\r\n  comment-only file, all-blank-and-comment file, BOM in three distinct\r\n  contexts). No known dialect edge case from the prompt is left uncovered.\r\n- error_clarity: 5 — messages now include row/field context in addition\r\n  to line/column, and this is asserted by two new tests; still purely\r\n  text/no external i18n dependency.\r\n- maintainability: 4 — the core weakness from loop-01 (duplicated\r\n  position-advance logic, one giant function) is fixed: `_Scanner` is the\r\n  single place position math happens, and each state is a short,\r\n  independently readable method with its own docstring/invariant. Not a 5\r\n  because the six handler methods still share mutable instance state\r\n  (`self.field_chars`, `self.row`) rather than being pure functions, which\r\n  is a reasonable simplicity/purity trade-off for a single-pass scanner\r\n  but keeps a small amount of implicit coupling.\r\n- constraint_adherence: 5 — still no `csv`/`pandas`/third-party import\r\n  (checked both by a dedicated test and by direct inspection), and the\r\n  architecture is, if anything, a clearer expression of the required\r\n  named-state character state machine than loop-01's version.\r\n\r\n## Judge mode\r\n- single (self-assessment only; provisional per the track's rules --\r\n  objective tests dominate and an independent judge decides later).\r\n\r\n## What improved\r\n- Maintainability: 2 -\u003e 4 (monolithic function replaced with\r\n  Scanner + per-state handlers).\r\n- error_clarity: 4 -\u003e 5 (row/field context added to every ParseError).\r\n- robustness: 4 -\u003e 5 (12 ad-hoc probes promoted to committed tests, plus\r\n  11 new ones; nothing left as \"informally verified only\").\r\n- Test count: 30 -\u003e 53, with zero regressions against the original suite.\r\n\r\n## What failed / regressed\r\n- Nothing regressed. No test that passed in loop-01 fails against loop-02.\r\n- maintainability did not reach 5: the handler methods still mutate shared\r\n  instance state rather than being fully isolated pure functions; a future\r\n  loop could consider an immutable-state/functional-core style if that\r\n  criterion needs to be pushed further, but that would add real complexity\r\n  for a single-pass parser and was judged not worth it here.\r\n\r\n## Next hypothesis\r\n- This Track has run its planned two Loops. If a further loop were run, the\r\n  next hypothesis would be: extracting each `_step_*` handler as a\r\n  standalone, testable pure function of `(machine_state, ch) -\u003e\r\n  (new_state, actions)` (rather than a bound method mutating `self`) could\r\n  push maintainability to 5, at the cost of a small amount of extra\r\n  ceremony; this should only be pursued if an independent judge or the\r\n  synthesis Track flags maintainability as the deciding factor against\r\n  the competing line-oriented/regex Track.\r\n"},"role":"assessment","safe_href":"track-state-machine/loop-02/judge.md","sha256":"5865af6e54a2221b7fb2c63ac062fcbe32acb8d4d19751e2ba338d3dcdd824ad"},{"diagnostics":[],"id":"track-state-machine-loop-02-prompt-history","kind":"prompt-history","label":"Loop 02 prompt history","path":"track-state-machine/loop-02/prompt-history.md","presentation":{"caption":"Complete measured-weakness prompt and feedback chain.","featured":false,"mode":"markdown","primary":false},"preview":{"kind":"text","language":"md","value":"# Prompt history: track-state-machine / loop-02\r\n\r\n## Track prompt (as issued to this Track)\r\nHand-roll a robust Python parser for a messy vendor CSV dialect without\r\nimporting the standard-library csv module. Public API should expose\r\nParseError and parse(text: str) -\u003e list[list[str]]. Requirements: UTF-8 BOM\r\naccepted only at start; comment lines whose first non-whitespace character\r\nis # are ignored when not inside a quoted field; blank/whitespace-only\r\nphysical lines ignored when not inside quoted field; quoted commas; embedded\r\nCRLF/LF newlines normalized to \\n within quoted fields; doubled quotes decode\r\nto one quote; ragged rows preserved; unquoted fields trim surrounding\r\nspaces/tabs; quoted fields preserve interior whitespace while allowing\r\nspaces/tabs around the quoted token; any malformed input raises actionable\r\nParseError containing 1-based line and column. Reject quote in an unquoted\r\nfield, non-whitespace after a closing quote before comma/newline,\r\nunterminated quote, and BOM away from offset zero. Do not import csv,\r\npandas, or third-party parser libraries.\r\n\r\nArchitecture constraint: implement an explicit whole-input character state\r\nmachine with named states/invariants and precise source positions. Keep it\r\nsimple and testable.\r\n\r\nThis is Loop 2 of 2 for this Track: improve loop-01 based on its actual\r\nfailures/weaknesses; expand adversarial malformed cases and error location\r\nchecks.\r\n\r\n## Input feedback\r\nloop-01's parser.py and test_parser.py (30 tests, all passing) plus 15\r\nad-hoc adversarial probes run against it directly (documented in\r\nloop-01/test-result.txt). No functional defects were found by those\r\nprobes; the only real weakness surfaced was architectural.\r\n\r\n## Judge feedback\r\nFrom loop-01/judge.md: correctness 5/5, robustness 4/5, error_clarity 4/5,\r\nmaintainability 2/5, constraint_adherence 5/5. Explicit next hypothesis:\r\n\"Refactor parse() into a small _Scanner class that owns pos/line/col and\r\nexposes advance()/advance_newline()/peek() helpers, and split the state\r\ndispatch into one method per _State ... Simultaneously expand\r\ntest_parser.py with the 15 adversarial probes above (promoted from ad-hoc\r\nscripts to committed, repeatable tests) plus a few new ones ... to raise\r\nrobustness and error_clarity confidence with real regression coverage.\"\r\n\r\n## Next prompt (would be handed to a hypothetical loop-03)\r\nThis Track's plan called for exactly two Loops, so there is no loop-03.\r\nIf the independent judge (gpt-5.6-terra, per the parent experiment prompt)\r\nor the synthesis Track flags maintainability as still needing work, the\r\nnext hypothesis to try would be reshaping each `_step_*` handler into a\r\nstandalone pure function of (state, char, cursor) -\u003e (new_state, actions)\r\nrather than a method that mutates `self`, to remove the last bit of\r\nimplicit shared-state coupling noted in loop-02/judge.md. Otherwise,\r\nloop-02 is the Track's final candidate for synthesis.\r\n"},"role":"provenance","safe_href":"track-state-machine/loop-02/prompt-history.md","sha256":"cb91860665eeb3fd98c8ae9248f6ebe6781af0a2340bc29557d27baf003a86af"}],"changed_files":["track-state-machine/loop-02/parser.py","track-state-machine/loop-02/test_parser.py","track-state-machine/loop-02/test-result.txt","track-state-machine/loop-02/judge.md","track-state-machine/loop-02/metadata.json","track-state-machine/loop-02/prompt-history.md","track-state-machine/final/parser.py","track-state-machine/final/test_parser.py","track-state-machine/final/README.md","track-state-machine/final/demo_fixtures.py","track-state-machine/final/fixtures/sample.csv","track-state-machine/final/fixtures/malformed_unterminated_quote.csv","track-state-machine/final/fixtures/malformed_quote_in_unquoted.csv"],"commands":{"build":"No build step; pure-Python module, no compilation required.","judge":"Self-assessment against the 5-criterion scorecard, recorded in judge.md, plus an explicit regression re-run of loop-01's original test file against loop-02's parser.py.","run":"python test_parser.py"},"decision":"new_best","hypothesis":"Extracting a _Scanner class (sole owner of pos/line/col) and replacing the monolithic dispatch with one handler method per _State will fix loop-01's maintainability weakness with zero behavioral regression, and promoting/expanding adversarial and error-location tests will raise robustness and error_clarity confidence from 'probed informally' to 'proven by committed regression tests'.","id":"track-state-machine-loop-02","index":3,"is_champion":false,"label":"track-state-machine-loop-02","lesson":{"action":"Refactor into a Scanner class + per-state handler methods without touching the proven state/transition design, then close the 'informally probed' gap by committing the ad-hoc adversarial cases as real tests and adding more error-location checks.","confidence":"high","evidence":"Re-running loop-01's original, byte-for-byte unmodified test_parser.py against loop-02's parser.py passed 30/30, proving the refactor was behavior-preserving; the new committed suite grew to 53/53 passing with richer error messages (row/field context).","trigger":"loop-01's self-judge identified duplicated position-advance logic and a monolithic dispatch function as the primary remaining weakness, with correctness/robustness already strong."},"model_id":"claude-sonnet-5","outcome":"Refactor completed: _Scanner (advance/advance_newline) + _Machine with 6 per-state handler methods (_step_field_start, _step_in_unquoted, _step_in_quoted, _step_quote_pending, _step_after_quote, _step_in_comment) dispatched via a dict. ParseError now also reports row_number/field_number. test_parser.py grew from 30 to 53 tests (all 30 loop-01 cases kept verbatim + 23 new, 12 promoted from loop-01's ad-hoc probes and 11 newly written), all 53 passing, all 3 blocking core samples passing. Regression check: loop-01's original, unmodified test_parser.py was run against loop-02's parser.py in a throwaway directory and passed 30/30, confirming zero behavioral regression.","parent_ids":["track-state-machine-loop-01"],"primary_artifact":{"diagnostics":[],"id":"track-state-machine-loop-02-parser","kind":"code","label":"loop-02 parser.py (Track champion)","path":"track-state-machine/loop-02/parser.py","presentation":{"alt_text":"Python source implementing a character-state-machine CSV parser with a Scanner class and per-state handler methods.","caption":"Refactored character-state-machine CSV parser: _Scanner + per-state _Machine handlers, row/field-aware ParseError.","comparison_key":"parser-snapshot","featured":true,"mode":"code","primary":true},"preview":{"kind":"text","language":"py","value":"\"\"\"Hand-rolled parser for a messy vendor CSV dialect.\r\n\r\nArchitecture\r\n------------\r\nThis module implements a single-pass, whole-input **character state\r\nmachine**. The entire input string is scanned once (with multi-character\r\nnewline sequences such as ``\\\\r\\\\n`` collapsed into a single logical\r\ntransition). A small ``_State`` enum names every state the machine can be\r\nin; a dedicated handler method exists per state, and each handler's\r\ndocstring records its invariants and the transitions it may take. A\r\n``_Scanner`` helper owns the raw cursor (character offset, 1-based line,\r\n1-based column) and centralizes the two primitive moves every state needs\r\n(``advance`` over an ordinary character, ``advance_newline`` over a\r\nlogical newline), so precise source positions are computed in exactly one\r\nplace instead of being duplicated across every branch.\r\n\r\nThis is loop-02 of the ``track-state-machine`` Track. It keeps loop-01's\r\nproven state/transition design (all 30 loop-01 tests still pass unchanged)\r\nbut refactors the single ~250-line procedural function into:\r\n\r\n  * ``_Scanner``       -- owns pos/line/col, the only place that advances them.\r\n  * ``_Machine``        -- owns the field/row buffers and one small handler\r\n                           method per ``_State`` member.\r\n  * ``ParseError``      -- now also reports which row/field was being\r\n                           parsed when the problem was found, in addition\r\n                           to the 1-based line/column.\r\n\r\nNo use of the standard-library ``csv`` module, ``pandas``, or any\r\nthird-party parsing library.\r\n\r\nPublic API\r\n----------\r\n``ParseError`` -- raised for any malformed input; message includes a\r\n1-based line and column plus the row/field index being parsed.\r\n\r\n``parse(text: str) -\u003e list[list[str]]`` -- parse the given text into rows\r\nof string fields.\r\n\"\"\"\r\n\r\nfrom __future__ import annotations\r\n\r\nfrom enum import Enum, auto\r\n\r\n\r\nclass ParseError(Exception):\r\n    \"\"\"Raised when the input cannot be parsed as valid vendor CSV.\r\n\r\n    Attributes:\r\n        line: 1-based line number where the problem was detected.\r\n        col: 1-based column number where the problem was detected.\r\n        row_number: 1-based index of the logical row being parsed.\r\n        field_number: 1-based index of the field within that row.\r\n    \"\"\"\r\n\r\n    def __init__(self, reason: str, line: int, col: int, row_number: int, field_number: int):\r\n        self.line = line\r\n        self.col = col\r\n        self.row_number = row_number\r\n        self.field_number = field_number\r\n        super().__init__(\r\n            f\"{reason} (line {line}, column {col}, row {row_number}, field {field_number})\"\r\n        )\r\n\r\n\r\nclass _State(Enum):\r\n    \"\"\"Named states of the whole-input character state machine.\r\n\r\n    FIELD_START\r\n        Positioned at the start of a field (either the first field of a\r\n        row, right after a row boundary, or any later field right after a\r\n        comma). Leading spaces/tabs are consumed here without being kept.\r\n        When this is the *first* field attempt of a fresh row\r\n        (``row_start_untouched`` is True) a ``#`` means \"comment line\" and\r\n        an immediate newline/EOF means \"blank line\" -- neither produces a\r\n        row.\r\n    IN_UNQUOTED\r\n        Accumulating characters of an unquoted field. Terminates on\r\n        comma, newline, or EOF. A literal quote character here is\r\n        malformed.\r\n    IN_QUOTED\r\n        Accumulating characters of a quoted field verbatim (interior\r\n        whitespace preserved). Newlines are normalized to ``\\\\n``. A quote\r\n        character transitions to QUOTE_PENDING to disambiguate an escaped\r\n        quote from field closure.\r\n    QUOTE_PENDING\r\n        Just saw a ``\"`` while inside a quoted field. If the next\r\n        character is also ``\"`` this is a doubled-quote escape and we\r\n        return to IN_QUOTED. Otherwise the field is closed and we move to\r\n        AFTER_QUOTE without consuming the next character.\r\n    AFTER_QUOTE\r\n        The quoted field's closing quote has been seen. Only spaces/tabs\r\n        are permitted until the field/row terminator (comma, newline, or\r\n        EOF); anything else is malformed.\r\n    IN_COMMENT\r\n        Consuming (and discarding) the remainder of a comment line, up to\r\n        but not including its terminating newline.\r\n    \"\"\"\r\n\r\n    FIELD_START = auto()\r\n    IN_UNQUOTED = auto()\r\n    IN_QUOTED = auto()\r\n    QUOTE_PENDING = auto()\r\n    AFTER_QUOTE = auto()\r\n    IN_COMMENT = auto()\r\n\r\n\r\n_BOM = \"\\ufeff\"\r\n_WS = (\" \", \"\\t\")\r\n\r\n\r\ndef _is_newline_start(ch: str) -\u003e bool:\r\n    return ch == \"\\r\" or ch == \"\\n\"\r\n\r\n\r\nclass _Scanner:\r\n    \"\"\"Owns the raw cursor over the input text.\r\n\r\n    Invariant: ``line``/``col`` always describe the position of the\r\n    character at ``text[pos]`` (or, at end of input, the position one past\r\n    the last character). This is the *only* class allowed to mutate\r\n    ``pos``/``line``/``col`` -- every state handler goes through\r\n    ``advance`` or ``advance_newline`` instead of touching them directly.\r\n    \"\"\"\r\n\r\n    __slots__ = (\"text\", \"n\", \"pos\", \"line\", \"col\")\r\n\r\n    def __init__(self, text: str, start_pos: int = 0):\r\n        self.text = text\r\n        self.n = len(text)\r\n        self.pos = start_pos\r\n        self.line = 1\r\n        self.col = 1\r\n\r\n    def at_eof(self) -\u003e bool:\r\n        return self.pos \u003e= self.n\r\n\r\n    def peek(self) -\u003e str:\r\n        \"\"\"Return the character at the cursor. Caller must check at_eof().\"\"\"\r\n        return self.text[self.pos]\r\n\r\n    def advance(self) -\u003e None:\r\n        \"\"\"Move past one ordinary (non-newline) character.\"\"\"\r\n        self.pos += 1\r\n        self.col += 1\r\n\r\n    def advance_newline(self) -\u003e None:\r\n        \"\"\"Move past one logical newline: \\\\r\\\\n, bare \\\\r, or bare \\\\n.\"\"\"\r\n        if self.text[self.pos] == \"\\r\" and self.pos + 1 \u003c self.n and self.text[self.pos + 1] == \"\\n\":\r\n            self.pos += 2\r\n        else:\r\n            self.pos += 1\r\n        self.line += 1\r\n        self.col = 1\r\n\r\n\r\nclass _Machine:\r\n    \"\"\"Drives the state machine over one full input string.\"\"\"\r\n\r\n    def __init__(self, text: str):\r\n        # A UTF-8 BOM is only legal at absolute offset zero. It is\r\n        # consumed silently and does not occupy a column of its own.\r\n        start_pos = 1 if text[:1] == _BOM else 0\r\n        self.sc = _Scanner(text, start_pos)\r\n        self.rows: list[list[str]] = []\r\n        self.row: list[str] = []\r\n        self.field_chars: list[str] = []\r\n        self.state = _State.FIELD_START\r\n        self.row_start_untouched = True\r\n        self.row_number = 1\r\n        self.field_number = 1\r\n        self.quote_start_line = 0\r\n        self.quote_start_col = 0\r\n\r\n    # -- error helper --------------------------------------------------\r\n    def _error(self, reason: str) -\u003e ParseError:\r\n        return ParseError(reason, self.sc.line, self.sc.col, self.row_number, self.field_number)\r\n\r\n    # -- field/row bookkeeping ------------------------------------------\r\n    def _commit_field(self, value: str) -\u003e None:\r\n        self.row.append(value)\r\n        self.field_number += 1\r\n\r\n    def _commit_row(self) -\u003e None:\r\n        self.rows.append(self.row.copy())\r\n        self.row.clear()\r\n        self.row_number += 1\r\n        self.field_number = 1\r\n\r\n    # -- per-state handlers ----------------------------------------------\r\n    def _step_field_start(self, ch: str) -\u003e None:\r\n        \"\"\"At the start of a field: skip padding, classify the row if needed.\"\"\"\r\n        sc = self.sc\r\n        if ch in _WS:\r\n            sc.advance()\r\n            return\r\n        if self.row_start_untouched and ch == \"#\":\r\n            self.state = _State.IN_COMMENT\r\n            sc.advance()\r\n            return\r\n        if self.row_start_untouched and _is_newline_start(ch):\r\n            # Blank/whitespace-only physical line: discard, no row emitted.\r\n            sc.advance_newline()\r\n            return\r\n        self.row_start_untouched = False\r\n        if ch == '\"':\r\n            self.quote_start_line, self.quote_start_col = sc.line, sc.col\r\n            self.field_chars = []\r\n            self.state = _State.IN_QUOTED\r\n            sc.advance()\r\n            return\r\n        if ch == \",\":\r\n            self._commit_field(\"\")\r\n            sc.advance()\r\n            return\r\n        if _is_newline_start(ch):\r\n            self._commit_field(\"\")\r\n            self._commit_row()\r\n            sc.advance_newline()\r\n            self.row_start_untouched = True\r\n            return\r\n        # First real character of an unquoted field.\r\n        self.field_chars = [ch]\r\n        self.state = _State.IN_UNQUOTED\r\n        sc.advance()\r\n\r\n    def _step_in_unquoted(self, ch: str) -\u003e None:\r\n        \"\"\"Accumulating an unquoted field; a quote here is malformed.\"\"\"\r\n        sc = self.sc\r\n        if ch == \",\":\r\n            self._commit_field(\"\".join(self.field_chars).rstrip(\" \\t\"))\r\n            self.field_chars = []\r\n            self.state = _State.FIELD_START\r\n            sc.advance()\r\n            return\r\n        if _is_newline_start(ch):\r\n            self._commit_field(\"\".join(self.field_chars).rstrip(\" \\t\"))\r\n            self.field_chars = []\r\n            self._commit_row()\r\n            sc.advance_newline()\r\n            self.state = _State.FIELD_START\r\n            self.row_start_untouched = True\r\n            return\r\n        if ch == '\"':\r\n            raise self._error(\"Unexpected quote character inside an unquoted field\")\r\n        self.field_chars.append(ch)\r\n        sc.advance()\r\n\r\n    def _step_in_quoted(self, ch: str) -\u003e None:\r\n        \"\"\"Inside a quoted field: verbatim content, newlines normalized.\"\"\"\r\n        sc = self.sc\r\n        if ch == '\"':\r\n            self.state = _State.QUOTE_PENDING\r\n            sc.advance()\r\n            return\r\n        if _is_newline_start(ch):\r\n            sc.advance_newline()\r\n            self.field_chars.append(\"\\n\")\r\n            return\r\n        self.field_chars.append(ch)\r\n        sc.advance()\r\n\r\n    def _step_quote_pending(self, ch: str) -\u003e None:\r\n        \"\"\"Just saw a quote inside a quoted field: escape or close?\"\"\"\r\n        if ch == '\"':\r\n            # Doubled quote: escaped literal quote, field stays open.\r\n            self.field_chars.append('\"')\r\n            self.state = _State.IN_QUOTED\r\n            self.sc.advance()\r\n            return\r\n        # Field is closed; re-process this same character in AFTER_QUOTE\r\n        # without consuming it (no cursor movement here).\r\n        self.state = _State.AFTER_QUOTE\r\n\r\n    def _step_after_quote(self, ch: str) -\u003e None:\r\n        \"\"\"After a quoted field's closing quote: only padding, then terminator.\"\"\"\r\n        sc = self.sc\r\n        if ch in _WS:\r\n            sc.advance()\r\n            return\r\n        if ch == \",\":\r\n            self._commit_field(\"\".join(self.field_chars))\r\n            self.field_chars = []\r\n            self.state = _State.FIELD_START\r\n            sc.advance()\r\n            return\r\n        if _is_newline_start(ch):\r\n            self._commit_field(\"\".join(self.field_chars))\r\n            self.field_chars = []\r\n            self._commit_row()\r\n            sc.advance_newline()\r\n            self.state = _State.FIELD_START\r\n            self.row_start_untouched = True\r\n            return\r\n        raise self._error(\r\n            f\"Unexpected character {ch!r} after closing quote; expected a comma or a newline\"\r\n        )\r\n\r\n    def _step_in_comment(self, ch: str) -\u003e None:\r\n        \"\"\"Discarding the remainder of a comment line.\"\"\"\r\n        sc = self.sc\r\n        if _is_newline_start(ch):\r\n            sc.advance_newline()\r\n            self.state = _State.FIELD_START\r\n            self.row_start_untouched = True\r\n            return\r\n        sc.advance()\r\n\r\n    _HANDLERS = {\r\n        _State.FIELD_START: _step_field_start,\r\n        _State.IN_UNQUOTED: _step_in_unquoted,\r\n        _State.IN_QUOTED: _step_in_quoted,\r\n        _State.QUOTE_PENDING: _step_quote_pending,\r\n        _State.AFTER_QUOTE: _step_after_quote,\r\n        _State.IN_COMMENT: _step_in_comment,\r\n    }\r\n\r\n    def run(self) -\u003e list[list[str]]:\r\n        sc = self.sc\r\n        while not sc.at_eof():\r\n            ch = sc.peek()\r\n            if ch == _BOM:\r\n                raise self._error(\"Byte-order mark is only permitted at the start of input\")\r\n            self._HANDLERS[self.state](self, ch)\r\n        self._finalize()\r\n        return self.rows\r\n\r\n    def _finalize(self) -\u003e None:\r\n        \"\"\"Handle input that ends without a trailing newline.\"\"\"\r\n        if self.state == _State.FIELD_START:\r\n            if not (self.row_start_untouched and not self.row):\r\n                self._commit_field(\"\")\r\n                self._commit_row()\r\n        elif self.state == _State.IN_UNQUOTED:\r\n            self._commit_field(\"\".join(self.field_chars).rstrip(\" \\t\"))\r\n            self._commit_row()\r\n        elif self.state in (_State.AFTER_QUOTE, _State.QUOTE_PENDING):\r\n            self._commit_field(\"\".join(self.field_chars))\r\n            self._commit_row()\r\n        elif self.state == _State.IN_QUOTED:\r\n            raise ParseError(\r\n                \"Unterminated quoted field (opening quote never closed)\",\r\n                self.quote_start_line,\r\n                self.quote_start_col,\r\n                self.row_number,\r\n                self.field_number,\r\n            )\r\n        # IN_COMMENT at EOF: nothing to commit, comment simply ends.\r\n\r\n\r\ndef parse(text: str) -\u003e list[list[str]]:\r\n    \"\"\"Parse ``text`` (already-decoded str) into a list of rows of fields.\r\n\r\n    See module docstring for the dialect rules enforced.\r\n    \"\"\"\r\n    return _Machine(text).run()\r\n"},"role":"primary-output","safe_href":"track-state-machine/loop-02/parser.py","sha256":"04774123096c1d39dd5c7a951c3a583acb2d359f3ba0df75eab3e50a66d60130"},"primary_value":5.0,"prompt":{"input_feedback":"loop-01's parser.py/test_parser.py (30/30 passing) plus 15 ad-hoc adversarial probes, all passing but only informally verified.","judge_feedback":"loop-01/judge.md next hypothesis: extract a Scanner class and per-state handler methods to fix the maintainability weakness (2/5), and promote the ad-hoc probes into committed tests to raise robustness/error_clarity confidence.","next_prompt":"None -- the Track's plan called for exactly two Loops. If the independent judge or the synthesis Track later flags maintainability as still limiting, the next hypothesis would be reshaping each _step_* handler into a standalone pure function of (state, char, cursor) rather than a bound method mutating self.","track_prompt":"Loop 2 of 2: improve loop-01 based on its actual failures/weaknesses; expand adversarial malformed cases and error location checks."},"quality_gates":{"core_samples":"pass","objective_tests":"pass"},"score_values":{"constraint_adherence":5.0,"correctness":5.0,"error_clarity":5.0,"maintainability":4.8,"robustness":4.8},"scores":[{"criterion_id":"correctness","notes":"53/53 objective tests pass, including all 3 blocking core samples; no observable-behavior change from already-correct loop-01.","scorer_id":"self-judge-track-state-machine","value":5},{"criterion_id":"robustness","notes":"All 15 loop-01 ad-hoc probes plus 8 new adversarial cases are now committed regression tests, all passing.","scorer_id":"self-judge-track-state-machine","value":5},{"criterion_id":"error_clarity","notes":"ParseError now reports row_number/field_number in addition to line/column, asserted by dedicated tests.","scorer_id":"self-judge-track-state-machine","value":5},{"criterion_id":"maintainability","notes":"Scanner class + per-state handler methods eliminate the ~15x duplicated advance logic from loop-01; not a 5 because handlers still mutate shared instance state rather than being pure functions.","scorer_id":"self-judge-track-state-machine","value":4},{"criterion_id":"constraint_adherence","notes":"No csv/pandas/third-party import; architecture is an even clearer expression of the required named-state character state machine.","scorer_id":"self-judge-track-state-machine","value":5},{"criterion_id":"correctness","notes":"Shared architecture-neutral bakeoff passed all 64 combined tests; every blocking core sample passed for this finalist.","scorer_id":"objective-shared-bakeoff","value":5.0},{"criterion_id":"correctness","notes":"Blind-first-pass independent qualitative score; objective tests remained authoritative.","scorer_id":"independent-terra-qualitative","value":5.0},{"criterion_id":"robustness","notes":"Blind-first-pass independent qualitative score; objective tests remained authoritative.","scorer_id":"independent-terra-qualitative","value":4.8},{"criterion_id":"error_clarity","notes":"Blind-first-pass independent qualitative score; objective tests remained authoritative.","scorer_id":"independent-terra-qualitative","value":5.0},{"criterion_id":"maintainability","notes":"Blind-first-pass independent qualitative score; objective tests remained authoritative.","scorer_id":"independent-terra-qualitative","value":4.8},{"criterion_id":"constraint_adherence","notes":"Blind-first-pass independent qualitative score; objective tests remained authoritative.","scorer_id":"independent-terra-qualitative","value":5.0}],"stop_reason":"Track plan called for exactly two Loops; loop-02 resolved loop-01's only material weakness (maintainability) with a verified zero-regression refactor, raised robustness/error_clarity by committing all probed adversarial cases as tests, and all gates (core_samples, objective_tests) pass. Promoted to final/ as this Track's candidate for the synthesis Track.","topology_depth":1,"track_id":"track-state-machine","track_index":1,"track_label":"Character-state-machine architecture"},{"artifacts":[{"diagnostics":[],"id":"synthesis-loop-01-parser","kind":"python-source","label":"loop-01 parser.py","path":"synthesis/loop-01/parser.py","presentation":{"caption":"Winning state machine kept verbatim plus the incorporated non-string boundary guard.","comparison_key":"parser-snapshot","featured":false,"mode":"code","primary":true},"preview":{"kind":"text","language":"py","value":"\"\"\"Hand-rolled parser for a messy vendor CSV dialect -- synthesis loop-01.\r\n\r\nSynthesis provenance\r\n--------------------\r\nThis is loop-01 of the ``synthesis`` Track (model ``claude-opus-4.8``). It has\r\na multi-parent lineage: ``line-regex-loop-02`` (rejected architecture) and\r\n``track-state-machine-loop-02`` (winning architecture). Per the independent\r\n``gpt-5.6-terra`` judge (weighted 4.940 vs 4.745), the winning\r\ncharacter-state-machine architecture is kept verbatim: named ``_State``\r\ntransitions, a single ``_Scanner`` owning physical coordinates, and\r\n``ParseError`` carrying 1-based line/column plus row/field context.\r\n\r\nThe judge found **no** rejected-track helper both necessary and\r\narchitecture-compatible: its offset-map/regex pipeline (``_physical_lines``,\r\n``_logical_records``, ``_FIELD``, per-character ``source_offsets``) would\r\nduplicate this scanner/state-transition responsibility and is therefore\r\nexplicitly rejected. The one narrowly-proven, architecture-neutral idea that\r\n*is* incorporated from the rejected Track is its **non-string input guard**:\r\n``parse(None)`` (or any non-``str``) now raises a clear\r\n``TypeError(\"text must be str\")`` at the public boundary instead of an opaque\r\n``TypeError: 'NoneType' object is not subscriptable`` leaking from an internal\r\nstring slice. Evidence: ``track-line-regex/final/parser.py`` lines 161-162 and\r\nits committed test ``test_type_error_for_non_string`` (final test_parser.py\r\nlines 146-148), which passed in that Track. This is a boundary precondition,\r\nnot a parsing mechanism, so it changes nothing about the state machine.\r\n\r\nArchitecture (unchanged from the winning Track)\r\n-----------------------------------------------\r\nA single-pass, whole-input **character state machine**. The entire input\r\nstring is scanned once (with multi-character newline sequences such as\r\n``\\\\r\\\\n`` collapsed into a single logical transition). A small ``_State``\r\nenum names every state the machine can be in; a dedicated handler method\r\nexists per state, and each handler's docstring records its invariants and the\r\ntransitions it may take. A ``_Scanner`` helper owns the raw cursor (character\r\noffset, 1-based line, 1-based column) and centralizes the two primitive moves\r\nevery state needs (``advance`` over an ordinary character, ``advance_newline``\r\nover a logical newline), so precise source positions are computed in exactly\r\none place instead of being duplicated across every branch.\r\n\r\nNo use of the standard-library ``csv`` module, ``pandas``, or any third-party\r\nparsing library.\r\n\r\nPublic API\r\n----------\r\n``ParseError`` -- raised for any malformed input; message includes a 1-based\r\nline and column plus the row/field index being parsed.\r\n\r\n``parse(text: str) -\u003e list[list[str]]`` -- parse the given text into rows of\r\nstring fields. Raises ``TypeError`` if ``text`` is not a ``str``.\r\n\"\"\"\r\n\r\nfrom __future__ import annotations\r\n\r\nfrom enum import Enum, auto\r\n\r\n\r\nclass ParseError(Exception):\r\n    \"\"\"Raised when the input cannot be parsed as valid vendor CSV.\r\n\r\n    Attributes:\r\n        line: 1-based line number where the problem was detected.\r\n        col: 1-based column number where the problem was detected.\r\n        row_number: 1-based index of the logical row being parsed.\r\n        field_number: 1-based index of the field within that row.\r\n    \"\"\"\r\n\r\n    def __init__(self, reason: str, line: int, col: int, row_number: int, field_number: int):\r\n        self.line = line\r\n        self.col = col\r\n        self.row_number = row_number\r\n        self.field_number = field_number\r\n        super().__init__(\r\n            f\"{reason} (line {line}, column {col}, row {row_number}, field {field_number})\"\r\n        )\r\n\r\n\r\nclass _State(Enum):\r\n    \"\"\"Named states of the whole-input character state machine.\r\n\r\n    FIELD_START\r\n        Positioned at the start of a field (either the first field of a\r\n        row, right after a row boundary, or any later field right after a\r\n        comma). Leading spaces/tabs are consumed here without being kept.\r\n        When this is the *first* field attempt of a fresh row\r\n        (``row_start_untouched`` is True) a ``#`` means \"comment line\" and\r\n        an immediate newline/EOF means \"blank line\" -- neither produces a\r\n        row.\r\n    IN_UNQUOTED\r\n        Accumulating characters of an unquoted field. Terminates on\r\n        comma, newline, or EOF. A literal quote character here is\r\n        malformed.\r\n    IN_QUOTED\r\n        Accumulating characters of a quoted field verbatim (interior\r\n        whitespace preserved). Newlines are normalized to ``\\\\n``. A quote\r\n        character transitions to QUOTE_PENDING to disambiguate an escaped\r\n        quote from field closure.\r\n    QUOTE_PENDING\r\n        Just saw a ``\"`` while inside a quoted field. If the next\r\n        character is also ``\"`` this is a doubled-quote escape and we\r\n        return to IN_QUOTED. Otherwise the field is closed and we move to\r\n        AFTER_QUOTE without consuming the next character.\r\n    AFTER_QUOTE\r\n        The quoted field's closing quote has been seen. Only spaces/tabs\r\n        are permitted until the field/row terminator (comma, newline, or\r\n        EOF); anything else is malformed.\r\n    IN_COMMENT\r\n        Consuming (and discarding) the remainder of a comment line, up to\r\n        but not including its terminating newline.\r\n    \"\"\"\r\n\r\n    FIELD_START = auto()\r\n    IN_UNQUOTED = auto()\r\n    IN_QUOTED = auto()\r\n    QUOTE_PENDING = auto()\r\n    AFTER_QUOTE = auto()\r\n    IN_COMMENT = auto()\r\n\r\n\r\n_BOM = \"\\ufeff\"\r\n_WS = (\" \", \"\\t\")\r\n\r\n\r\ndef _is_newline_start(ch: str) -\u003e bool:\r\n    return ch == \"\\r\" or ch == \"\\n\"\r\n\r\n\r\nclass _Scanner:\r\n    \"\"\"Owns the raw cursor over the input text.\r\n\r\n    Invariant: ``line``/``col`` always describe the position of the\r\n    character at ``text[pos]`` (or, at end of input, the position one past\r\n    the last character). This is the *only* class allowed to mutate\r\n    ``pos``/``line``/``col`` -- every state handler goes through\r\n    ``advance`` or ``advance_newline`` instead of touching them directly.\r\n    \"\"\"\r\n\r\n    __slots__ = (\"text\", \"n\", \"pos\", \"line\", \"col\")\r\n\r\n    def __init__(self, text: str, start_pos: int = 0):\r\n        self.text = text\r\n        self.n = len(text)\r\n        self.pos = start_pos\r\n        self.line = 1\r\n        self.col = 1\r\n\r\n    def at_eof(self) -\u003e bool:\r\n        return self.pos \u003e= self.n\r\n\r\n    def peek(self) -\u003e str:\r\n        \"\"\"Return the character at the cursor. Caller must check at_eof().\"\"\"\r\n        return self.text[self.pos]\r\n\r\n    def advance(self) -\u003e None:\r\n        \"\"\"Move past one ordinary (non-newline) character.\"\"\"\r\n        self.pos += 1\r\n        self.col += 1\r\n\r\n    def advance_newline(self) -\u003e None:\r\n        \"\"\"Move past one logical newline: \\\\r\\\\n, bare \\\\r, or bare \\\\n.\"\"\"\r\n        if self.text[self.pos] == \"\\r\" and self.pos + 1 \u003c self.n and self.text[self.pos + 1] == \"\\n\":\r\n            self.pos += 2\r\n        else:\r\n            self.pos += 1\r\n        self.line += 1\r\n        self.col = 1\r\n\r\n\r\nclass _Machine:\r\n    \"\"\"Drives the state machine over one full input string.\"\"\"\r\n\r\n    def __init__(self, text: str):\r\n        # A UTF-8 BOM is only legal at absolute offset zero. It is\r\n        # consumed silently and does not occupy a column of its own.\r\n        start_pos = 1 if text[:1] == _BOM else 0\r\n        self.sc = _Scanner(text, start_pos)\r\n        self.rows: list[list[str]] = []\r\n        self.row: list[str] = []\r\n        self.field_chars: list[str] = []\r\n        self.state = _State.FIELD_START\r\n        self.row_start_untouched = True\r\n        self.row_number = 1\r\n        self.field_number = 1\r\n        self.quote_start_line = 0\r\n        self.quote_start_col = 0\r\n\r\n    # -- error helper --------------------------------------------------\r\n    def _error(self, reason: str) -\u003e ParseError:\r\n        return ParseError(reason, self.sc.line, self.sc.col, self.row_number, self.field_number)\r\n\r\n    # -- field/row bookkeeping ------------------------------------------\r\n    def _commit_field(self, value: str) -\u003e None:\r\n        self.row.append(value)\r\n        self.field_number += 1\r\n\r\n    def _commit_row(self) -\u003e None:\r\n        self.rows.append(self.row.copy())\r\n        self.row.clear()\r\n        self.row_number += 1\r\n        self.field_number = 1\r\n\r\n    # -- per-state handlers ----------------------------------------------\r\n    def _step_field_start(self, ch: str) -\u003e None:\r\n        \"\"\"At the start of a field: skip padding, classify the row if needed.\"\"\"\r\n        sc = self.sc\r\n        if ch in _WS:\r\n            sc.advance()\r\n            return\r\n        if self.row_start_untouched and ch == \"#\":\r\n            self.state = _State.IN_COMMENT\r\n            sc.advance()\r\n            return\r\n        if self.row_start_untouched and _is_newline_start(ch):\r\n            # Blank/whitespace-only physical line: discard, no row emitted.\r\n            sc.advance_newline()\r\n            return\r\n        self.row_start_untouched = False\r\n        if ch == '\"':\r\n            self.quote_start_line, self.quote_start_col = sc.line, sc.col\r\n            self.field_chars = []\r\n            self.state = _State.IN_QUOTED\r\n            sc.advance()\r\n            return\r\n        if ch == \",\":\r\n            self._commit_field(\"\")\r\n            sc.advance()\r\n            return\r\n        if _is_newline_start(ch):\r\n            self._commit_field(\"\")\r\n            self._commit_row()\r\n            sc.advance_newline()\r\n            self.row_start_untouched = True\r\n            return\r\n        # First real character of an unquoted field.\r\n        self.field_chars = [ch]\r\n        self.state = _State.IN_UNQUOTED\r\n        sc.advance()\r\n\r\n    def _step_in_unquoted(self, ch: str) -\u003e None:\r\n        \"\"\"Accumulating an unquoted field; a quote here is malformed.\"\"\"\r\n        sc = self.sc\r\n        if ch == \",\":\r\n            self._commit_field(\"\".join(self.field_chars).rstrip(\" \\t\"))\r\n            self.field_chars = []\r\n            self.state = _State.FIELD_START\r\n            sc.advance()\r\n            return\r\n        if _is_newline_start(ch):\r\n            self._commit_field(\"\".join(self.field_chars).rstrip(\" \\t\"))\r\n            self.field_chars = []\r\n            self._commit_row()\r\n            sc.advance_newline()\r\n            self.state = _State.FIELD_START\r\n            self.row_start_untouched = True\r\n            return\r\n        if ch == '\"':\r\n            raise self._error(\"Unexpected quote character inside an unquoted field\")\r\n        self.field_chars.append(ch)\r\n        sc.advance()\r\n\r\n    def _step_in_quoted(self, ch: str) -\u003e None:\r\n        \"\"\"Inside a quoted field: verbatim content, newlines normalized.\"\"\"\r\n        sc = self.sc\r\n        if ch == '\"':\r\n            self.state = _State.QUOTE_PENDING\r\n            sc.advance()\r\n            return\r\n        if _is_newline_start(ch):\r\n            sc.advance_newline()\r\n            self.field_chars.append(\"\\n\")\r\n            return\r\n        self.field_chars.append(ch)\r\n        sc.advance()\r\n\r\n    def _step_quote_pending(self, ch: str) -\u003e None:\r\n        \"\"\"Just saw a quote inside a quoted field: escape or close?\"\"\"\r\n        if ch == '\"':\r\n            # Doubled quote: escaped literal quote, field stays open.\r\n            self.field_chars.append('\"')\r\n            self.state = _State.IN_QUOTED\r\n            self.sc.advance()\r\n            return\r\n        # Field is closed; re-process this same character in AFTER_QUOTE\r\n        # without consuming it (no cursor movement here).\r\n        self.state = _State.AFTER_QUOTE\r\n\r\n    def _step_after_quote(self, ch: str) -\u003e None:\r\n        \"\"\"After a quoted field's closing quote: only padding, then terminator.\"\"\"\r\n        sc = self.sc\r\n        if ch in _WS:\r\n            sc.advance()\r\n            return\r\n        if ch == \",\":\r\n            self._commit_field(\"\".join(self.field_chars))\r\n            self.field_chars = []\r\n            self.state = _State.FIELD_START\r\n            sc.advance()\r\n            return\r\n        if _is_newline_start(ch):\r\n            self._commit_field(\"\".join(self.field_chars))\r\n            self.field_chars = []\r\n            self._commit_row()\r\n            sc.advance_newline()\r\n            self.state = _State.FIELD_START\r\n            self.row_start_untouched = True\r\n            return\r\n        raise self._error(\r\n            f\"Unexpected character {ch!r} after closing quote; expected a comma or a newline\"\r\n        )\r\n\r\n    def _step_in_comment(self, ch: str) -\u003e None:\r\n        \"\"\"Discarding the remainder of a comment line.\"\"\"\r\n        sc = self.sc\r\n        if _is_newline_start(ch):\r\n            sc.advance_newline()\r\n            self.state = _State.FIELD_START\r\n            self.row_start_untouched = True\r\n            return\r\n        sc.advance()\r\n\r\n    _HANDLERS = {\r\n        _State.FIELD_START: _step_field_start,\r\n        _State.IN_UNQUOTED: _step_in_unquoted,\r\n        _State.IN_QUOTED: _step_in_quoted,\r\n        _State.QUOTE_PENDING: _step_quote_pending,\r\n        _State.AFTER_QUOTE: _step_after_quote,\r\n        _State.IN_COMMENT: _step_in_comment,\r\n    }\r\n\r\n    def run(self) -\u003e list[list[str]]:\r\n        sc = self.sc\r\n        while not sc.at_eof():\r\n            ch = sc.peek()\r\n            if ch == _BOM:\r\n                raise self._error(\"Byte-order mark is only permitted at the start of input\")\r\n            self._HANDLERS[self.state](self, ch)\r\n        self._finalize()\r\n        return self.rows\r\n\r\n    def _finalize(self) -\u003e None:\r\n        \"\"\"Handle input that ends without a trailing newline.\"\"\"\r\n        if self.state == _State.FIELD_START:\r\n            if not (self.row_start_untouched and not self.row):\r\n                self._commit_field(\"\")\r\n                self._commit_row()\r\n        elif self.state == _State.IN_UNQUOTED:\r\n            self._commit_field(\"\".join(self.field_chars).rstrip(\" \\t\"))\r\n            self._commit_row()\r\n        elif self.state in (_State.AFTER_QUOTE, _State.QUOTE_PENDING):\r\n            self._commit_field(\"\".join(self.field_chars))\r\n            self._commit_row()\r\n        elif self.state == _State.IN_QUOTED:\r\n            raise ParseError(\r\n                \"Unterminated quoted field (opening quote never closed)\",\r\n                self.quote_start_line,\r\n                self.quote_start_col,\r\n                self.row_number,\r\n                self.field_number,\r\n            )\r\n        # IN_COMMENT at EOF: nothing to commit, comment simply ends.\r\n\r\n\r\ndef parse(text: str) -\u003e list[list[str]]:\r\n    \"\"\"Parse ``text`` (already-decoded str) into a list of rows of fields.\r\n\r\n    See module docstring for the dialect rules enforced. Raises ``TypeError``\r\n    if ``text`` is not a ``str`` (a boundary precondition incorporated from the\r\n    rejected line-regex Track; see module docstring for evidence).\r\n    \"\"\"\r\n    if not isinstance(text, str):\r\n        raise TypeError(\"text must be str\")\r\n    return _Machine(text).run()\r\n"},"role":"primary-output","safe_href":"synthesis/loop-01/parser.py","sha256":"1cacafd4954f651c1625bd3432a52004f7f71a76689db86caef0bec75ce27539"},{"diagnostics":[],"id":"synthesis-loop-01-tests","kind":"python-source","label":"loop-01 test_parser.py","path":"synthesis/loop-01/test_parser.py","presentation":{"caption":"87 tests: winning suite verbatim + local shared bakeoff (24 valid + 7 error) + non-string guard.","featured":false,"mode":"code","primary":false},"preview":{"kind":"text","language":"py","value":"\"\"\"Objective tests for the synthesis loop-01 parser.\r\n\r\nComposition (union of the strongest compatible evidence from both Tracks):\r\n\r\n  * The complete winning ``track-state-machine`` loop-02 suite is reproduced\r\n    verbatim (53 cases): basic shape/API, BOM/comments/blanks, quoting,\r\n    ragged rows, trimming, CR-only lines, unicode, the three blocking core\r\n    samples, and malformed-input/error-location cases.\r\n  * ``TestSharedBakeoffSuite`` inlines the architecture-neutral shared bakeoff\r\n    cases (copied from ``generated/cross-evaluation/test_bakeoff.py``: 24 valid\r\n    + 7 error) and runs them against THIS local parser, so shared-suite\r\n    compatibility is proven without importing anything outside this directory.\r\n  * ``TestNonStringInput`` is the regression test for the one helper\r\n    incorporated from the rejected line-regex Track: a non-``str`` argument\r\n    raises a clear ``TypeError`` at the public boundary.\r\n\r\nRun with: python test_parser.py\r\n\"\"\"\r\n\r\nimport re\r\nimport unittest\r\nfrom pathlib import Path\r\n\r\nfrom parser import ParseError, parse\r\n\r\n\r\n# ---------------------------------------------------------------------------\r\n# Winning track-state-machine loop-02 suite (reproduced verbatim)\r\n# ---------------------------------------------------------------------------\r\nclass TestBasicShapeAndAPI(unittest.TestCase):\r\n    def test_empty_input_returns_no_rows(self):\r\n        self.assertEqual(parse(\"\"), [])\r\n\r\n    def test_simple_two_row(self):\r\n        self.assertEqual(parse(\"a,b,c\\n1,2,3\\n\"), [[\"a\", \"b\", \"c\"], [\"1\", \"2\", \"3\"]])\r\n\r\n    def test_no_trailing_newline(self):\r\n        self.assertEqual(parse(\"a,b,c\"), [[\"a\", \"b\", \"c\"]])\r\n\r\n\r\nclass TestBomCommentsBlanks(unittest.TestCase):\r\n    def test_bom_at_start_is_stripped(self):\r\n        text = \"\\ufeffa,b\\n1,2\\n\"\r\n        self.assertEqual(parse(text), [[\"a\", \"b\"], [\"1\", \"2\"]])\r\n\r\n    def test_comment_lines_ignored(self):\r\n        text = \"# a comment\\na,b\\n   # indented comment\\n1,2\\n\"\r\n        self.assertEqual(parse(text), [[\"a\", \"b\"], [\"1\", \"2\"]])\r\n\r\n    def test_blank_lines_ignored(self):\r\n        text = \"a,b\\n\\n   \\n\\t\\n1,2\\n\"\r\n        self.assertEqual(parse(text), [[\"a\", \"b\"], [\"1\", \"2\"]])\r\n\r\n    def test_bom_comments_and_blanks_combined(self):\r\n        text = \"\\ufeff# header comment\\n\\na,b,c\\n\\n# mid comment\\n1,2,3\\n\"\r\n        self.assertEqual(parse(text), [[\"a\", \"b\", \"c\"], [\"1\", \"2\", \"3\"]])\r\n\r\n    def test_hash_not_at_start_of_line_is_literal(self):\r\n        # '#' only introduces a comment when it is the first non-whitespace\r\n        # character of the physical line -- not mid-field.\r\n        self.assertEqual(parse(\"a#b,c\\n\"), [[\"a#b\", \"c\"]])\r\n\r\n    def test_comment_with_no_trailing_newline_at_eof(self):\r\n        self.assertEqual(parse(\"a,b\\n#trailing comment\"), [[\"a\", \"b\"]])\r\n\r\n    def test_comment_only_file_produces_no_rows(self):\r\n        self.assertEqual(parse(\"# just a comment\\n\"), [])\r\n\r\n    def test_all_blank_and_comment_file_produces_no_rows(self):\r\n        self.assertEqual(parse(\"\\n \\n#c\\n\\t\\n\"), [])\r\n\r\n    def test_comment_immediately_after_bom_no_blank_line(self):\r\n        self.assertEqual(parse(\"\\ufeff#comment\\na,b\\n\"), [[\"a\", \"b\"]])\r\n\r\n\r\nclass TestQuotedFields(unittest.TestCase):\r\n    def test_quoted_comma(self):\r\n        self.assertEqual(parse('a,\"b,c\",d\\n'), [[\"a\", \"b,c\", \"d\"]])\r\n\r\n    def test_embedded_lf(self):\r\n        self.assertEqual(parse('a,\"line1\\nline2\",b\\n'), [[\"a\", \"line1\\nline2\", \"b\"]])\r\n\r\n    def test_embedded_crlf_normalized(self):\r\n        self.assertEqual(\r\n            parse('a,\"line1\\r\\nline2\",b\\n'), [[\"a\", \"line1\\nline2\", \"b\"]]\r\n        )\r\n\r\n    def test_embedded_bare_cr_normalized(self):\r\n        self.assertEqual(\r\n            parse('a,\"line1\\rline2\",b\\n'), [[\"a\", \"line1\\nline2\", \"b\"]]\r\n        )\r\n\r\n    def test_doubled_quote_escape(self):\r\n        self.assertEqual(parse('a,\"He said \"\"hi\"\"\",b\\n'), [[\"a\", 'He said \"hi\"', \"b\"]])\r\n\r\n    def test_comment_and_blank_look_alikes_retained_inside_quotes(self):\r\n        text = 'a,\"# not a comment\\n\\nstill quoted\",b\\n'\r\n        self.assertEqual(\r\n            parse(text), [[\"a\", \"# not a comment\\n\\nstill quoted\", \"b\"]]\r\n        )\r\n\r\n    def test_quoted_field_padding_spaces_trimmed_outside_quotes(self):\r\n        text = 'a,  \"value\"  ,b\\n'\r\n        self.assertEqual(parse(text), [[\"a\", \"value\", \"b\"]])\r\n\r\n    def test_quoted_field_preserves_interior_whitespace(self):\r\n        text = 'a,\"  spaced out  \",b\\n'\r\n        self.assertEqual(parse(text), [[\"a\", \"  spaced out  \", \"b\"]])\r\n\r\n    def test_empty_quoted_pair(self):\r\n        self.assertEqual(parse('\"\",\"\"\\n'), [[\"\", \"\"]])\r\n\r\n    def test_quoted_field_flush_at_eof_without_trailing_delimiter(self):\r\n        self.assertEqual(parse('a,\"b\"'), [[\"a\", \"b\"]])\r\n\r\n    def test_quote_immediately_reopened_yields_literal_quote_field(self):\r\n        # '\"\"\"\"' == open, doubled-quote (one literal '\"'), close.\r\n        self.assertEqual(parse('a,\"\"\"\",b\\n'), [[\"a\", '\"', \"b\"]])\r\n\r\n    def test_quoted_field_then_eof_right_after_comma(self):\r\n        self.assertEqual(parse('a,\"b\",'), [[\"a\", \"b\", \"\"]])\r\n\r\n\r\nclass TestRaggedRowsAndEmptyFields(unittest.TestCase):\r\n    def test_ragged_rows_preserved(self):\r\n        text = \"a,b,c\\n1,2\\nx,y,z,w\\n\"\r\n        self.assertEqual(\r\n            parse(text), [[\"a\", \"b\", \"c\"], [\"1\", \"2\"], [\"x\", \"y\", \"z\", \"w\"]]\r\n        )\r\n\r\n    def test_many_ragged_rows(self):\r\n        text = \"a\\nb,c\\nd,e,f\\ng\\n\"\r\n        self.assertEqual(parse(text), [[\"a\"], [\"b\", \"c\"], [\"d\", \"e\", \"f\"], [\"g\"]])\r\n\r\n    def test_empty_fields_and_trailing_comma(self):\r\n        text = \"a,,b,\\n\"\r\n        self.assertEqual(parse(text), [[\"a\", \"\", \"b\", \"\"]])\r\n\r\n    def test_leading_comma_produces_empty_first_field(self):\r\n        text = \",a\\n\"\r\n        self.assertEqual(parse(text), [[\"\", \"a\"]])\r\n\r\n    def test_lone_comma_row(self):\r\n        text = \",\\n\"\r\n        self.assertEqual(parse(text), [[\"\", \"\"]])\r\n\r\n\r\nclass TestTrimming(unittest.TestCase):\r\n    def test_unquoted_surrounding_whitespace_trimmed(self):\r\n        text = \"  a  ,  b b  ,c\\n\"\r\n        self.assertEqual(parse(text), [[\"a\", \"b b\", \"c\"]])\r\n\r\n    def test_unquoted_all_whitespace_field_becomes_empty(self):\r\n        text = \"a,   ,b\\n\"\r\n        self.assertEqual(parse(text), [[\"a\", \"\", \"b\"]])\r\n\r\n    def test_unquoted_tabs_only_field_becomes_empty(self):\r\n        text = \"a,\\t \\t,b\\n\"\r\n        self.assertEqual(parse(text), [[\"a\", \"\", \"b\"]])\r\n\r\n    def test_non_trim_whitespace_chars_preserved_in_unquoted_field(self):\r\n        # Vertical tab / form feed are not part of the trim set (only\r\n        # space and tab are); they must be preserved as literal content.\r\n        text = \"a,\\x0bx\\x0c,b\\n\"\r\n        self.assertEqual(parse(text), [[\"a\", \"\\x0bx\\x0c\", \"b\"]])\r\n\r\n\r\nclass TestCrOnlyLines(unittest.TestCase):\r\n    def test_cr_only_physical_lines(self):\r\n        text = \"a,b\\r1,2\\r\"\r\n        self.assertEqual(parse(text), [[\"a\", \"b\"], [\"1\", \"2\"]])\r\n\r\n    def test_mixed_crlf_and_lf_row_separators(self):\r\n        text = \"a,b\\r\\nc,d\\n\"\r\n        self.assertEqual(parse(text), [[\"a\", \"b\"], [\"c\", \"d\"]])\r\n\r\n\r\nclass TestUnicode(unittest.TestCase):\r\n    def test_unicode_content_preserved(self):\r\n        self.assertEqual(\r\n            parse(\"a,h\\u00e9llo w\\u00f6rld \\U0001F600,c\\n\"),\r\n            [[\"a\", \"h\\u00e9llo w\\u00f6rld \\U0001F600\", \"c\"]],\r\n        )\r\n\r\n\r\nclass TestCoreBlockingSamples(unittest.TestCase):\r\n    \"\"\"Blocking core samples: a Loop failing any of these must be rejected.\"\"\"\r\n\r\n    def test_core_embedded_comma(self):\r\n        self.assertEqual(parse('name,\"Doe, John\",age\\n'), [[\"name\", \"Doe, John\", \"age\"]])\r\n\r\n    def test_core_embedded_newline(self):\r\n        self.assertEqual(\r\n            parse('a,\"multi\\nline\",c\\n'), [[\"a\", \"multi\\nline\", \"c\"]]\r\n        )\r\n\r\n    def test_core_doubled_quote_escaping(self):\r\n        self.assertEqual(parse('\"a\"\"b\",c\\n'), [['a\"b', \"c\"]])\r\n\r\n\r\nclass TestMalformedInputs(unittest.TestCase):\r\n    def test_quote_in_unquoted_field_raises_with_position(self):\r\n        with self.assertRaises(ParseError) as ctx:\r\n            parse('a,b\"c,d\\n')\r\n        err = ctx.exception\r\n        self.assertEqual(err.line, 1)\r\n        self.assertEqual(err.col, 4)\r\n        self.assertIn(\"line 1\", str(err))\r\n        self.assertIn(\"column 4\", str(err))\r\n\r\n    def test_quote_in_unquoted_field_reports_row_and_field(self):\r\n        with self.assertRaises(ParseError) as ctx:\r\n            parse('x,y\\na,b\"c,d\\n')\r\n        err = ctx.exception\r\n        self.assertEqual(err.line, 2)\r\n        self.assertEqual(err.col, 4)\r\n        self.assertEqual(err.row_number, 2)\r\n        self.assertEqual(err.field_number, 2)\r\n\r\n    def test_non_whitespace_after_closing_quote_raises_with_position(self):\r\n        with self.assertRaises(ParseError) as ctx:\r\n            parse('a,\"b\"c,d\\n')\r\n        err = ctx.exception\r\n        self.assertEqual(err.line, 1)\r\n        self.assertEqual(err.col, 6)\r\n\r\n    def test_unterminated_quote_raises_with_open_position(self):\r\n        with self.assertRaises(ParseError) as ctx:\r\n            parse('a,\"b,c\\n')\r\n        err = ctx.exception\r\n        self.assertEqual(err.line, 1)\r\n        self.assertEqual(err.col, 3)\r\n\r\n    def test_unterminated_quote_after_odd_trailing_quotes(self):\r\n        # 'b\"\"' is 'b' followed by an escaped literal quote: the field is\r\n        # still open and needs one more real closing quote.\r\n        with self.assertRaises(ParseError) as ctx:\r\n            parse('a,\"b\"\"')\r\n        err = ctx.exception\r\n        self.assertEqual(err.line, 1)\r\n        self.assertEqual(err.col, 3)\r\n\r\n    def test_still_open_field_after_quote_then_comma_inside_quotes(self):\r\n        # 'b\"\",c\\n' inside quotes: the pair after b is a doubled quote, so\r\n        # the comma and 'c' are literal content and the field never closes.\r\n        with self.assertRaises(ParseError):\r\n            parse('a,\"b\"\",c\\n')\r\n\r\n    def test_multiline_quoted_field_error_position_tracks_embedded_newlines(self):\r\n        # Two embedded newlines inside the quoted field must advance the\r\n        # line counter correctly before the error is raised on line 3.\r\n        with self.assertRaises(ParseError) as ctx:\r\n            parse('a,\"line1\\nline2\\nline3\"X,d\\n')\r\n        err = ctx.exception\r\n        self.assertEqual(err.line, 3)\r\n        self.assertEqual(err.col, 7)\r\n\r\n    def test_bom_away_from_start_raises_with_position(self):\r\n        with self.assertRaises(ParseError) as ctx:\r\n            parse('a,b\\n\\ufeffc,d\\n')\r\n        err = ctx.exception\r\n        self.assertEqual(err.line, 2)\r\n        self.assertEqual(err.col, 1)\r\n\r\n    def test_bom_as_last_character_of_file_raises(self):\r\n        with self.assertRaises(ParseError) as ctx:\r\n            parse('a,b\\n\\ufeff')\r\n        err = ctx.exception\r\n        self.assertEqual(err.line, 2)\r\n        self.assertEqual(err.col, 1)\r\n\r\n    def test_bom_inside_unquoted_field_raises(self):\r\n        with self.assertRaises(ParseError) as ctx:\r\n            parse('a\\ufeffb,c\\n')\r\n        err = ctx.exception\r\n        self.assertEqual(err.line, 1)\r\n        self.assertEqual(err.col, 2)\r\n\r\n    def test_bom_inside_comment_line_raises(self):\r\n        with self.assertRaises(ParseError):\r\n            parse('a,b\\n#comment \\ufeffwith bom\\n')\r\n\r\n    def test_error_message_mentions_line_and_column_words(self):\r\n        with self.assertRaises(ParseError) as ctx:\r\n            parse('a,\"b,c\\n')\r\n        msg = str(ctx.exception)\r\n        self.assertIn(\"line\", msg)\r\n        self.assertIn(\"column\", msg)\r\n\r\n    def test_error_message_mentions_row_and_field_words(self):\r\n        with self.assertRaises(ParseError) as ctx:\r\n            parse('a,\"b,c\\n')\r\n        msg = str(ctx.exception)\r\n        self.assertIn(\"row\", msg)\r\n        self.assertIn(\"field\", msg)\r\n\r\n\r\nclass TestNoStdlibCsvImport(unittest.TestCase):\r\n    def test_source_does_not_import_csv(self):\r\n        with open(\"parser.py\", \"r\", encoding=\"utf-8\") as f:\r\n            source = f.read()\r\n        self.assertNotIn(\"import csv\", source)\r\n        self.assertNotIn(\"from csv\", source)\r\n\r\n\r\n# ---------------------------------------------------------------------------\r\n# Shared architecture-neutral bakeoff cases, copied from\r\n# generated/cross-evaluation/test_bakeoff.py and run against THIS parser.\r\n# ---------------------------------------------------------------------------\r\n_SHARED_VALID_CASES = [\r\n    (\"blocking_quoted_comma\", 'id,\"Doe, Jane\"\\n', [[\"id\", \"Doe, Jane\"]]),\r\n
