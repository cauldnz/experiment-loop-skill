:"Papa, j'ai faim."},"ja":{"combined":"パパ、お腹すいたよ。 / はじめましてお腹すいた、パパだよ。","portability_notes":"'お腹すいた' (onaka suita, 'my stomach is empty/I'm hungry') is a full clause, not a single name-like word, so treating it as an introduced name in 'はじめまして[phrase]' reads as clunky rather than crisp.","punchline":"はじめましてお腹すいた、パパだよ。","setup":"パパ、お腹すいたよ。"}},"mechanism":"A child states a feeling using an 'I am [state]' construction. The dad deliberately mishears/reinterprets the feeling-word as if it were the child's given name, and responds with the culture's standard first-introduction greeting, introducing himself as 'Dad'. The comic engine is a universal category-confusion (mistaking a description for an identity), not a sound-based pun, so it can be rebuilt natively in each language using that language's own idiomatic self-introduction formula."}},"role":"primary-output","safe_href":"track-claude-sonnet-5/loop-01/candidate.json","sha256":"c82a0ce48e31bfd689d0ec30b816958bf0120abaa0acdc545e7851718dacfe04"},{"diagnostics":[],"id":"track-claude-sonnet-5-loop-01-draft","kind":"draft","label":"track-claude-sonnet-5-loop-01 multilingual draft","path":"track-claude-sonnet-5/loop-01/draft.md","presentation":{"caption":"Native-script English, French, Spanish, and Japanese draft.","featured":false,"mode":"markdown","primary":false},"preview":{"kind":"text","language":"md","value":"# Loop 01 Draft — \"Hi Hungry, I'm Dad\"\r\n\r\n## Mechanism\r\nA child states a feeling using an \"I am [state]\" construction. Dad deliberately\r\nmishears the feeling-word as if it were the child's given name, and responds\r\nwith the standard first-introduction greeting, introducing himself as \"Dad.\"\r\nThe comic engine is category confusion (mistaking a description for an\r\nidentity) — a universal, non-phonetic mechanism that should be rebuildable in\r\nany language using that language's own self-introduction formula.\r\n\r\n## English\r\n\u003e Dad, I'm hungry.\r\n\u003e Hi Hungry, I'm Dad.\r\n\r\n## Français (French)\r\n\u003e Papa, j'ai faim.\r\n\u003e Salut Faim, moi c'est Papa.\r\n\r\n## Español (Spanish)\r\n\u003e Papá, tengo hambre.\r\n\u003e Hola Hambre, soy Papá.\r\n\r\n## 日本語 (Japanese)\r\n\u003e パパ、お腹すいたよ。\r\n\u003e はじめましてお腹すいた、パパだよ。\r\n\r\n## Notes\r\n\"Hungry\" was chosen because it is the most iconic version of this joke format\r\nin English. It has not yet been checked for grammatical fit against French,\r\nSpanish, and Japanese equivalents — see self-critique.md.\r\n"},"role":"multilingual-draft","safe_href":"track-claude-sonnet-5/loop-01/draft.md","sha256":"008ad6369b2d5c38abd42d71ced9a9279783290cbc7ee1a1038bf9021f48d9ec"},{"diagnostics":[],"id":"track-claude-sonnet-5-loop-01-critique","kind":"critique","label":"track-claude-sonnet-5-loop-01 self-critique","path":"track-claude-sonnet-5/loop-01/self-critique.md","presentation":{"caption":"Generator critique used to drive or close the Track.","featured":false,"mode":"markdown","primary":false},"preview":{"kind":"text","language":"md","value":"# Loop 01 Self-Critique — \"Hi Hungry, I'm Dad\"\r\n\r\nProvisional generator self-scores (1-5 each, not an independent panel score):\r\n\r\n- **cross_language_equivalence: 2/5.** The English setup relies on \"I'm\r\n  hungry\" — an adjective-like state paired with the copula \"to be.\" French\r\n  (\"j'ai faim\" = \"I have hunger\") and Spanish (\"tengo hambre\" = \"I have\r\n  hunger\") both use a possession verb (avoir/tener) with a noun, not \"to be\"\r\n  with an adjective. So the underlying grammatical shape that makes the\r\n  mock-introduction land cleanly in English (\"Hi [adjective-turned-name]\") is\r\n  absent in French/Spanish, where we are forced to treat a noun phrase for\r\n  hunger as the \"name,\" which is a noticeably weaker fit. Japanese is worse\r\n  still: \"お腹すいた\" is a full clause (\"stomach became empty\"), not a\r\n  single word, making the fake self-introduction feel grammatically bolted-on\r\n  rather than natural.\r\n- **dad_joke_groan: 4/5.** The mechanism itself (mishearing a feeling as a\r\n  name) is a strong, affectionately corny groan-generator in English and\r\n  still funny-ish in the other languages, just less clean.\r\n- **brevity: 5/5.** Two short lines in every language; nothing wordy.\r\n- **cultural_portability: 5/5.** No locale-specific references, food items,\r\n  idioms, or cultural knowledge required — being hungry is a universal human\r\n  state.\r\n- **translation_naturalness: 2/5.** French and Spanish punchlines (\"Salut\r\n  Faim, moi c'est Papa\" / \"Hola Hambre, soy Papá\") sound like a translation\r\n  of an English joke rather than something a native speaker would naturally\r\n  say, because a noun (\"faim\"/\"hambre\") standing in for a name is a bigger\r\n  grammatical leap than an adjective standing in for a name. The Japanese\r\n  line is also noticeably clunkier (\"はじめましてお腹すいた\") than natural\r\n  Japanese phrasing would be.\r\n\r\n## Completeness gate check\r\n- English present: yes.\r\n- French present, with accents (é in \"Papa\" no diacritic needed, \"Salut\" ok;\r\n  no diacritic errors detected): yes.\r\n- Spanish present, punctuation/accents (\"Papá,\" \"hambre\") correct: yes.\r\n- Japanese present, in native script: yes.\r\n- **Gate result: PASS** (all four languages present in native script; no\r\n  accent/punctuation errors), but the *quality* of equivalence and\r\n  naturalness is weak — this is a scoring problem, not a gate-failure\r\n  problem.\r\n\r\n## One lesson\r\nChoose a feeling-word whose natural, idiomatic translation in French and\r\nSpanish *also* uses a \"to be\" + adjective construction (like \"tired\" via\r\nêtre/estar fatigué/cansado), rather than a word that happens to require\r\navoir/tener in Romance languages — otherwise the core mechanism (treating a\r\npredicate state as a mock name) degrades unevenly across languages, hurting\r\ncross_language_equivalence and translation_naturalness simultaneously.\r\n\r\n## Decision\r\nKeep for s redicate word, so it substitutes naturally for a name the same way the adjectives do in the other three languages. はじめまして is the standard phrase used specifically upon a first self-introduction, so treating '疲れた' as the just-introduced name and replying with はじめまして...だよ reproduces the same mock-introduction beat, not a bolted-on clause as in loop 01.","punchline":"はじめまして疲れた、パパだよ。","setup":"パパ、疲れたよ。"}},"mechanism":"A child states a feeling using an 'I am [state]' construction. The dad deliberately mishears/reinterprets the feeling-word as if it were the child's given name, and responds with the culture's standard first-introduction greeting, introducing himself as 'Dad'. The comic engine is a universal category-confusion (mistaking a description for an identity), not a sound-based pun, so it is rebuilt natively in each language using that language's own idiomatic 'to be [state]' phrasing and its own self-introduction formula, keeping setup/reveal/effect aligned across all four languages.","revision_from":"track-claude-sonnet-5-loop-01-candidate","revision_reason":"Replaced anchor feeling-word 'hungry' (avoir faim / tener hambre, a possession+noun construction in French/Spanish) with 'tired' (être fatigué / estar cansado, a to-be+adjective construction in French/Spanish, matching English 'I'm tired'), so the name-mock-introduction mechanism keeps the same grammatical shape and comic beat across all four languages, and reworked the Japanese line to read as a natural exchange rather than a clunky bolted-on clause."}},"role":"primary-output","safe_href":"track-claude-sonnet-5/loop-02/candidate.json","sha256":"48b27b16a5c272d0fbba2cf42287da2a19101a580c365c3fed05f243d07dde10"},{"diagnostics":[],"id":"track-claude-sonnet-5-loop-02-draft","kind":"draft","label":"track-claude-sonnet-5-loop-02 multilingual draft","path":"track-claude-sonnet-5/loop-02/draft.md","presentation":{"caption":"Native-script English, French, Spanish, and Japanese draft.","featured":false,"mode":"markdown","primary":false},"preview":{"kind":"text","language":"md","value":"# Loop 02 Draft — \"Hi Tired, I'm Dad\" (revised)\r\n\r\n## Mechanism (unchanged from loop 01)\r\nA child states a feeling using an \"I am [state]\" construction. Dad\r\ndeliberately mishears the feeling-word as if it were the child's given name,\r\nand responds with the standard first-introduction greeting, introducing\r\nhimself as \"Dad.\" The comic engine is category confusion (mistaking a\r\ndescription for an identity) — universal and non-phonetic.\r\n\r\n## What changed from loop 01\r\nLoop 01 used \"hungry,\" which is expressed in French/Spanish with\r\navoir/tener + noun (\"j'ai faim\" / \"tengo hambre\") rather than \"to be\" +\r\nadjective, weakening the mock-name substitution and reading as translated\r\nrather than native. Loop 02 switches the anchor to \"tired,\" which uses\r\n\"to be\" + adjective/participle in **all four** languages (English: I'm\r\ntired; French: être fatigué; Spanish: estar cansado; Japanese: 疲れた as a\r\nsingle predicate word), so the same grammatical shape carries the joke in\r\nevery language.\r\n\r\n## English\r\n\u003e Dad, I'm tired.\r\n\u003e Hi Tired, I'm Dad.\r\n\r\n## Français (French)\r\n\u003e Papa, je suis fatigué.\r\n\u003e Salut Fatigué, moi c'est Papa.\r\n\r\n## Español (Spanish)\r\n\u003e Papá, estoy cansado.\r\n\u003e Hola Cansado, soy Papá.\r\n\r\n## 日本語 (Japanese)\r\n\u003e パパ、疲れたよ。\r\n\u003e はじめまして疲れた、パパだよ。\r\n\r\n## Why this now scores better\r\n- **cross_language_equivalence**: all four setups use a \"to be [tired]\"\r\n  predicate, and all four punchlines use the target language's real\r\n  first-introduction formula, so setup → reveal → effect line up 1:1.\r\n- **translation_naturalness**: each line is what a native speaker would\r\n  actually say, not a literal transplant of the English joke.\r\n- **dad_joke_groan / brevity / cultural_portability**: preserved from loop 01\r\n  (two lines, no cultural knowledge required, still affectionately corny).\r\n"},"role":"multilingual-draft","safe_href":"track-claude-sonnet-5/loop-02/draft.md","sha256":"36e896ae6da6bc8cd0038c3a2443ace784a89257de1883dad350bcf8d5381d05"},{"diagnostics":[],"id":"track-claude-sonnet-5-loop-02-critique","kind":"critique","label":"track-claude-sonnet-5-loop-02 self-critique","path":"track-claude-sonnet-5/loop-02/self-critique.md","presentation":{"caption":"Generator critique used to drive or close the Track.","featured":false,"mode":"markdown","primary":false},"preview":{"kind":"text","language":"md","value":"# Loop 02 Self-Critique — \"Hi Tired, I'm Dad\" (revised)\r\n\r\nProvisional generator self-scores (1-5 each, not an independent panel score):\r\n\r\n- **cross_language_equivalence: 5/5.** All four setups now share the exact\r\n  same grammatical shape (\"to be\" + tired-adjective/participle: I'm tired /\r\n  je suis fatigué / estoy cansado / 疲れた), and all four punchlines use each\r\n  language's real self-introduction formula (Hi X, I'm Dad / Salut X, moi\r\n  c'est Papa / Hola X, soy Papá / はじめまして X、パパだよ). Setup, reveal,\r\n  and comedic effect (mishearing a state as a name) line up 1:1 across\r\n  languages — a clear improvement over loop 01's 2/5.\r\n- **dad_joke_groan: 5/5.** Same affectionate, corny, eye-roll-worthy beat as\r\n  loop 01, now landing cleanly (not haltingly) in every language, which\r\n  increases the groan payoff instead of diluting it.\r\n- **brevity: 5/5.** Still exactly two short lines per language; unchanged\r\n  and still maximal.\r\n- **cultural_portability: 5/5.** Being tired is as universal as being\r\n  hungry; no locale-specific knowledge introduced by the change.\r\n- **translation_naturalness: 5/5.** Each line reads as something a native\r\n  speaker would spontaneously say, not a transplanted English joke: \"je\r\n  suis fatigué\" and \"estoy cansado\" are the ordinary, everyday ways to say\r\n  \"I'm tired\" in French/Spanish, and \"はじめまして...だよ\" is the standard\r\n  Japanese first-introduction phrase repurposed naturally. This directly\r\n  resolves the loop-01 weakness (2/5 → 5/5).\r\n\r\n## Completeness gate check\r\n- English present in native script: yes.\r\n- French present, correct accents/punctuation (\"fatigué\" with the acute\r\n  accent; no missing cedillas/accents): yes.\r\n- Spanish present, correct accents/punctuation (\"Papá\" with accent, opening\r\n  inverted marks not required here since these are plain declarative lines\r\n  without exclamation/question, which is itself natural Spanish usage for\r\n  flat statements): yes.\r\n- Japanese present, containing Japanese script (kanji 疲, hiragana, and the\r\n  standard greeting phrase はじめまして): yes.\r\n- **Gate result: PASS**, with the qualitative weaknesses from loop 01 now\r\n  also resolved rather than merely gate-compliant.\r\n\r\n## One lesson\r\nWhen a comic mechanism depends on a specific grammatical pattern (here,\r\n\"to be\" + adjective), audit every target language's *idiomatic* phrasing for\r\nthat exact concept before finalizing the anchor content-word — near-synonyms\r\n(hungry/tired/cold/sleepy) can differ in which verb they pair with\r\n(avoir/tener vs. être/estar) even within the same language family, and that\r\ngrammatical mismatch is often more damaging to cross-language equivalence\r\nthan any single vocabulary choice.\r\n\r\n## Decision\r\nKeep for synthesis: **yes**. This loop-02 candidate is the recommended final\r\njoke for the track: same wholesome, universal, non-phonetic mechanism as\r\nloop 01, but with an anchor word choice that makes the mechanism land\r\nnaturally and equivalently in English, French, Spanish, and Japanese alike.\r\n"},"role":"generator-feedback","safe_href":"track-claude-sonnet-5/loop-02/self-critique.md","sha256":"421accb54bd4697e6707c8260e5bfb70bae7a963849703310cbcd18f39bc6256"},{"diagnostics":[],"id":"track-claude-sonnet-5-loop-02-judge-aggregate","kind":"judge-note","label":"track-claude-sonnet-5-loop-02 blind panel aggregate","path":"t to the other?"},"es":{"combined":"¿Qué le dice una pared a la otra? ¡Nos vemos en el rincón!","portability_notes":"Retains rincón for the inner corner formed by walls while using a concise, idiomatic present-tense joke setup.","punchline":"¡Nos vemos en el rincón!","setup":"¿Qué le dice una pared a la otra?"},"fr":{"combined":"Qu’est-ce qu’un mur dit à l’autre ? On se retrouve au coin !","portability_notes":"Uses a compact native riddle formula and natural rendezvous wording without copying English syntax.","punchline":"On se retrouve au coin !","setup":"Qu’est-ce qu’un mur dit à l’autre ?"},"ja":{"combined":"壁が隣の壁に何て言う？ 角で会おう！","portability_notes":"Uses colloquial present-tense Japanese, no numeric counter, and no unnecessary quotation marks.","punchline":"角で会おう！","setup":"壁が隣の壁に何て言う？"}},"mechanism":"A wall speaks to the neighboring wall as if arranging a rendezvous; “meet at the corner” is simultaneously an ordinary plan and the literal geometry of where the walls join. The comedy is compact visual personification shared across languages.","revision_from":"synthesis-loop-01-candidate","revision_reason":"Consumed Loop 1’s self-critique: removed explanatory adjacency wording from English/French/Spanish, aligned the native riddle setups in a timeless present where natural, and retained the explicit Spanish and Japanese panel repairs."}},"role":"primary-output","safe_href":"synthesis/loop-02/candidate.json","sha256":"2234f3b78b367802f5bf962db71b36f35b8524314c4322939669a27642e2d75f"},{"diagnostics":[],"id":"synthesis-loop-02-draft","kind":"draft","label":"synthesis-loop-02 multilingual draft","path":"synthesis/loop-02/draft.md","presentation":{"caption":"Native-script English, French, Spanish, and Japanese draft.","featured":false,"mode":"markdown","primary":false},"preview":{"kind":"text","language":"md","value":"# Synthesis Loop 02 — Final Candidate\r\n\r\n## English\r\n**Setup:** What does one wall say to the other?  \r\n**Punchline:** Let’s meet at the corner!\r\n\r\n## Français\r\n**Question :** Qu’est-ce qu’un mur dit à l’autre ?  \r\n**Réponse :** On se retrouve au coin !\r\n\r\n## Español\r\n**Pregunta:** ¿Qué le dice una pared a la otra?  \r\n**Remate:** ¡Nos vemos en el rincón!\r\n\r\n## 日本語\r\n**問い:** 壁が隣の壁に何て言う？  \r\n**答え:** 角で会おう！\r\n\r\nEach version uses its own compact native riddle form while preserving the same wall/rendezvous/corner mechanism.\r\n"},"role":"multilingual-draft","safe_href":"synthesis/loop-02/draft.md","sha256":"6e9431f0b116a22a692d29c428735ad33030d6dbc57b7bd4c1901d28c09d908b"},{"diagnostics":[],"id":"synthesis-loop-02-critique","kind":"critique","label":"synthesis-loop-02 self-critique","path":"synthesis/loop-02/self-critique.md","presentation":{"caption":"Generator critique used to drive or close the Track.","featured":false,"mode":"markdown","primary":false},"preview":{"kind":"text","language":"md","value":"# Self-Critique: synthesis loop 02\r\n\r\n## Loop 01 feedback consumed\r\nLoop 01 found that fixing Spanish and Japanese by making adjacency explicit had introduced avoidable explanatory wording in English and French. Its durable lesson was: “When panel feedback exposes a lexical seam, repair the local term without padding every language with explanatory wording; semantic equivalence matters more than literal structural symmetry.”\r\n\r\n## Material improvement\r\n- English: `the wall next to it` became the shorter native formula `the other`.\r\n- French: `au mur d’à côté` became `à l’autre`, and the setup became a compact generic riddle.\r\n- Spanish: `a la de al lado` became `a la otra`, while panel-required inner-corner `rincón` was retained.\r\n- Japanese: changed `何て言った` to generic present `何て言う`; retained natural `隣の壁`, no numeric wall counter, and no quotation marks.\r\n- All four setups now use a timeless riddle framing where native usage permits it.\r\n\r\n## Provisional synthesis self-scores\r\n- cross_language_equivalence: 5/5 — Setup, personification, rendezvous, physical corner, ery candidate presents all four languages and passes the objective script gate.","Every generator materially improves or reconsiders its first candidate.","The Champion has independent blind-panel support across all five qualitative criteria.","The synthesis explicitly accepts or rejects lessons from every parent Track."]},"rules":["Prefer visual or physical mechanisms whose comic inference exists before translation.","Treat shared grammar as insufficient evidence of shared comic license; audit native effect."],"schema_version":"1.1","scorecard":[{"comparable_across_tracks":true,"direction":"maximize","id":"cross_language_equivalence","label":"Cross Language Equivalence","primary":true,"unit":"points (1-5)","weight":0.2},{"comparable_across_tracks":true,"direction":"maximize","id":"dad_joke_groan","label":"Dad Joke Groan","primary":false,"unit":"points (1-5)","weight":0.2},{"comparable_across_tracks":true,"direction":"maximize","id":"brevity","label":"Brevity","primary":false,"unit":"points (1-5)","weight":0.2},{"comparable_across_tracks":true,"direction":"maximize","id":"cultural_portability","label":"Cultural Portability","primary":false,"unit":"points (1-5)","weight":0.2},{"comparable_across_tracks":true,"direction":"maximize","id":"translation_naturalness","label":"Translation Naturalness","primary":false,"unit":"points (1-5)","weight":0.2},{"comparable_across_tracks":true,"direction":"maximize","gate":{"operator":"gte","threshold":1},"id":"objective_completeness","label":"Four languages in native script","primary":false,"unit":"pass (1) / fail (0)","weight":0}],"scorers":[{"command":"python check_completeness.py --data . --out completeness-report.json","criterion_ids":["objective_completeness"],"id":"native-script-completeness","primary":true,"type":"objective_command","weight":0},{"criterion_ids":["cross_language_equivalence","dad_joke_groan","brevity","cultural_portability","translation_naturalness"],"id":"initial-panel-rubric","judge_panel":"initial-blind-pa able riddle.","id":"track-gpt-5-5","label":"GPT-5.5 generator"},{"final_decision":"Loop 01 visual mechanism became Champion.","hypothesis":"Visual and spatial mechanisms can retain the same reveal in every language.","id":"track-gemini-3-1-pro-preview","label":"Gemini 3.1 Pro Preview generator"},{"final_decision":"Candidate rejected; grammatical-audit lesson retained.","hypothesis":"A category-confusion introduction joke can be rebuilt around shared grammar.","id":"track-claude-sonnet-5","label":"Claude Sonnet 5 generator"},{"final_decision":"Improved the wall finalist, but lost 2-1 to the visual Champion.","hypothesis":"A refined wall joke can combine geometry, brevity, and per-language idiom.","id":"synthesis","label":"GPT-5.6 Sol synthesis"}]},"schema_version":"1.1","scorers":[{"command":"python check_completeness.py --data . --out completeness-report.json","criterion_ids":["objective_completeness"],"id":"native-script-completeness","primary":true,"type":"objective_command","weight":0},{"criterion_ids":["cross_language_equivalence","dad_joke_groan","brevity","cultural_portability","translation_naturalness"],"id":"initial-panel-rubric","judge_panel":"initial-blind-panel","primary":true,"type":"llm_rubric","weight":1},{"criterion_ids":["cross_language_equivalence","dad_joke_groan","brevity","cultural_portability","translation_naturalness"],"id":"championship-panel-rubric","judge_panel":"championship-blind-panel","primary":true,"type":"pairwise_judge","weight":1}],"story":{"featured_artifact_id":"champion-final-md","milestones":[{"caption":"Echo established a highly portable but gentle baseline.","iteration_id":"track-gpt-5-5-loop-01"},{"caption":"Shadow made the physical mechanism more visual.","iteration_id":"track-gpt-5-5-loop-02"},{"caption":"Eyebrows introduced the eventual visual Champion.","iteration_id":"track-gemini-3-1-pro-preview-loop-01"},{"caption":"Walls tightened the joke into a classic Q\u0026A.","iteration_id":"track-gemini-3-1-pro-preview-loop-02"},{"caption":"Hunger exposed the grammatical-calque trap.","iteration_id":"track-claude-sonnet-5-loop-01"},{"caption":"Tired improved grammar but still failed native comic license.","iteration_id":"track-claude-sonnet-5-loop-02"},{"caption":"Synthesis repaired Spanish and Japanese wall seams.","iteration_id":"synthesis-loop-01"},{"caption":"A compact wall finalist won Terra’s vote but not the panel.","iteration_id":"synthesis-loop-02"}],"primary_comparison_key":"multilingual-joke"},"title":"A dad joke that survives four languages","tracks":[{"final_decision":"Useful portability lessons; not Champion.","hypothesis":"Universal physical behavior can form a portable riddle.","id":"track-gpt-5-5","label":"GPT-5.5 generator","starts_after":[]},{"final_decision":"Loop 01 visual mechanism became Champion.","hypothesis":"Visual and spatial mechanisms can retain the same reveal in every language.","id":"track-gemini-3-1-pro-preview","label":"Gemini 3.1 Pro Preview generator","starts_after":[]},{"final_decision":"Candidate rejected; grammatical-audit lesson retained.","hypothesis":"A category-confusion introduction joke can be rebuilt around shared grammar.","id":"track-claude-sonnet-5","label":"Claude Sonnet 5 generator","starts_after":[]},{"final_decision":"Improved the wall finalist, but lost 2-1 to the visual Champion.","hypothesis":"A refined wall joke can combine geometry, brevity, and per-language idiom.","id":"synthesis","label":"GPT-5.6 Sol synthesis","starts_after":["GPT-5.5 generator","Gemini 3.1 Pro Preview generator","Claude Sonnet 5 generator"]}]}</script>
<script type="application/json" id="interaction-contract">{"controls":[{"actions":[{"expect_hash":"#view=overview","type":"click"}],"kind":"tab","selector":"#tab-overview"},{"actions":[{"expect_hash":"#view=topology","type":"click"}],"kind":"tab","selector":"#tab-topology"},{"actions":[{"expect_hash":"#view=compare","type":"click"}],"kind":"tab","selector":"#tab-compare"},{"actions":[{"expect":"single_tab_stop","type":"arrow_navigation"},{"expect":"loop_inspector_visible","type":"enter"}],"kind":"graph","selector":".graph-node"},{"actions":[{"expect":"graph_nodes_dimmed","type":"change"}],"kind":"filter","selector":"#track-filter,#decision-filter,#loop-search,#champion-filter"},{"actions":[{"expect":"topology_loop_selected","type":"click"}],"kind":"loop_link","selector":"[data-open-loop]"},{"actions":[{"expect":"theme_applied","type":"each_option"}],"kind":"select","selector":"#theme-select"},{"actions":[{"expect":"tree_filtered","type":"input"}],"kind":"search","selector":"#manifest-search"},{"actions":[{"expect":"focus_contained_and_restored","type":"click"}],"kind":"dialog","selector":".expand-artifact"},{"actions":[{"expect":"comparison_updated","type":"each_option"}],"kind":"select","selector":"#compare-a,#compare-b"},{"actions":[{"expect":"expanded_state_changed","type":"toggle"}],"kind":"disclosure","selector":"details \u003e summary"},{"actions":[{"expect":"dialog_closed","type":"click"}],"kind":"dialog_close","selector":"#dialog-close"},{"actions":[{"expect":"local_target","type":"inspect"}],"kind":"link","selector":"a.button[href]"}],"state":"hash","version":"1.1"}</script>
<script>
(() => {
  "use strict";
  const VM = JSON.parse(document.getElementById("viewer-data").textContent || "{}");
  const PANEL_IDS = ["overview","topology","compare"];
  const byId = id => document.getElementById(id);
  const esc = value => String(value == null ? "" : value).replace(/[&<>"']/g, ch => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[ch]));
  const list = value => Array.isArray(value) ? value : [];
  const object = value => value && typeof value === "object" && !Array.isArray(value) ? value : {};
  const loopById = id => VM.loops.find(loop => loop.id === id);
  const artifactById = id => VM.loops.flatMap(loop => loop.artifacts || []).find(artifact => artifact.id === id);
  const criterionById = id => VM.criteria.find(criterion => criterion.id === id) || {};
  const primaryId = VM.primary_criterion.id || "";
  const formatValue = (value, criterion = {}) => value == null ? "—" : `${Number.isFinite(value) ? Number(value).toLocaleString(undefined, {maximumFractionDigits: 6}) : value}${criterion.unit ? ` ${criterion.unit}` : ""}`;
  const hashState = () => Object.fromEntries(new URLSearchParams(location.hash.replace(/^#/, "")));
  const updateHash = changes => {
    const state = {...hashState(), ...changes};
    Object.keys(state).forEach(key => (state[key] == null || state[key] === "") && delete state[key]);
    history.replaceState(null, "", `#${new URLSearchParams(state)}`);
  };
  const button = (label, attrs = "") => `<button class="button" ${attrs}>${esc(label)}</button>`;

  function artifactMarkup(artifact, expanded = false) {
    if (!artifact) return '<div class="diagnostic">No Artifact was declared for this position.</div>';
    const presentation = object(artifact.presentation);
    const preview = object(artifact.preview);
    let body = '<div class="diagnostic">No inline preview is available.</div>';
    if (preview.kind === "image") {
      body = `<img src="${esc(preview.data_uri)}" alt="${esc(presentation.alt_text || artifact.label)}">`;
    } else if (preview.kind === "interactive_html") {
      body = `<iframe src="${esc(preview.data_uri)}" sandbox="${esc(preview.sandbox || "allow-scripts")}" title="${esc(artifact.label)}"></iframe>`;
    } else if (preview.kind === "text") {
      body = `<pre>${esc(preview.value)}</pre>`;
    } else if (preview.kind === "json") {
      body = `<div class="tree">${renderTree(preview.value, "value", "")}</div>`;
    } else if (preview.kind === "table") {
      body = `<div class="table-wrap"><table><thead><tr>${list(preview.headers).map(cell => `<th>${esc(cell)}</th>`).join("")}</tr></thead><tbody>${list(preview.rows).map(row => `<tr>${list(row).map(cell => `<td>${esc(cell)}</td>`).join("")}</tr>`).join("")}</tbody></table>${preview.truncated ? '<p class="muted">Preview limited to 100 rows.</p>' : ""}</div>`;
    }
    const diagnostics = list(artifact.diagnostics).map(item => `<div class="diagnostic">${esc(item)}</div>`).join("");
    const tools = [
      !expanded && preview.kind ? `<button class="button expand-artifact" data-artifact="${esc(artifact.id)}">Expand</button>` : "",
      artifact.safe_href ? `<a class="button" href="${esc(artifact.safe_href)}">Original file</a>` : ""
    ].join("");
    return `<figure class="artifact">
      <div class="artifact-head"><strong>${esc(artifact.label || artifact.id)}</strong><span class="badge">${esc(presentation.mode || artifact.kind)}</span></div>
      ${tools ? `<div class="artifact-tools">${tools}</div>` : ""}
      <div class="artifact-body">${body}${diagnostics}</div>
      <figcaption>${esc(presentation.caption || "Artifact evidence.")}</figcaption>
    </figure>`;
  }

  function metricCards(loop) {
    return `<div class="metric-row">${VM.criteria.map(criterion => {
      const value = object(loop.score_values)[criterion.id];
      const gate = object(criterion.gate);
      let state = "";
      if (gate.operator) state = gatePass(value, gate) ? "pass" : "fail";
      return `<div class="metric"><span>${esc(criterion.label || criterion.id)}</span><strong>${esc(formatValue(value, criterion))}</strong>${state ? `<span class="badge ${state}">${state} gate</span>` : ""}</div>`;
    }).join("")}</div>`;
  }

  function gatePass(value, gate) {
    if (typeof value !== "number" || typeof gate.threshold !== "number") return false;
    return ({eq: value === gate.threshold, ne: value !== gate.threshold, gt: value > gate.threshold, gte: value >= gate.threshold, lt: value < gate.threshold, lte: value <= gate.threshold})[gate.operator] || false;
  }

  function renderOverview() {
    const problem = object(VM.problem);
    const championLoop = loopById(VM.champion.iteration_id) || VM.loops[0] || {};
    const milestones = list(VM.story.milestones);
    byId("panel-overview").innerHTML = `<div class="stack">
      ${list(VM.diagnostics).map(item => `<div class="diagnostic" role="alert">${esc(item)}</div>`).join("")}
      <section class="card">
        <div class="eyebrow">01 / Problem</div>
        <h2>${esc(problem.statement || "Problem framing was not recorded.")}</h2>
        <p class="lede">${esc(problem.optimization_target || "")}</p>
        <div class="problem-facts">
          <div><h3>Constraints</h3><ul>${list(problem.constraints).map(item => `<li>${esc(item)}</li>`).join("")}</ul></div>
          <div><h3>Success criteria</h3><ul>${list(problem.success_criteria).map(item => `<li>${esc(item)}</li>`).join("")}</ul></div>
        </div>
        <details><summary>Original Experiment Prompt</summary><pre>${esc(problem.original_prompt || "")}</pre></details>
      </section>
      <section class="card">
        <div class="eyebrow">02 / Champion</div>
        <div class="grid-2">
          <div><h2>${esc(championLoop.label || championLoop.id || "Champion")}</h2><p class="lede">${esc(VM.champion.summary || championLoop.outcome || "")}</p>${metricCards(championLoop)}</div>
          <div>${artifactMarkup(VM.featured_artifact || championLoop.primary_artifact)}</div>
        </div>
      </section>
      <section class="card">
        <div class="eyebrow">03 / Experiment journey</div>
        <h2>How the Experiment progressed</h2>
        <div class="journey">${milestones.map((milestone, index) => `<button class="milestone" data-open-loop="${esc(milestone.iteration_id)}"><span class="eyebrow">${String(index + 1).padStart(2, "0")} / ${esc(milestone.iteration_id)}</span><strong>${esc(milestone.caption)}</strong></button>`).join("")}</div>
      </section>
      <section class="card">
        <div class="eyebrow">04 / Why it won</div>
        <div class="grid-2">
          <div><h2>Evidence-backed reasons</h2><ul>${list(VM.champion.reasons).map(reason => `<li>${esc(reason.text)} <span class="muted mono">${list(reason.evidence_refs).map(ref => esc(ref)).join(" · ")}</span></li>`).join("")}</ul></div>
          <div><h2>Caveats and dissent</h2><ul>${list(VM.champion.caveats).map(reason => `<li>${esc(reason.text)} <span class="muted mono">${list(reason.evidence_refs).map(ref => esc(ref)).join(" · ")}</span></li>`).join("") || "<li>No caveats were recorded.</li>"}</ul></div>
        </div>
        <details><summary>Experiment evidence and provenance</summary>${provenanceMarkup()}${manifestExplorer()}</details>
      </section>
    </div>`;
  }

  function provenanceMarkup() {
    const generation = object(VM.generation);
    const fields = [
      ["Skill commit", generation.skill_commit],
      ["CLI", generation.copilot_cli_version],
      ["Orchestrator", generation.orchestrator_model],
      ["Prompt integrity", generation.prompt_sha256],
      ["Skill integrity", generation.skill_tree_sha256]
    ];
    return `<div class="grid-3">${fields.map(([label, value]) => `<div class="metric"><span>${esc(label)}</span><strong class="mono" style="font-size:13px">${esc(value || "not recorded")}</strong></div>`).join("")}</div>`;
  }

  function manifestExplorer() {
    return `<div class="card compact" style="margin-top:12px"><h3>Structured Manifest</h3><label class="sr-only" for="manifest-search">Search Manifest</label><input id="manifest-search" placeholder="Search keys or values"><div id="manifest-tree" class="tree">${renderTree(VM.raw_manifest, "manifest", "")}</div></div>`;
  }

  function renderTopology() {
    const tracks = VM.tracks;
    const decisions = [...new Set(VM.loops.map(loop => loop.decision).filter(Boolean))];
    byId("panel-topology").innerHTML = `<div class="toolbar card compact">
      <label>Track<select id="track-filter"><option value="">All Tracks</option>${tracks.map(track => `<option value="${esc(track.id)}">${esc(track.label || track.id)}</option>`).join("")}</select></label>
      <label>Decision<select id="decision-filter"><option value="">All decisions</option>${decisions.map(value => `<option value="${esc(value)}">${esc(value)}</option>`).join("")}</select></label>
      <label>Search<input id="loop-search" type="search" placeholder="Loop, hypothesis, outcome"></label>
      <label><span>Champion</span><span><input id="champion-filter" type="checkbox"> only</span></label>
    </div>
    <div class="topology-layout">
      <section class="card graph-shell" aria-label="Experiment topology graph"><div class="graph-stage" id="graph-stage"></div></section>
      <aside class="card inspector" id="loop-inspector" aria-live="polite"></aside>
    </div>
    <details class="card all-loops"><summary>All Loops — complete accessible list</summary><div class="all-loops-list">${VM.loops.map(loop => `<button class="button loop-list-button" data-open-loop="${esc(loop.id)}"><span>${esc(loop.label || loop.id)}</span><span class="mono">${esc(formatValue(loop.primary_value, VM.primary_criterion))}</span></button>`).join("")}</div></details>`;
    renderGraph();
    const selected = loopById(hashState().loop) || loopById(VM.champion.iteration_id) || VM.loops[0];
    if (selected) selectLoop(selected.id, false);
    ["track-filter", "decision-filter", "loop-search", "champion-filter"].forEach(id => byId(id).addEventListener("input", applyGraphFilters));
  }

  function graphPosition(loop) {
    const trackIndex = Math.max(0, VM.tracks.findIndex(track => track.id === loop.track_id));
    return {x: 30 + trackIndex * 240, y: 92 + (loop.topology_depth ?? loop.index) * 128};
  }

  function renderGraph() {
    const stage = byId("graph-stage");
    const width = Math.max(720, VM.tracks.length * 240 + 20);
    const maxTrackDepth = Math.max(0, ...VM.loops.map(loop => loop.topology_depth ?? loop.index));
    const height = Math.max(620, maxTrackDepth * 128 + 260);
    stage.style.width = `${width}px`;
    stage.style.height = `${height}px`;
    const labels = VM.tracks.map((track, index) => `<div class="track-label" style="left:${20 + index * 240}px"><strong>${esc(track.label || track.id)}</strong>${list(track.starts_after).length ? `<small>Starts after ${track.starts_after.map(value => esc(value)).join(" + ")} complete</small>` : "<small>Starts independently</small>"}</div>`).join("");
    const edges = VM.loops.flatMap(loop => list(loop.parent_ids).map(parentId => {
      const parent = loopById(parentId);
      if (!parent) return "";
      const from = graphPosition(parent), to = graphPosition(loop);
      return `<line x1="${from.x + 95}" y1="${from.y + 76}" x2="${to.x + 95}" y2="${to.y}"></line>`;
    })).join("");
    const nodes = VM.loops.map(loop => {
      const pos = graphPosition(loop);
      return `<button class="graph-node" data-loop="${esc(loop.id)}" style="left:${pos.x}px;top:${pos.y}px" aria-pressed="false" tabindex="-1">
        <span class="node-title"><span>${esc(loop.label || loop.id)}</span>${loop.is_champion ? '<span class="badge champion">Champion</span>' : ""}</span>
        <span class="node-meta">${esc(loop.decision)} · ${esc(formatValue(loop.primary_value, VM.primary_criterion))}</span>
      </button>`;
    }).join("");
    stage.innerHTML = `${labels}<svg class="edge-layer" viewBox="0 0 ${width} ${height}" aria-hidden="true">${edges}</svg>${nodes}`;
    stage.querySelectorAll(".graph-node").forEach(node => {
      node.addEventListener("click", () => selectLoop(node.dataset.loop, true));
      node.addEventListener("keydown", graphKeydown);
    });
  }

  function selectLoop(loopId, writeHash = true) {
    const loop = loopById(loopId);
    if (!loop) return;
    document.querySelectorAll(".graph-node").forEach(node => {
      const selected = node.dataset.loop === loopId;
      node.setAttribute("aria-pressed", String(selected));
      node.tabIndex = selected ? 0 : -1;
    });
    renderInspector(loop);
    if (writeHash) updateHash({view: "topology", loop: loopId});
  }

  function graphKeydown(event) {
    const current = loopById(event.currentTarget.dataset.loop);
    if (!current) return;
    const candidates = VM.loops.filter(loop => loop.id !== current.id);
    const currentPos = graphPosition(current);
    const directional = candidates.filter(loop => {
      const pos = graphPosition(loop);
      if (event.key === "ArrowUp") return pos.y < currentPos.y;
      if (event.key === "ArrowDown") return pos.y > currentPos.y;
      if (event.key === "ArrowLeft") return pos.x < currentPos.x;
      if (event.key === "ArrowRight") return pos.x > currentPos.x;
      return false;
    });
    if (event.key === "Enter" || event.key === " ") {
      event.preventDefault();
      selectLoop(current.id, true);
      byId("loop-inspector").focus();
      return;
    }
    if (!directional.length) return;
    event.preventDefault();
    directional.sort((a, b) => {
      const ap = graphPosition(a), bp = graphPosition(b);
      return (Math.abs(ap.x-currentPos.x)+Math.abs(ap.y-currentPos.y)) - (Math.abs(bp.x-currentPos.x)+Math.abs(bp.y-currentPos.y));
    });
    selectLoop(directional[0].id, true);
    document.querySelector(`.graph-node[data-loop="${CSS.escape(directional[0].id)}"]`).focus();
  }

  function applyGraphFilters() {
    const track = byId("track-filter").value;
    const decision = byId("decision-filter").value;
    const query = byId("loop-search").value.toLowerCase();
    const championOnly = byId("champion-filter").checked;
    document.querySelectorAll(".graph-node").forEach(node => {
      const loop = loopById(node.dataset.loop);
      const haystack = `${loop.id} ${loop.hypothesis} ${loop.outcome}`.toLowerCase();
      const match = (!track || loop.track_id === track) && (!decision || loop.decision === decision) && (!query || haystack.includes(query)) && (!championOnly || loop.is_champion);
      node.classList.toggle("is-dimmed", !match);
    });
  }

  function renderInspector(loop) {
    const prompt = object(loop.prompt);
    const lesson = object(loop.lesson);
    const secondary = list(loop.artifacts).filter(artifact => !loop.primary_artifact || artifact.id !== loop.primary_artifact.id);
    byId("loop-inspector").innerHTML = `<div class="eyebrow">${esc(loop.track_label)} / ${esc(loop.id)}</div>
      <h2>${esc(loop.label || loop.id)} ${loop.is_champion ? '<span class="badge champion">Champion</span>' : ""}</h2>
      <p><span class="badge ${esc(loop.decision)}">${esc(loop.decision)}</span> <span class="badge">${esc(loop.model_id)}</span></p>
      <h3>Hypothesis</h3><p>${esc(loop.hypothesis)}</p>
      <h3>Outcome</h3><p>${esc(loop.outcome)}</p>
      ${artifactMarkup(loop.primary_artifact)}
      ${metricCards(loop)}
      <div class="feedback"><div class="eyebrow">Judge feedback</div><p>${esc(prompt.judge_feedback || "No judge feedback was recorded.")}</p></div>
      <h3 style="margin-top:14px">Lesson</h3><p>${esc(lesson.action || "")}</p><p class="muted">${esc(lesson.evidence || "")}</p>
      ${secondary.length ? `<details><summary>Other Artifacts (${secondary.length})</summary><div class="stack">${secondary.map(artifact => artifactMarkup(artifact)).join("")}</div></details>` : ""}
      <details><summary>Prompt and feedback chain</summary>
        <h3>Track prompt</h3><pre>${esc(prompt.track_prompt || "")}</pre>
        <h3>Input feedback</h3><pre>${esc(prompt.input_feedback || "")}</pre>
        <h3>Judge feedback</h3><pre>${esc(prompt.judge_feedback || "")}</pre>
        <h3>Next prompt</h3><pre>${esc(prompt.next_prompt || "")}</pre>
      </details>
      <details><summary>Advanced Loop evidence</summary><pre>${esc(JSON.stringify({commands: loop.commands, quality_gates: loop.quality_gates, changed_files: loop.changed_files}, null, 2))}</pre></details>`;
  }

  function renderCompare() {
    const first = VM.loops[0] || {};
    const champion = loopById(VM.champion.iteration_id) || VM.loops.at(-1) || first;
    byId("panel-compare").innerHTML = `<div class="stack">
      <section class="card"><div class="eyebrow">Metric progression</div><h2>${esc(VM.primary_criterion.label || primaryId || "Primary criterion")}</h2><div id="progression"></div><div class="table-wrap" id="progression-table"></div></section>
      <section class="card">
        <div class="toolbar">
          <label>Loop A<select id="compare-a"></select></label>
          <label>Loop B<select id="compare-b"></select></label>
        </div>
        <div id="comparison"></div>
      </section>
    </div>`;
    const options = VM.loops.map(loop => `<option value="${esc(loop.id)}">${esc(loop.label || loop.id)}</option>`).join("");
    byId("compare-a").innerHTML = options;
    byId("compare-b").innerHTML = options;
    const state = hashState();
    byId("compare-a").value = loopById(state.a) ? state.a : first.id;
    byId("compare-b").value = loopById(state.b) ? state.b : champion.id;
    renderProgression();
    renderComparison();
    ["compare-a", "compare-b"].forEach(id => byId(id).addEventListener("change", () => {
      updateHash({view: "compare", a: byId("compare-a").value, b: byId("compare-b").value});
      renderComparison();
    }));
  }

  function renderProgression() {
    const values = VM.loops.map(loop => Number(loop.primary_value)).filter(Number.isFinite);
    const min = Math.min(...values), max = Math.max(...values), span = Math.max(1, max - min);
    byId("progression").innerHTML = `<div class="progression">${VM.loops.map(loop => {
      const value = Number(loop.primary_value);
      const width = Number.isFinite(value) ? 12 + ((value - min) / span) * 88 : 0;
      return `<div class="progress-row"><span class="mono">${esc(loop.id)}</span><div class="progress-track"><div class="progress-fill" style="width:${width}%"></div></div><strong class="mono">${esc(formatValue(loop.primary_value, VM.primary_criterion))}</strong></div>`;
    }).join("")}</div>`;
    byId("progression-table").innerHTML = `<table><caption class="sr-only">Metric progression for every Loop</caption><thead><tr><th>Loop</th>${VM.criteria.map(c => `<th>${esc(c.label || c.id)}</th>`).join("")}<th>Decision</th></tr></thead><tbody>${VM.loops.map(loop => `<tr><td>${esc(loop.id)}</td>${VM.criteria.map(c => `<td class="mono">${esc(formatValue(object(loop.score_values)[c.id], c))}</td>`).join("")}<td>${esc(loop.decision)}</td></tr>`).join("")}</tbody></table>`;
  }

  function comparableArtifact(loop) {
    const key = VM.story.primary_comparison_key;
    return list(loop.artifacts).find(artifact => object(artifact.presentation).comparison_key === key) || loop.primary_artifact;
  }

  function renderComparison() {
    const a = loopById(byId("compare-a").value), b = loopById(byId("compare-b").value);
    if (!a || !b) return;
    const difference = typeof a.primary_value === "number" && typeof b.primary_value === "number" ? b.primary_value - a.primary_value : null;
    byId("comparison").innerHTML = `<div class="compare-artifacts"><div><div class="eyebrow">A / ${esc(a.id)}</div>${artifactMarkup(comparableArtifact(a))}</div><div><div class="eyebrow">B / ${esc(b.id)}</div>${artifactMarkup(comparableArtifact(b))}</div></div>
      <div class="grid-3 compare-summary">
        <div class="metric"><span>${esc(VM.primary_criterion.label || primaryId)}</span><strong>${difference == null ? "—" : esc(`${difference > 0 ? "+" : ""}${difference.toLocaleString(undefined, {maximumFractionDigits:6})}`)}</strong><span>B minus A · ${esc(VM.primary_criterion.direction || "")}</span></div>
        <div class="card compact"><h3>Loop A lesson</h3><p>${esc(object(a.lesson).action || "")}</p></div>
        <div class="card compact"><h3>Loop B lesson</h3><p>${esc(object(b.lesson).action || "")}</p></div>
      </div>`;
  }

  function renderSamples() {
    const panel = byId("panel-samples");
    if (!panel) return;
    const samples = list(VM.raw_manifest.samples);
    panel.innerHTML = `<div class="card"><h2>Sample evidence</h2><div class="table-wrap"><table><thead><tr><th>Sample</th><th>Result</th></tr></thead><tbody>${samples.map(sample => `<tr><td>${esc(sample.id || sample.label)}</td><td><pre>${esc(JSON.stringify(sample.results || sample, null, 2))}</pre></td></tr>`).join("")}</tbody></table></div></div>`;
  }

  function renderTree(value, key = "value", query = "") {
    const haystack = `${key} ${typeof value === "object" ? JSON.stringify(value) : value}`.toLowerCase();
    if (query && !haystack.includes(query.toLowerCase())) return "";
    if (value && typeof value === "object") {
      const entries = Array.isArray(value) ? value.map((item, index) => [index, item]) : Object.entries(value);
      return `<details open><summary>${esc(key)} <span class="muted">${Array.isArray(value) ? `[${entries.length}]` : `{${entries.length}}`}</span></summary>${entries.map(([childKey, child]) => renderTree(child, childKey, query)).join("")}</details>`;
    }
    return `<div class="tree-value"><strong>${esc(key)}:</strong> ${esc(JSON.stringify(value))}</div>`;
  }

  function activate(panelId, writeHash = true) {
    const selected = PANEL_IDS.includes(panelId) ? panelId : PANEL_IDS[0];
    PANEL_IDS.forEach(id => {
      const tab = byId(`tab-${id}`), panel = byId(`panel-${id}`);
      tab.setAttribute("aria-selected", String(id === selected));
      tab.tabIndex = id === selected ? 0 : -1;
      panel.hidden = id !== selected;
    });
    if (writeHash) updateHash({view: selected});
    if (selected === "topology" && !byId("graph-stage")) renderTopology();
    if (selected === "compare" && !byId("comparison")) renderCompare();
    if (selected === "samples" && byId("panel-samples") && !byId("panel-samples").children.length) renderSamples();
  }

  function applyTheme(value) {
    const resolved = value === "system" ? (matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light") : value;
    document.documentElement.setAttribute("data-theme", resolved);
  }

  function openArtifact(id, invoker) {
    const artifact = artifactById(id);
    if (!artifact) return;
    const dialog = byId("artifact-dialog");
    dialog.dataset.invoker = id;
    dialog._invoker = invoker;
    byId("dialog-title").textContent = artifact.label || artifact.id;
    byId("dialog-body").innerHTML = artifactMarkup(artifact, true);
    dialog.showModal();
    byId("dialog-close").focus();
  }

  function humanReviewMarkup() {
    const loopOptions = VM.loops.map(loop => `<option value="${esc(loop.id)}">${esc(loop.label || loop.id)}</option>`).join("");
    const artifactOptions = VM.loops.flatMap(loop => list(loop.artifacts).map(artifact => `<option value="${esc(artifact.id)}">${esc(loop.id)} / ${esc(artifact.label || artifact.id)}</option>`)).join("");
    const criteria = list(VM.human_review_criteria).map((criterion, index) => `
      <div class="criterion-review" data-review-criterion="${esc(criterion.id)}">
        <div><strong>${esc(criterion.label || criterion.id)}</strong><div class="muted">${esc(criterion.unit || "rating")}</div></div>
        <label>Score<input id="human-score-${index}" type="number" step="any" inputmode="decimal"></label>
        <label>Rating<select id="human-rating-${index}"><option value="">Not rated</option><option value="weak">Weak</option><option value="acceptable">Acceptable</option><option value="strong">Strong</option></select></label>
        <label>Criterion notes<textarea id="human-criterion-notes-${index}"></textarea></label>
      </div>`).join("");
    return `<div class="review-form">
      <div><div class="eyebrow">Export-only review</div><h2>Judge this Experiment</h2><p class="muted">Your review is downloaded as a schema-bound JSON sidecar. It contains no reviewer identity and is not imported by this Viewer.</p></div>
      <div class="grid-2">
        <label>Overall verdict<select id="human-verdict"><option value="needs_improvement">Needs improvement</option><option value="approve">Approve</option><option value="reject">Reject</option></select></label>
        <label>Recommendation<select id="human-recommendation"><option value="needs_improvement">Needs improvement</option><option value="keep">Keep</option><option value="reject">Reject</option></select></label>
      </div>
      <label>General notes<textarea id="human-general-notes"></textarea></label>
      <section><h3>Assigned criteria</h3><div class="stack">${criteria}</div></section>
      <div class="grid-2">
        <label>Preferred Loop<select id="human-preferred-loop"><option value="">No preference</option>${loopOptions}</select></label>
        <span></span>
        <label>Loop note for<select id="human-loop-note-id">${loopOptions}</select></label>
        <label>Loop notes<textarea id="human-loop-notes"></textarea></label>
        <label>Artifact note for<select id="human-artifact-note-id">${artifactOptions}</select></label>
        <label>Artifact notes<textarea id="human-artifact-notes"></textarea></label>
      </div>
      <div class="card compact"><h3>Evidence binding</h3><div class="binding">Experiment: ${esc(VM.experiment_id)}<br>Manifest SHA-256: ${esc(VM.binding.manifest_sha256)}<br>Viewer SHA-256: ${esc(VM.binding.viewer_sha256)}<br>Algorithm: ${esc(VM.binding.viewer_hash_algorithm)}</div></div>
      <div><button class="button" id="human-export">Download review JSON</button></div>
    </div>`;
  }

  function openHumanReview(invoker) {
    const dialog = byId("human-dialog");
    if (!dialog) return;
    dialog._invoker = invoker;
    byId("human-body").innerHTML = humanReviewMarkup();
    const selectedLoop = loopById(hashState().loop) || loopById(VM.champion.iteration_id);
    if (selectedLoop) byId("human-loop-note-id").value = selectedLoop.id;
    if (VM.story.featured_artifact_id) byId("human-artifact-note-id").value = VM.story.featured_artifact_id;
    byId("human-export").addEventListener("click", exportHumanReview);
    dialog.showModal();
    byId("human-verdict").focus();
  }

  function exportHumanReview() {
    const criterionReviews = list(VM.human_review_criteria).map((criterion, index) => {
      const scoreText = byId(`human-score-${index}`).value;
      const rating = byId(`human-rating-${index}`).value;
      return {
        criterion_id: criterion.id,
        score: scoreText === "" ? null : Number(scoreText),
        rating: rating || null,
        notes: byId(`human-criterion-notes-${index}`).value
      };
    });
    const loopNotes = byId("human-loop-notes").value.trim();
    const artifactNotes = byId("human-artifact-notes").value.trim();
    const review = {
      schema_version: "1.0",
      experiment_id: VM.experiment_id,
      manifest_sha256: VM.binding.manifest_sha256,
      viewer_sha256: VM.binding.viewer_sha256,
      viewer_hash_algorithm: VM.binding.viewer_hash_algorithm,
      verdict: byId("human-verdict").value,
      general_notes: byId("human-general-notes").value,
      criterion_reviews: criterionReviews,
      loop_notes: loopNotes ? [{iteration_id: byId("human-loop-note-id").value, notes: loopNotes}] : [],
      artifact_notes: artifactNotes ? [{artifact_id: byId("human-artifact-note-id").value, notes: artifactNotes}] : [],
      preferred_iteration_id: byId("human-preferred-loop").value || null,
      recommendation: byId("human-recommendation").value
    };
    const blob = new Blob([`${JSON.stringify(review, null, 2)}\n`], {type: "application/json"});
    const href = URL.createObjectURL(blob);
    const anchor = document.createElement("a");
    anchor.href = href;
    anchor.download = `${VM.experiment_id}-human-review.json`;
    document.body.append(anchor);
    anchor.click();
    anchor.remove();
    setTimeout(() => URL.revokeObjectURL(href), 0);
  }

  byId("experiment-id").textContent = VM.experiment_id;
  renderOverview();
  document.querySelectorAll('[role="tab"]').forEach((tab, index, tabs) => {
    tab.addEventListener("click", () => activate(tab.dataset.tab));
    tab.addEventListener("keydown", event => {
      let next = index;
      if (event.key === "ArrowRight") next = (index + 1) % tabs.length;
      else if (event.key === "ArrowLeft") next = (index - 1 + tabs.length) % tabs.length;
      else if (event.key === "Home") next = 0;
      else if (event.key === "End") next = tabs.length - 1;
      else return;
      event.preventDefault();
      tabs[next].focus();
    });
  });
  document.addEventListener("click", event => {
    const loopButton = event.target.closest("[data-open-loop]");
    if (loopButton) {
      activate("topology");
      selectLoop(loopButton.dataset.openLoop, true);
    }
    const expand = event.target.closest(".expand-artifact");
    if (expand) openArtifact(expand.dataset.artifact, expand);
  });
  document.addEventListener("input", event => {
    if (event.target.id === "manifest-search") {
      byId("manifest-tree").innerHTML = renderTree(VM.raw_manifest, "manifest", event.target.value);
    }
  });
  byId("dialog-close").addEventListener("click", () => byId("artifact-dialog").close());
  byId("artifact-dialog").addEventListener("close", event => event.currentTarget._invoker && event.currentTarget._invoker.focus());
  if (byId("human-review-button")) {
    byId("human-review-button").addEventListener("click", event => openHumanReview(event.currentTarget));
    byId("human-close").addEventListener("click", () => byId("human-dialog").close());
    byId("human-dialog").addEventListener("close", event => event.currentTarget._invoker && event.currentTarget._invoker.focus());
  }
  byId("theme-select").addEventListener("change", event => applyTheme(event.target.value));
  const requestedTheme = new URLSearchParams(location.search).get("scoutTheme");
  byId("theme-select").value = requestedTheme === "dark" || requestedTheme === "light" ? requestedTheme : "system";
  applyTheme(byId("theme-select").value);
  const initial = hashState();
  activate(initial.view || "overview", false);
  if (initial.view === "topology" && initial.loop) selectLoop(initial.loop, false);
  window.addEventListener("hashchange", () => {
    const state = hashState();
    activate(state.view || "overview", false);
    if (state.view === "topology" && state.loop) selectLoop(state.loop, false);
  });
})();
</script>
</body>
</html>
