<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630"
     role="img" aria-labelledby="cardTitle cardDesc">
  <title id="cardTitle">Loop Lab workshop: Designing with Feedback Loops</title>
  <desc id="cardDesc">Event card for Designing with Feedback Loops, November 19, 2026, 1:00 PM to 4:30 PM at Innovation Hub plus online. Register now. The canonical event brief uses an editorial information grid and a separated modular signal-routing illustration.</desc>

  <defs>
    <style>
      .serif { font-family: Georgia, 'Times New Roman', serif; }
      .sans { font-family: 'Segoe UI', Arial, Helvetica, sans-serif; }
    </style>
    <clipPath id="moduleClip">
      <rect x="752" y="48" width="376" height="534" rx="24"/>
    </clipPath>
  </defs>

  <rect id="canvas" width="1200" height="630" fill="#F6F1E8"/>
  <rect id="frame" x="24" y="24" width="1152" height="582" fill="none" stroke="#171C32" stroke-width="1.5"/>

  <g id="editorial-zone">
    <rect id="logo-mark" x="72" y="48" width="44" height="44" rx="7" fill="#171C32"/>
    <text x="94" y="77" class="sans" font-size="17" font-weight="700" fill="#FFFFFF" text-anchor="middle">LL</text>
    <text id="series-kicker" x="132" y="77" class="sans" font-size="16" font-weight="700"
          letter-spacing="2.2" fill="#006E70">LOOP LAB · WORKSHOP 024</text>

    <g id="format-badge">
      <rect x="512" y="54" width="168" height="32" rx="16" fill="#006E70"/>
      <text x="596" y="75" class="sans" font-size="14" font-weight="700" letter-spacing="0.9"
            fill="#FFFFFF" text-anchor="middle">HYBRID + REMOTE</text>
    </g>
    <line id="header-rule" x1="72" y1="106" x2="680" y2="106" stroke="#BDB6AA" stroke-width="1.5"/>

    <rect id="title-rail" x="72" y="132" width="6" height="172" fill="#006E70"/>
    <g id="title-block" class="serif" font-size="48" font-weight="700" fill="#171C32">
      <text x="98" y="200">DESIGNING WITH</text>
      <text x="98" y="258">FEEDBACK LOOPS</text>
    </g>

    <g id="metadata-grid">
      <g class="sans" font-size="14" font-weight="700" letter-spacing="1.8" fill="#5E5D58">
        <text x="72" y="337">DATE</text>
        <text x="300" y="337">TIME</text>
        <text x="72" y="400">VENUE</text>
      </g>
      <g class="serif" font-size="20" font-weight="700" fill="#171C32">
        <text x="72" y="366">NOV 19, 2026</text>
        <text x="300" y="366">13:00–16:30</text>
        <text x="72" y="429">INNOVATION HUB + ONLINE</text>
      </g>
      <line x1="280" y1="320" x2="280" y2="376" stroke="#BDB6AA" stroke-width="1.5"/>
      <line x1="72" y1="384" x2="680" y2="384" stroke="#BDB6AA" stroke-width="1.5"/>
    </g>

    <line id="footer-rule" x1="72" y1="452" x2="680" y2="452" stroke="#BDB6AA" stroke-width="1.5"/>
    <text id="event-summary" x="72" y="482" class="serif" font-size="16" font-style="italic"
          fill="#5E5D58">Practice alignment across boundaries, not around them.</text>

    <g id="cta-button" aria-label="Register now">
      <rect x="72" y="510" width="244" height="56" rx="8" fill="#173B57"/>
      <text x="194" y="545" class="sans" font-size="18" font-weight="700" letter-spacing="1.4"
            fill="#FFFFFF" text-anchor="middle">REGISTER NOW →</text>
    </g>
    <text id="capacity-note" x="342" y="544" class="sans" font-size="14" font-weight="700"
          letter-spacing="1.2" fill="#5E5D58">72 SEATS · HYBRID</text>
  </g>

  <g id="signal-module">
    <rect id="module-panel" x="752" y="48" width="376" height="534" rx="24" fill="#171C32"/>
    <g clip-path="url(#moduleClip)">
      <path d="M748 124 H1132 M748 468 H1132" fill="none" stroke="#39405A" stroke-width="1"/>
      <path d="M780 212 C844 212 850 282 914 282 S984 352 1100 352"
            fill="none" stroke="#2CB8B8" stroke-width="5" stroke-dasharray="13 8"/>
      <path d="M780 352 C850 352 856 282 920 282 S990 212 1100 212"
            fill="none" stroke="#5965D8" stroke-width="4" stroke-dasharray="6 9"/>

      <circle cx="856" cy="282" r="74" fill="none" stroke="#2CB8B8" stroke-width="9"/>
      <circle cx="968" cy="282" r="74" fill="none" stroke="#5965D8" stroke-width="7"/>
      <circle cx="912" cy="282" r="38" fill="#202743" stroke="#D65A42" stroke-width="4"/>
      <path d="M856 208 C884 248 884 316 912 320 C940 316 940 248 968 208"
            fill="none" stroke="#D65A42" stroke-width="5"/>

      <g fill="#FFFFFF">
        <circle cx="782" cy="212" r="7"/>
        <circle cx="856" cy="208" r="7"/>
        <circle cx="912" cy="282" r="7"/>
        <circle cx="968" cy="356" r="7"/>
        <circle cx="1100" cy="352" r="7"/>
      </g>
      <g fill="#171C32" stroke="#2CB8B8" stroke-width="3">
        <circle cx="856" cy="282" r="12"/>
        <circle cx="968" cy="282" r="12"/>
      </g>
    </g>

    <text x="780" y="88" class="sans" font-size="14" font-weight="700" letter-spacing="1.8"
          fill="#FFFFFF">ROUTING MODULE / B</text>
    <circle cx="1094" cy="82" r="5" fill="#2CB8B8"/>
    <text x="780" y="520" class="sans" font-size="14" font-weight="700" letter-spacing="1.4"
          fill="#BFD9DD">6 INPUTS</text>
    <text x="1098" y="520" class="sans" font-size="14" font-weight="700" letter-spacing="1.4"
          fill="#BFD9DD" text-anchor="end">1 SHARED PATH</text>
    <text x="780" y="550" class="serif" font-size="16" font-style="italic" fill="#FFFFFF">
      Diverge · connect · decide
    </text>
  </g>
</svg>
