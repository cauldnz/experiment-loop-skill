<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630"
     role="img" aria-labelledby="sheetTitle sheetDesc">
  <title id="sheetTitle">Loop Lab event-card system — three workshop variants</title>
  <desc id="sheetDesc">A system sheet showing three compact cards made from the same editorial grid, metadata, call-to-action, badge, and modular signal-routing components: Designing with Feedback Loops, Prototyping in Public, and Distributed Decision Systems.</desc>
  <defs>
    <style>
      .serif { font-family: Georgia, 'Times New Roman', serif; }
      .sans { font-family: 'Segoe UI', Arial, Helvetica, sans-serif; }
