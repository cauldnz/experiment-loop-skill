    <text x="1098" y="520" class="sans" font-size="14" font-weight="700" letter-spacing="1.4"
          fill="#BFD9DD" text-anchor="end">OUTPUT 04</text>
    <text x="780" y="550" class="serif" font-size="16" font-style="italic" fill="#FFFFFF">
