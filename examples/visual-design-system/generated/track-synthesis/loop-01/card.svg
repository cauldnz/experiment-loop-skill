      <path d="M784 284 H1098" fill="none" stroke="#2CB8B8" stroke-width="4" stroke-dasharray="12 8"/>
      <path d="M920 144 V448" fill="none" stroke="#5965D8" stroke-width="3" stroke-dasharray="4 9"/>

