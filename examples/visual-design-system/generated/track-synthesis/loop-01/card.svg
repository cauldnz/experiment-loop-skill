      <circle cx="920" cy="284" r="86" fill="none" stroke="#5965D8" stroke-width="5" stroke-dasharray="14 9"/>
      <circle cx="920" cy="284" r="48" fill="#202743" stroke="#D65A42" stroke-width="4"/>
      <circle cx="1034" cy="284" r="52" fill="none" stroke="#2CB8B8" stroke-width="7" opacity="0.72"/>
      <path d="M968 284 C990 250 1010 250 1034 284 C1056 316 1078 316 1098 284"
