<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630"
     role="img" aria-labelledby="cardTitle cardDesc">
  <title id="cardTitle">Loop Lab workshop: Designing with Feedback Loops</title>
  <desc id="cardDesc">Event card for Designing with Feedback Loops, October 22, 2026, 9:30 AM to 12:30 PM at Studio B. Register now. An editorial information grid is separated from a modular signal-routing illustration.</desc>

  <defs>
    <style>
      .serif { font-family: Georgia, 'Times New Roman', serif; }
      .sans { font-family: 'Segoe UI', Arial, Helvetica, sans-serif; }
    </style>
    <clipPath id="moduleClip">
      <rect x="760" y="48" width="368" height="534" rx="24"/>
    </clipPath>
  </defs>

  <rect id="canvas" width="1200" height="630" fill="#F6F1E8"/>
  <rect id="frame" x="24" y="24" width="1152" height="582" fill="none" stroke="#171C32" stroke-width="1.5"/>

  <g id="editorial-zone">
    <rect id="logo-mark" x="72" y="48" width="44" height="44" rx="7" fill="#171C32"/>
    <text x="94" y="77" class="sans" font-size="17" font-weight="700" fill="#FFFFFF" text-anchor="middle">LL</text>
    <text id="series-kicker" x="132" y="77" class="sans" font-size="16" font-weight="700"
          letter-spacing="2.2" fill="#9F3424">LOOP LAB · WORKSHOP 021</text>

    <g id="format-badge">
