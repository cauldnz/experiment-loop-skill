    </g>
    <line id="header-rule" x1="72" y1="106" x2="680" y2="106" stroke="#BDB6AA" stroke-width="1.5"/>

    <rect id="title-rail" x="72" y="136" width="6" height="136" fill="#9F3424"/>
    <g id="title-block" class="serif" font-size="60" font-weight="700" fill="#171C32">
      <text x="98" y="190">DESIGNING WITH</text>
      <text x="98" y="260">FEEDBACK LOOPS</text>
    </g>

    <g id="metadata-row">
      <line x1="278" y1="342" x2="278" y2="414" stroke="#BDB6AA" stroke-width="1.5"/>
      <line x1="498" y1="342" x2="498" y2="414" stroke="#BDB6AA" stroke-width="1.5"/>
      <g class="sans" font-size="14" font-weight="700" letter-spacing="1.8" fill="#5E5D58">
