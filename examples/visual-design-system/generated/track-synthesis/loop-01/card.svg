        <text x="512" y="397">STUDIO B</text>
      </g>
    </g>

    <line id="footer-rule" x1="72" y1="438" x2="680" y2="438" stroke="#BDB6AA" stroke-width="1.5"/>
    <text id="event-summary" x="72" y="475" class="serif" font-size="16" font-style="italic"
