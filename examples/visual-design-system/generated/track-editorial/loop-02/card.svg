<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630"
     role="img" aria-labelledby="cardTitle cardDesc">
  <title id="cardTitle">Loop Lab Workshop: Prototyping Under Constraints (Hybrid)</title>
  <desc id="cardDesc">Editorial event card for a Loop Lab hybrid workshop titled "Prototyping Under
    Constraints," held Nov 3, 2026 from 1:00-3:00 PM at Hub A + Remote. Includes a Register Now call to
    action and a Hybrid Session format badge. Print-inspired layout with a kicker, rule lines, three-column
    metadata row, and a footer CTA, reusing the loop-01 grid with an accessibility fix and a new variant.</desc>

  <!-- Design tokens (loop-02): see tokens.json for full system, including the eventVariants section -->
  <defs>
    <style>
      .serif { font-family: Georgia, 'Times New Roman', serif; }
      .sans  { font-family: 'Segoe UI', Arial, Helvetica, sans-serif; }
    </style>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1200" height="630" fill="#F8F4EC"/>
  <!-- Print-style frame accent -->
  <rect x="24" y="24" width="1152" height="582" fill="none" stroke="#1B1F33" stroke-width="1.5"/>

  <!-- Logo mark -->
  <rect x="80" y="56" width="40" height="40" rx="6" fill="#1B1F33"/>
  <text x="100" y="82" class="sans" font-size="18" font-weight="700" fill="#F8F4EC" text-anchor="middle">LL</text>

  <!-- Kicker -->
  <text x="136" y="82" class="sans" font-size="18" font-weight="700" letter-spacing="2.5" fill="#B5432E">LOOP LAB WORKSHOP SERIES</text>
  <!-- Edition tag: ink.muted token repaired from #A39C8C to #6B6558 (5.28:1, was 2.49:1) -->
  <text x="1120" y="82" class="sans" font-size="16" letter-spacing="1" fill="#6B6558" text-anchor="end">EDITION 015</text>

  <!-- Header rule -->
  <line x1="80" y1="112" x2="1120" y2="112" stroke="#C9C2B4" stroke-width="1.5"/>

  <!-- Format badge: new reusable component demonstrating variant/extensibility -->
  <rect x="930" y="122" width="190" height="30" rx="15" fill="#B5432E"/>
  <text x="1025" y="143" class="sans" font-size="16" font-weight="700" letter-spacing="1" fill="#FFFFFF" text-anchor="middle">HYBRID SESSION</text>

  <!-- Title -->
  <text x="80" y="222" class="serif" font-size="64" font-weight="700" fill="#1B1F33">Prototyping Under</text>
  <text x="80" y="298" class="serif" font-size="64" font-weight="700" fill="#1B1F33">Constraints</text>

  <!-- Divider below title -->
  <line x1="80" y1="340" x2="1120" y2="340" stroke="#C9C2B4" stroke-width="1.5"/>

  <!-- Metadata labels: ink.muted token repaired -->
  <text x="80" y="380" class="sans" font-size="16" font-weight="700" letter-spacing="2" fill="#6B6558">DATE</text>
  <text x="440" y="380" class="sans" font-size="16" font-weight="700" letter-spacing="2" fill="#6B6558">TIME</text>
  <text x="800" y="380" class="sans" font-size="16" font-weight="700" letter-spacing="2" fill="#6B6558">VENUE</text>

  <!-- Column dividers -->
  <line x1="420" y1="364" x2="420" y2="440" stroke="#C9C2B4" stroke-width="1.5"/>
  <line x1="780" y1="364" x2="780" y2="440" stroke="#C9C2B4" stroke-width="1.5"/>

  <!-- Metadata values -->
  <text x="80" y="428" class="serif" font-size="30" font-weight="700" fill="#1B1F33">Nov 3, 2026</text>
  <text x="440" y="428" class="serif" font-size="30" font-weight="700" fill="#1B1F33">1:00&#8211;3:00 PM</text>
  <text x="800" y="428" class="serif" font-size="30" font-weight="700" fill="#1B1F33">Hub A + Remote</text>

  <!-- Bottom rule -->
  <line x1="80" y1="480" x2="1120" y2="480" stroke="#C9C2B4" stroke-width="1.5"/>

  <!-- Microcopy: ink.muted token repaired -->
  <text x="80" y="530" class="serif" font-size="16" font-style="italic" fill="#6B6558">Hybrid session &#183; loop-lab.dev/constraints</text>

  <!-- CTA -->
  <rect x="860" y="500" width="260" height="64" rx="6" fill="#1B1F33"/>
  <text x="990" y="540" class="sans" font-size="22" font-weight="700" letter-spacing="1.5" fill="#FFFFFF" text-anchor="middle">REGISTER NOW &#8594;</text>

  <!-- Decorative brand rhythm mark -->
  <rect x="576" y="582" width="6" height="6" fill="#B5432E"/>
  <rect x="597" y="582" width="6" height="6" fill="#B5432E"/>
  <rect x="618" y="582" width="6" height="6" fill="#B5432E"/>
</svg>
