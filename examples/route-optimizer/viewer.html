      const metric = i.scores.find(s => s.scorer_id === 'route-metrics');
      return `<article class="card">
        <h2>${i.id}</h2>
        <p><span class="pill ${i.decision}">${i.decision}</span><span class="pill">${i.track_id}</span></p>
